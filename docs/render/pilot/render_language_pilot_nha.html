<!--
  RENDER LANGUAGE PILOT — state: nhà (ENGINE TEST)
  marker: render_pilot
  domain: Π_body
  obitan_layer: n=0
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — nhà (Engine Test)</title>
<style>
  :root {
    --surface-bg: #fdf6f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .natt-render-frame {
    position: relative;
    width: 600px;
    height: 400px;
  }
  .natt-element {
    position: absolute;
    border-radius: 50%;
  }
  @keyframes natt-breathe {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.9; }
  }
  @keyframes natt-pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(var(--pulse-scale, 1.2)); opacity: 1; }
  }
  .label {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: #b08060;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  // Import engine và types
  import { RenderStackEngine } from '../../src/cells/render-stack-cell/domain/render-stack.engine.ts';
  
  const engine = new RenderStackEngine();
  
  // Tạo render instruction cho state nhà
  const instruction = {
    frame_id: 'test-nha-001',
    signals: [{
      verb: 'APPEAR',
      element_id: 'root-surface',
      origin_state: 'nhà',
      params: {
        position: 'origin(0,0)'
      },
      pressure: 0.0,
      degrade_to: null
    }, {
      verb: 'BREATHE',
      element_id: 'root-surface',
      origin_state: 'nhà',
      params: {
        cycle_ms: 6000
      },
      pressure: 0.0,
      degrade_to: null
    }],
    attention_map: {
      mode: 'FOCUS',
      priority: 1.0,
      target: 'root-surface'
    },
    motion_budget: {
      frame_budget: 100,
      allocated: 10,
      remaining: 90
    },
    degrade_level: 'NONE',
    truth_boundary: {
      inside: ['root-surface'],
      at_boundary: [],
      outside: []
    }
  };
  
  // Render
  const container = engine.execute(instruction);
  
  // Style cho element đã render
  const rootSurface = container.querySelector('#root-surface');
  if (rootSurface) {
    rootSurface.style.width = '180px';
    rootSurface.style.height = '180px';
    rootSurface.style.left = '50%';
    rootSurface.style.top = '50%';
    rootSurface.style.transform = 'translate(-50%, -50%)';
    rootSurface.style.background = 'radial-gradient(circle at center, #f0c080, #e0a060 60%, transparent 100%)';
    rootSurface.style.boxShadow = '0 0 60px 20px #fff5e6, 0 0 120px 40px rgba(240,192,128,0.15)';
  }
  
  // Append to app
  document.getElementById('app').appendChild(container);
  
  // Readout
  const renderPilotReadout = {
    state:'nhà',
    marker:'render_pilot',
    domain:'Π_body',
    obitan_layer:'n=0',
    polarity:'warm-core',
    pressure_response:'FALL',
    reflection_R:0,
    decay_rate:0,
    framework:'none',
    scope:'pilot-only',
    production:false,
    engine_version:'v0.2-pilot'
  };
  
  const readoutDiv = document.createElement('div');
  readoutDiv.className = 'label';
  readoutDiv.textContent = 'nhà — engine test v0.2';
  container.appendChild(readoutDiv);
  
  console.log(JSON.stringify(renderPilotReadout, null, 2));
</script>
</body>
</html>
