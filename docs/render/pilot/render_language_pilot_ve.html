<!--
  RENDER LANGUAGE PILOT — state: về
  marker: render_pilot
  domain: Π_medium
  obitan_layer: n=1 → n=0
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — về</title>
<style>
  :root { --surface-bg: #fdf6f0; --return-color: #e0c080; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .natt-render-frame { position: relative; width: 600px; height: 400px; }
  .natt-element { position: absolute; border-radius: 50%; }
  @keyframes return-home {
    0% { left: 80%; top: 80%; opacity: 0.7; }
    100% { left: 50%; top: 50%; opacity: 0; }
  }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  import { RenderStackEngine } from '../../src/cells/render-stack-cell/domain/render-stack.engine.ts';
  
  const engine = new RenderStackEngine();
  
  const instruction = {
    frame_id: 'test-ve-001',
    signals: [
      {
        verb: 'SHIFT',
        element_id: 'wandering-thought',
        origin_state: 'về',
        params: {
          from: 'position(400, 300)',
          to: 'origin(0, 0)',
          easing: 'ease-in'
        },
        pressure: 0.5,
        degrade_to: null
      }
    ],
    attention_map: { mode: 'AMBIENT', priority: 0.6, target: 'wandering-thought' },
    motion_budget: { frame_budget: 100, allocated: 25, remaining: 75 },
    degrade_level: 'NONE',
    truth_boundary: { inside: [], at_boundary: [], outside: ['wandering-thought'] }
  };
  
  const container = engine.execute(instruction);
  
  const el = container.querySelector('#wandering-thought');
  if (el) {
    el.style.width = '15px';
    el.style.height = '15px';
    el.style.background = 'var(--return-color)';
    el.style.boxShadow = '0 0 12px 4px rgba(224,192,128,0.6)';
    el.style.animation = 'return-home 2s ease-in forwards';
  }
  
  document.getElementById('app').appendChild(container);
  
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'về';
  container.appendChild(label);
  
  const renderPilotReadout = {
    state:'về', marker:'render_pilot', domain:'Π_medium',
    obitan_layer:'n=1→n=0', polarity:'warm-core',
    pressure_response:'FALL', reflection_R:'0.5*(1-progress)', decay_rate:'γ(1)*(1-progress)',
    framework:'none', scope:'pilot-only', production:false, engine_version:'v0.2-pilot'
  };
  console.log(JSON.stringify(renderPilotReadout, null, 2));
</script>
</body>
</html>
