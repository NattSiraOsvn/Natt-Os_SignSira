<!--
  RENDER LANGUAGE PILOT — state: tha
  marker: render_pilot
  domain: Π_body
  obitan_layer: n=1
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — tha</title>
<style>
  :root { --surface-bg: #fdf6f0; --tha-inner: #f0d0b0; --tha-outer: #e8b890; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .surface { position: relative; width: 600px; height: 400px; }
  .embrace {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(circle at center, var(--tha-inner), var(--tha-outer) 70%, transparent 100%);
    animation: tha-breathe 4s ease-in-out infinite;
  }
  @keyframes tha-breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
    50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
  }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="surface">
  <div class="embrace"></div>
  <div class="label">tha</div>
</div>
<script>
  const renderPilotReadout = {
    state:'tha', marker:'render_pilot', domain:'Π_body',
    obitan_layer:'n=1', polarity:'warm-core',
    pressure_response:'FALL', reflection_R:0.2, decay_rate:'γ(1)*(1-breathing_phase)',
    framework:'none', scope:'pilot-only', production:false
  };
  console.log(JSON.stringify(renderPilotReadout,null,2));
</script>
</body>
</html>
