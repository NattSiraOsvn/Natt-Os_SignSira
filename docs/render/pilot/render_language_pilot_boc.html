<!--
  RENDER LANGUAGE PILOT — state: bọc
  marker: render_pilot
  domain: Π_medium
  obitan_layer: n=2
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — bọc</title>
<style>
  :root { --surface-bg: #fdf6f0; --wrap-inner: #f0e0d0; --wrap-outer: #e8c8b0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .natt-render-frame { position: relative; width: 600px; height: 400px; }
  .natt-element { position: absolute; border-radius: 50%; }
  @keyframes wrap-gradient {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  import { RenderStackEngine } from '../../src/cells/render-stack-cell/domain/render-stack.engine.ts';
  
  const engine = new RenderStackEngine();
  
  const instruction = {
    frame_id: 'test-boc-001',
    signals: [
      {
        verb: 'APPEAR',
        element_id: 'wrap-layer',
        origin_state: 'bọc',
        params: { position: 'relative_to("embrace-zone", offset(0,0))' },
        pressure: 0.4,
        degrade_to: null
      },
      {
        verb: 'RECOLOR',
        element_id: 'wrap-layer',
        origin_state: 'bọc',
        params: { from_color: 'rgba(255,200,150,0.3)', to_color: 'rgba(255,220,180,0.1)' },
        pressure: 0.4,
        degrade_to: null
      }
    ],
    attention_map: { mode: 'PERIPHERAL', priority: 0.3, target: null },
    motion_budget: { frame_budget: 100, allocated: 8, remaining: 92 },
    degrade_level: 'NONE',
    truth_boundary: { inside: [], at_boundary: [], outside: ['wrap-layer'] }
  };
  
  const container = engine.execute(instruction);
  
  const el = container.querySelector('#wrap-layer');
  if (el) {
    el.style.width = '100px';
    el.style.height = '100px';
    el.style.left = '50%';
    el.style.top = '50%';
    el.style.transform = 'translate(-50%, -50%)';
    el.style.background = 'radial-gradient(circle at center, var(--wrap-inner), var(--wrap-outer) 80%, transparent 100%)';
    el.style.boxShadow = '0 0 30px 10px rgba(224,200,176,0.3)';
    el.style.animation = 'wrap-gradient 5s ease-in-out infinite';
  }
  
  document.getElementById('app').appendChild(container);
  
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'bọc';
  container.appendChild(label);
  
  const renderPilotReadout = {
    state:'bọc', marker:'render_pilot', domain:'Π_medium',
    obitan_layer:'n=2', polarity:'warm-core',
    pressure_response:'DISSIPATE', reflection_R:0.5, decay_rate:'γ(2)',
    framework:'none', scope:'pilot-only', production:false, engine_version:'v0.2-pilot'
  };
  console.log(JSON.stringify(renderPilotReadout, null, 2));
</script>
</body>
</html>
