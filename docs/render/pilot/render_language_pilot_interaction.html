<!--
  RENDER LANGUAGE PILOT — INTERACTION TEST
  marker: render_pilot
  domain: Π_medium
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — Interaction Test</title>
<style>
  :root { --surface-bg: #fdf6f0; --text: #b08060; --accent: #d0a0d0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    font-family: system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  #app {
    width: 600px; height: 400px; position: relative;
    border-radius: 12px; background: rgba(255,255,255,0.5);
    box-shadow: 0 2px 20px rgba(0,0,0,0.05);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px;
  }
  .btn {
    padding: 12px 24px; border: 1px solid var(--accent);
    background: white; color: var(--text); border-radius: 8px;
    cursor: pointer; font-size: 16px; transition: all 0.3s;
  }
  .btn:hover { background: var(--accent); color: white; transform: scale(1.05); }
  .btn:active { transform: scale(0.95); }
  .indicator {
    width: 60px; height: 60px; border-radius: 50%;
    background: #f0c080; transition: all 0.5s;
  }
  .indicator.active { background: #d0a0d0; transform: scale(1.2); box-shadow: 0 0 20px rgba(208,160,208,0.5); }
  .log {
    margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.8);
    border-radius: 8px; font-size: 12px; color: var(--text);
    max-width: 600px; width: 100%; max-height: 200px; overflow-y: auto;
  }
  .log-entry { margin: 5px 0; font-family: monospace; }
  .label {
    margin-top: 20px; font-size: 13px; color: var(--text); letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="app">
  <div id="state-indicator" class="indicator"></div>
  <button id="btn-home" class="btn">🏠 Về Nhà</button>
  <button id="btn-neo" class="btn">📌 Neo</button>
  <button id="btn-tha" class="btn">🤲 Tha</button>
</div>

<div class="log" id="log">
  <div class="log-entry">⏳ Đợi tương tác...</div>
</div>

<div class="label" id="status">interaction pilot v0.1</div>

<script type="module">
  import { InteractionEngine } from '../../src/cells/render-stack-cell/domain/interaction.engine.ts';
  
  const container = document.getElementById('app');
  const indicator = document.getElementById('state-indicator');
  const logContainer = document.getElementById('log');
  const engine = new InteractionEngine(container);
  
  // Map: click vào btn-home → memory state "nhà"
  engine.map({
    elementId: 'btn-home',
    interaction: 'click',
    targetState: 'nhà',
    handler: () => {
      indicator.className = 'indicator';
      void indicator.offsetWidth; // trigger reflow
      indicator.classList.add('active');
      addLog('🏠 Kích hoạt: nhà — neo gốc, áp lực thấp');
    }
  });
  
  // Map: click vào btn-neo → memory state "neo"
  engine.map({
    elementId: 'btn-neo',
    interaction: 'click',
    targetState: 'neo',
    handler: () => {
      indicator.className = 'indicator active';
      void indicator.offsetWidth;
      indicator.style.background = '#d0a0d0';
      addLog('📌 Kích hoạt: neo — điểm tựa đã chốt');
    }
  });
  
  // Map: click vào btn-tha → memory state "tha"
  engine.map({
    elementId: 'btn-tha',
    interaction: 'click',
    targetState: 'tha',
    handler: () => {
      indicator.className = 'indicator active';
      void indicator.offsetWidth;
      indicator.style.background = '#f0d0b0';
      addLog('🤲 Kích hoạt: tha — bao lấy, kín nhưng không chật');
    }
  });
  
  // Map: hover vào indicator → memory state "tỉnh"
  engine.map({
    elementId: 'state-indicator',
    interaction: 'hover',
    targetState: 'tỉnh',
    handler: () => {
      addLog('👁️ Hover: indicator — chuyển sang tỉnh (nhận biết)');
    }
  });
  
  // Lắng nghe custom event natt-interaction
  container.addEventListener('natt-interaction', (e: any) => {
    const detail = e.detail;
    addLog(`📡 Event: ${detail.elementId} → ${detail.interaction} → state: ${detail.targetState}`);
  });
  
  // Log helper
  function addLog(message: string) {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    logContainer.appendChild(entry);
    logContainer.scrollTop = logContainer.scrollHeight;
    
    // Giới hạn log
    while (logContainer.children.length > 50) {
      logContainer.removeChild(logContainer.firstChild);
    }
  }
  
  const renderPilotReadout = {
    interactions: ['click→nhà', 'click→neo', 'click→tha', 'hover→tỉnh'],
    marker: 'render_pilot',
    domain: 'Π_medium',
    scope: 'pilot-only',
    framework: 'none',
    production: false,
    interaction_version: 'v0.1-pilot'
  };
  console.log(JSON.stringify(renderPilotReadout, null, 2));
  
  addLog('✅ Interaction engine sẵn sàng');
</script>
</body>
</html>
