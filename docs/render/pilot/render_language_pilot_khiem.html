<!--
  RENDER LANGUAGE PILOT — state: khiêm
  marker: render_pilot
  domain: Π_medium
  obitan_layer: n=3
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — khiêm</title>
<style>
  :root { --surface-bg: #fdf6f0; --humble-color: #d0c0f0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .natt-render-frame { position: relative; width: 600px; height: 400px; }
  .natt-element { position: absolute; border-radius: 50%; }
  @keyframes humble-shrink {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(0.5); opacity: 0.2; }
  }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  import { RenderStackEngine } from '../../src/cells/render-stack-cell/domain/render-stack.engine.ts';
  
  const engine = new RenderStackEngine();
  
  const instruction = {
    frame_id: 'test-khiem-001',
    signals: [
      {
        verb: 'RESIZE',
        element_id: 'humble-element',
        origin_state: 'khiêm',
        params: { from_scale: 1.0, to_scale: 0.6 },
        pressure: 0.1,
        degrade_to: null
      },
      {
        verb: 'RECOLOR',
        element_id: 'humble-element',
        origin_state: 'khiêm',
        params: { from_color: 'rgba(180,140,255,0.8)', to_color: 'rgba(180,140,255,0.3)' },
        pressure: 0.1,
        degrade_to: null
      }
    ],
    attention_map: { mode: 'PERIPHERAL', priority: 0.1, target: null },
    motion_budget: { frame_budget: 100, allocated: 5, remaining: 95 },
    degrade_level: 'NONE',
    truth_boundary: { inside: [], at_boundary: [], outside: ['humble-element'] }
  };
  
  const container = engine.execute(instruction);
  
  const el = container.querySelector('#humble-element');
  if (el) {
    el.style.width = '30px';
    el.style.height = '30px';
    el.style.left = '55%';
    el.style.top = '70%';
    el.style.background = 'var(--humble-color)';
    el.style.opacity = '0.6';
    el.style.animation = 'humble-shrink 2s ease-out forwards';
  }
  
  document.getElementById('app').appendChild(container);
  
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'khiêm';
  container.appendChild(label);
  
  const renderPilotReadout = {
    state:'khiêm', marker:'render_pilot', domain:'Π_medium',
    obitan_layer:'n=3', polarity:'cool-rim',
    pressure_response:'DISSIPATE', reflection_R:0.1, decay_rate:'γ(3)',
    framework:'none', scope:'pilot-only', production:false, engine_version:'v0.2-pilot'
  };
  console.log(JSON.stringify(renderPilotReadout, null, 2));
</script>
</body>
</html>
