<!--
  RENDER LANGUAGE PILOT — state: tỉnh
  marker: render_pilot
  domain: Π_body
  obitan_layer: n=2
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — tỉnh</title>
<style>
  :root { --surface-bg: #fdf6f0; --awake-color: #fff5c0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .surface { position: relative; width: 600px; height: 400px; }
  .beacon {
    position: absolute; left: 45%; top: 60%;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--awake-color);
    box-shadow: 0 0 20px 10px rgba(255,245,192,0.8);
    animation: awake-pulse 1.5s ease-in-out infinite;
  }
  @keyframes awake-pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.3); opacity: 1; }
  }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="surface">
  <div class="beacon"></div>
  <div class="label">tỉnh</div>
</div>
<script>
  const renderPilotReadout = {
    state:'tỉnh', marker:'render_pilot', domain:'Π_body',
    obitan_layer:'n=2', polarity:'warm-core',
    pressure_response:'FALL', reflection_R:0.1, decay_rate:'γ(2)*0.8',
    framework:'none', scope:'pilot-only', production:false
  };
  console.log(JSON.stringify(renderPilotReadout,null,2));
</script>
</body>
</html>
