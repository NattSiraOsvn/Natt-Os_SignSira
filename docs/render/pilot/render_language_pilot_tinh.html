<!--
  RENDER LANGUAGE PILOT — state: tỉnh
  marker: render_pilot
  domain: Π_body
  obitan_layer: n=2
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — tỉnh</title>
<style>
  :root { --surface-bg: #fdf6f0; --awake-color: #fff5c0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .natt-render-frame { position: relative; width: 600px; height: 400px; }
  .natt-element { position: absolute; border-radius: 50%; }
  @keyframes awake-pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.3); opacity: 1; }
  }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  import { RenderStackEngine } from '../../src/cells/render-stack-cell/domain/render-stack.engine.ts';
  
  const engine = new RenderStackEngine();
  
  const instruction = {
    frame_id: 'test-tinh-001',
    signals: [
      {
        verb: 'APPEAR',
        element_id: 'awake-beacon',
        origin_state: 'tỉnh',
        params: { position: 'relative_to("root-surface", offset(-100, 50))' },
        pressure: 0.7,
        degrade_to: null
      },
      {
        verb: 'RECOLOR',
        element_id: 'awake-beacon',
        origin_state: 'tỉnh',
        params: { from_color: 'rgba(255,240,200,0.9)', to_color: 'rgba(255,255,220,1.0)' },
        pressure: 0.7,
        degrade_to: null
      },
      {
        verb: 'PULSE',
        element_id: 'awake-beacon',
        origin_state: 'tỉnh',
        params: { frequency: 2, amplitude: 0.3 },
        pressure: 0.7,
        degrade_to: null
      }
    ],
    attention_map: { mode: 'FOCUS', priority: 1.0, target: 'awake-beacon' },
    motion_budget: { frame_budget: 100, allocated: 25, remaining: 75 },
    degrade_level: 'NONE',
    truth_boundary: { inside: [], at_boundary: ['awake-beacon'], outside: [] }
  };
  
  const container = engine.execute(instruction);
  
  const el = container.querySelector('#awake-beacon');
  if (el) {
    el.style.width = '20px';
    el.style.height = '20px';
    el.style.left = '45%';
    el.style.top = '60%';
    el.style.background = 'var(--awake-color)';
    el.style.boxShadow = '0 0 20px 10px rgba(255,245,192,0.8)';
    el.style.animation = 'awake-pulse 1.5s ease-in-out infinite';
  }
  
  document.getElementById('app').appendChild(container);
  
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'tỉnh';
  container.appendChild(label);
  
  const renderPilotReadout = {
    state:'tỉnh', marker:'render_pilot', domain:'Π_body',
    obitan_layer:'n=2', polarity:'warm-core',
    pressure_response:'FALL', reflection_R:0.1, decay_rate:'γ(2)*0.8',
    framework:'none', scope:'pilot-only', production:false, engine_version:'v0.2-pilot'
  };
  console.log(JSON.stringify(renderPilotReadout, null, 2));
</script>
</body>
</html>
