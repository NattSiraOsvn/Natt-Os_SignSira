<!--
  RENDER LANGUAGE PILOT — state: biên
  marker: render_pilot
  domain: Π_body
  obitan_layer: n=0
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — biên</title>
<style>
  :root { --surface-bg: #fdf6f0; --edge-color: #c00000; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .natt-render-frame { position: relative; width: 600px; height: 400px; }
  .natt-element { position: absolute; }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  import { RenderStackEngine } from '../../src/cells/render-stack-cell/domain/render-stack.engine.ts';
  
  const engine = new RenderStackEngine();
  
  const instruction = {
    frame_id: 'test-bien-001',
    signals: [
      {
        verb: 'APPEAR',
        element_id: 'truth-edge',
        origin_state: 'biên',
        params: { position: 'absolute(300, 0)' },
        pressure: 1.0,
        degrade_to: null
      }
    ],
    attention_map: { mode: 'NONE', priority: 0, target: null },
    motion_budget: { frame_budget: 100, allocated: 5, remaining: 95 },
    degrade_level: 'NONE',
    truth_boundary: { inside: [], at_boundary: ['truth-edge'], outside: [] }
  };
  
  const container = engine.execute(instruction);
  
  const el = container.querySelector('#truth-edge');
  if (el) {
    el.style.left = '300px';
    el.style.top = '0';
    el.style.width = '2px';
    el.style.height = '400px';
    el.style.background = 'var(--edge-color)';
    el.style.boxShadow = '0 0 8px 2px rgba(192,0,0,0.5)';
    el.style.borderRadius = '0';
  }
  
  document.getElementById('app').appendChild(container);
  
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'biên';
  container.appendChild(label);
  
  const renderPilotReadout = {
    state:'biên', marker:'render_pilot', domain:'Π_body',
    obitan_layer:'n=0', polarity:'cool-rim',
    pressure_response:'OSCILLATE', reflection_R:1.0, decay_rate:0,
    framework:'none', scope:'pilot-only', production:false, engine_version:'v0.2-pilot'
  };
  console.log(JSON.stringify(renderPilotReadout, null, 2));
</script>
</body>
</html>
