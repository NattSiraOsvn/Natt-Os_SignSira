<!--
  RENDER LANGUAGE PILOT — state: gánh
  marker: render_pilot
  domain: Π_medium
  obitan_layer: n=2
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — gánh</title>
<style>
  :root { --surface-bg: #fdf6f0; --carry-color: #d0c0a0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .surface { position: relative; width: 600px; height: 400px; }
  .bearer {
    position: absolute; left: 20%; top: 80%;
    transform: translate(-50%, -50%);
    width: 40px; height: 30px;
    background: var(--carry-color);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    animation: carry-load 2s ease-in-out infinite alternate;
  }
  @keyframes carry-load {
    0% { transform: translate(-50%, -50%) scaleY(1); }
    100% { transform: translate(-50%, -50%) scaleY(0.9) translateY(2px); }
  }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="surface">
  <div class="bearer"></div>
  <div class="label">gánh</div>
</div>
<script>
  const renderPilotReadout = {
    state:'gánh', marker:'render_pilot', domain:'Π_medium',
    obitan_layer:'n=2', polarity:'cool-rim',
    pressure_response:'FALL', reflection_R:0.9, decay_rate:'γ(2)*1.2',
    framework:'none', scope:'pilot-only', production:false
  };
  console.log(JSON.stringify(renderPilotReadout,null,2));
</script>
</body>
</html>
