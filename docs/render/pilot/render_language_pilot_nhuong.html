<!--
  RENDER LANGUAGE PILOT — state: nhường
  marker: render_pilot
  domain: Π_medium
  obitan_layer: n=2
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — nhường</title>
<style>
  :root { --surface-bg: #fdf6f0; --yield-color: #e0e0d0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .natt-render-frame { position: relative; width: 600px; height: 400px; }
  .natt-element { position: absolute; }
  @keyframes yield-space {
    0% { transform: translate(0, 0); opacity: 0.8; }
    100% { transform: translate(50px, 0) scale(0.9); opacity: 0.4; }
  }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  import { RenderStackEngine } from '../../src/cells/render-stack-cell/domain/render-stack.engine.ts';
  
  const engine = new RenderStackEngine();
  
  const instruction = {
    frame_id: 'test-nhuong-001',
    signals: [
      {
        verb: 'SHIFT',
        element_id: 'yielding-element',
        origin_state: 'nhường',
        params: { from: 'position(200,100)', to: 'position(250,100)', easing: 'ease-out' },
        pressure: 0.3,
        degrade_to: null
      },
      {
        verb: 'RESIZE',
        element_id: 'yielding-element',
        origin_state: 'nhường',
        params: { from_scale: 1.0, to_scale: 0.9 },
        pressure: 0.3,
        degrade_to: null
      }
    ],
    attention_map: { mode: 'PERIPHERAL', priority: 0.2, target: null },
    motion_budget: { frame_budget: 100, allocated: 8, remaining: 92 },
    degrade_level: 'NONE',
    truth_boundary: { inside: [], at_boundary: [], outside: ['yielding-element'] }
  };
  
  const container = engine.execute(instruction);
  
  const el = container.querySelector('#yielding-element');
  if (el) {
    el.style.width = '50px';
    el.style.height = '50px';
    el.style.left = '40%';
    el.style.top = '60%';
    el.style.background = 'var(--yield-color)';
    el.style.opacity = '0.8';
    el.style.borderRadius = '0';
    el.style.animation = 'yield-space 2s ease-out forwards';
  }
  
  document.getElementById('app').appendChild(container);
  
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'nhường';
  container.appendChild(label);
  
  const renderPilotReadout = {
    state:'nhường', marker:'render_pilot', domain:'Π_medium',
    obitan_layer:'n=2', polarity:'neutral',
    pressure_response:'DISSIPATE', reflection_R:0.2, decay_rate:'γ(2)*0.8',
    framework:'none', scope:'pilot-only', production:false, engine_version:'v0.2-pilot'
  };
  console.log(JSON.stringify(renderPilotReadout, null, 2));
</script>
</body>
</html>
