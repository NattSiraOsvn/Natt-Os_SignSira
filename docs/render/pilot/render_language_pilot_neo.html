<!--
  RENDER LANGUAGE PILOT — state: neo
  marker: render_pilot
  domain: Π_body
  obitan_layer: n=1
  scope: pilot only — non production
  framework: none — standalone html
-->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Pilot — neo</title>
<style>
  :root { --surface-bg: #fdf6f0; --neo-color: #d0a0d0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--surface-bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
  }
  .natt-render-frame { position: relative; width: 600px; height: 400px; }
  .natt-element { position: absolute; border-radius: 50%; }
  @keyframes natt-pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(var(--pulse-scale, 1.2)); opacity: 1; }
  }
  .label {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); font-size: 13px;
    color: #b08060; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  import { RenderStackEngine } from '../../src/cells/render-stack-cell/domain/render-stack.engine.ts';
  
  const engine = new RenderStackEngine();
  
  const instruction = {
    frame_id: 'test-neo-001',
    signals: [
      {
        verb: 'APPEAR',
        element_id: 'truth-pillar-01',
        origin_state: 'neo',
        params: { position: 'relative_to("root-surface", offset(120, 0))' },
        pressure: 0.0,
        degrade_to: null
      },
      {
        verb: 'RESIZE',
        element_id: 'truth-pillar-01',
        origin_state: 'neo',
        params: { from_scale: 0.8, to_scale: 1.0 },
        pressure: 0.0,
        degrade_to: null
      }
    ],
    attention_map: { mode: 'FOCUS', priority: 1.0, target: 'truth-pillar-01' },
    motion_budget: { frame_budget: 100, allocated: 15, remaining: 85 },
    degrade_level: 'NONE',
    truth_boundary: { inside: ['truth-pillar-01'], at_boundary: [], outside: [] }
  };
  
  const container = engine.execute(instruction);
  
  const el = container.querySelector('#truth-pillar-01');
  if (el) {
    el.style.width = '30px';
    el.style.height = '30px';
    el.style.left = '50%';
    el.style.top = '50%';
    el.style.transform = 'translate(-50%, -50%) scale(1)';
    el.style.background = 'var(--neo-color)';
    el.style.boxShadow = '0 0 20px 5px rgba(208,160,208,0.6)';
    el.style.animation = 'none';
    el.style.animation = 'neo-appear 1.5s ease-out forwards';
    const styleSheet = document.createElement('style');
    styleSheet.textContent = `
      @keyframes neo-appear {
        0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      }
    `;
    document.head.appendChild(styleSheet);
  }
  
  document.getElementById('app').appendChild(container);
  
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'neo';
  container.appendChild(label);
  
  const renderPilotReadout = {
    state:'neo', marker:'render_pilot', domain:'Π_body',
    obitan_layer:'n=1', polarity:'cool-rim',
    pressure_response:'FALL', reflection_R:0.85, decay_rate:'γ(1)',
    framework:'none', scope:'pilot-only', production:false, engine_version:'v0.2-pilot'
  };
  console.log(JSON.stringify(renderPilotReadout, null, 2));
</script>
</body>
</html>
