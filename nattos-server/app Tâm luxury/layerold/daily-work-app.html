<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>natt-os — Daily Work</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --gold:    #C9A84C;
    --gold-lt: #F0D080;
    --black:   #0A0A0A;
    --dark:    #111318;
    --panel:   #16191F;
    --border:  rgba(201,168,76,0.18);
    --text:    #E8E4DC;
    --muted:   #6B7280;
    --red:     #EF4444;
    --green:   #10B981;
    --blue:    #3B82F6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position: fixed; inset: 0; z-index: 100;
    background: var(--black);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }

  .login-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 6px; color: var(--gold);
    margin-bottom: 40px; opacity: 0.7; text-transform: uppercase;
  }

  .login-box {
    width: 380px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--panel);
    padding: 36px;
    position: relative;
    overflow: hidden;
  }
  .login-box::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .login-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .login-box p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap input::placeholder { color: var(--muted); }

  #employee-list {
    max-height: 220px; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--gold) transparent;
  }
  .emp-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background .15s;
    display: flex; align-items: center; gap: 10px;
  }
  .emp-item:hover { background: rgba(201,168,76,0.08); }
  .emp-item.selected { background: rgba(201,168,76,0.15); }
  .emp-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--gold); display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; color: var(--black); flex-shrink: 0;
  }
  .emp-name { font-size: 13px; font-weight: 500; }
  .emp-role { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .btn-login {
    width: 100%; padding: 13px;
    background: var(--gold);
    border: none; border-radius: 8px;
    color: var(--black); font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: opacity .2s, transform .1s;
    letter-spacing: 0.5px;
  }
  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-login:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── MAIN APP ── */
  #app { display: none; min-height: 100vh; }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-left {
    display: flex; align-items: center; gap: 16px;
  }
  .topbar-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--gold); font-weight: 600;
    letter-spacing: 2px;
  }
  .topbar-divider { width: 1px; height: 20px; background: var(--border); }
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px 4px 4px;
  }
  .user-chip .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--gold); display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; color: var(--black);
  }
  .user-chip .info { font-size: 12px; }
  .user-chip .info strong { display: block; font-weight: 600; }
  .user-chip .info span { color: var(--muted); font-size: 10px; }

  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .badge-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 20px;
    border: 1px solid;
  }
  .badge-GIAM_DOC  { color: #F59E0B; border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
  .badge-QUAN_LY   { color: #8B5CF6; border-color: rgba(139,92,246,0.3); background: rgba(139,92,246,0.08); }
  .badge-TRUONG_BP { color: #3B82F6; border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); }
  .badge-KINH_DOANH{ color: #10B981; border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.08); }
  .badge-SAN_XUAT  { color: #EF4444; border-color: rgba(239,68,68,0.3);  background: rgba(239,68,68,0.08); }
  .badge-VAN_PHONG { color: #6B7280; border-color: rgba(107,114,128,0.3);background: rgba(107,114,128,0.08); }

  .btn-logout {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 12px; padding: 5px 12px; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif;
    transition: color .2s, border-color .2s;
  }
  .btn-logout:hover { color: var(--text); border-color: var(--gold); }

  /* ── MAIN CONTENT ── */
  .main { padding: 28px 24px; max-width: 1100px; margin: 0 auto; }

  /* ── GREETING ── */
  .greeting { margin-bottom: 28px; }
  .greeting h1 {
    font-size: 26px; font-weight: 800;
    background: linear-gradient(135deg, var(--text) 0%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .greeting p { font-size: 13px; color: var(--muted); }

  /* ── KPI STRIP ── */
  .kpi-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
    position: relative; overflow: hidden;
    transition: border-color .2s, transform .15s;
    cursor: default;
  }
  .kpi-card:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-2px); }
  .kpi-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--accent, var(--gold)); opacity: 0.5;
  }
  .kpi-label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
  .kpi-value { font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 11px; letter-spacing: 3px; color: var(--gold);
    text-transform: uppercase; font-weight: 600;
    margin-bottom: 14px; margin-top: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── TASK GRID ── */
  .task-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .task-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 18px;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: flex-start; gap: 14px;
    text-decoration: none;
    position: relative; overflow: hidden;
  }
  .task-card:hover { border-color: rgba(201,168,76,0.5); transform: translateY(-2px); background: rgba(22,25,31,0.8); }
  .task-card.priority-HIGH::before {
    content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: var(--red);
  }
  .task-card.priority-MEDIUM::before {
    content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: var(--gold);
  }
  .task-icon { font-size: 22px; margin-top: 2px; flex-shrink: 0; }
  .task-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .task-meta { font-size: 11px; color: var(--muted); }
  .task-priority {
    position: absolute; top: 12px; right: 12px;
    font-size: 9px; letter-spacing: 1px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px;
  }
  .task-priority.HIGH { background: rgba(239,68,68,0.15); color: var(--red); }
  .task-priority.MEDIUM { background: rgba(201,168,76,0.15); color: var(--gold); }
  .task-priority.LOW { background: rgba(107,114,128,0.15); color: var(--muted); }

  /* ── PERMISSION LIST ── */
  .perm-grid {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px;
  }
  .perm-tag {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    padding: 3px 9px; border-radius: 4px;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    color: #93C5FD;
    letter-spacing: 0.3px;
  }
  .perm-tag.admin { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.2); color: #FCD34D; }
  .perm-tag.danger { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); color: #FCA5A5; }

  /* ── TEAM LIST ── */
  .team-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px; margin-bottom: 28px;
  }
  .team-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .team-card .av {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: var(--gold); display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; color: var(--black);
  }
  .team-card .name { font-size: 12px; font-weight: 600; }
  .team-card .dept { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── LIVE TICKER ── */
  .live-ticker {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .ticker-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .ticker-text { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .ticker-text span { color: var(--text); font-weight: 600; }

  /* ── FADE IN ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp .4s ease both; }
  .delay-1 { animation-delay: .05s; }
  .delay-2 { animation-delay: .10s; }
  .delay-3 { animation-delay: .15s; }
  .delay-4 { animation-delay: .20s; }
  .delay-5 { animation-delay: .25s; }

  /* ── EMPTY ── */
  .empty-msg { text-align: center; color: var(--muted); font-size: 13px; padding: 20px; }
</style>

// ── STATE ─────────────────────────────────────────────────────────
let employees = [];
let selectedEmp = null;
let filtered = [];

// ── FETCH EMPLOYEES ───────────────────────────────────────────────
async function loadEmployees() {
  try {
    // Try local server first
    const resp = await fetch('http://localhost:3001/api/health', { signal: AbortSignal.timeout(1000) });
    if (resp.ok) {
      document.getElementById('ticker-text').innerHTML = 'Server <span>LIVE</span> — 3001';
    }
  } catch {}

  // Use embedded sample + indicate real path
  employees = SAMPLE_EMPLOYEES;
  filtered  = employees;
  renderEmployeeList(filtered);
}

// ── FILTER ────────────────────────────────────────────────────────
function filterEmployees(q) {
  const s = q.toLowerCase();
  filtered = employees.filter(e =>
    e.fullName.toLowerCase().includes(s) ||
    e.employeeCode.toLowerCase().includes(s) ||
    e.chucVu.toLowerCase().includes(s) ||
    e.phongBan.toLowerCase().includes(s)
  );
  renderEmployeeList(filtered);
}

function renderEmployeeList(list) {
  const el = document.getElementById('employee-list');
  if (!list.length) { el.innerHTML = '<div class="empty-msg">Không tìm thấy</div>'; return; }
  el.innerHTML = list.slice(0, 30).map(e => {
    const g = ROLE_TO_GROUP[e.chucVu] || 'VAN_PHONG';
    const initial = e.fullName.trim().split(' ').pop()[0].toUpperCase();
    return `<div class="emp-item" onclick="selectEmp('${e.employeeCode}')">
      <div class="emp-avatar" style="background:${groupColor(g)}">${initial}</div>
      <div>
        <div class="emp-name">${e.fullName}</div>
        <div class="emp-role">${e.employeeCode} · ${e.chucVu}</div>
      </div>
    </div>`;
  }).join('');
}

function groupColor(g) {
  const c = {GIAM_DOC:'#F59E0B',QUAN_LY:'#8B5CF6',TRUONG_BP:'#3B82F6',KINH_DOANH:'#10B981',SAN_XUAT:'#EF4444',VAN_PHONG:'#6B7280'};
  return c[g] || '#C9A84C';
}

function selectEmp(code) {
  selectedEmp = employees.find(e => e.employeeCode === code);
  document.querySelectorAll('.emp-item').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('btn-login').disabled = false;
}

// ── LOGIN ─────────────────────────────────────────────────────────
function doLogin() {
  if (!selectedEmp) return;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderApp(selectedEmp);
}

function doLogout() {
  selectedEmp = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('btn-login').disabled = true;
  document.querySelectorAll('.emp-item').forEach(el => el.classList.remove('selected'));
}

// ── RENDER APP ────────────────────────────────────────────────────
function renderApp(emp) {
  const group   = ROLE_TO_GROUP[emp.chucVu] || 'VAN_PHONG';
  const initial = emp.fullName.trim().split(' ').pop()[0].toUpperCase();
  const now     = new Date();
  const hour    = now.getHours();
  const greeting = hour < 12 ? 'Chào buổi sáng' : hour < 17 ? 'Chào buổi chiều' : 'Chào buổi tối';
  const dateStr = now.toLocaleDateString('vi-VN', { weekday:'long', day:'2-digit', month:'2-digit', year:'numeric' });

  // Topbar
  document.getElementById('topbar-avatar').textContent = initial;
  document.getElementById('topbar-avatar').style.background = groupColor(group);
  document.getElementById('topbar-name').textContent = emp.fullName;
  document.getElementById('topbar-role').textContent = emp.chucVu;
  const gb = document.getElementById('group-badge');
  gb.textContent = GROUP_LABEL[group];
  gb.className = `badge-pill badge-${group}`;

  // Greeting
  document.getElementById('greeting-text').textContent = `${greeting}, ${emp.fullName.split(' ').pop()}!`;
  document.getElementById('greeting-sub').textContent  = `${dateStr} · ${emp.phongBan} · ${emp.chucVu}`;

  // Ticker
  updateTicker(group);

  // KPIs
  const kpis = KPI_BY_GROUP[group] || KPI_BY_GROUP.VAN_PHONG;
  document.getElementById('kpi-strip').innerHTML = kpis.map(k => `
    <div class="kpi-card" style="--accent:${k.accent}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');

  // Tasks
  const tasks = DAILY_TASKS[group] || DAILY_TASKS.VAN_PHONG;
  document.getElementById('task-grid').innerHTML = tasks.map(t => `
    <a class="task-card priority-${t.priority}" href="${t.url}" target="_blank">
      <div class="task-icon">${t.icon}</div>
      <div>
        <div class="task-title">${t.title}</div>
        <div class="task-meta">${t.url !== '#' ? 'Nhấn để mở' : 'Sắp ra mắt'}</div>
      </div>
      <span class="task-priority ${t.priority}">${t.priority}</span>
    </a>`).join('');

  // Permissions
  const perms = GROUP_PERMISSIONS[group] || [];
  document.getElementById('perm-grid').innerHTML = perms.map(p => {
    const cls = ADMIN_PERMS.includes(p) ? 'admin' : DANGER_PERMS.includes(p) ? 'danger' : '';
    return `<span class="perm-tag ${cls}">${p}</span>`;
  }).join('');

  // Team (same dept)
  const teammates = employees.filter(e => e.phongBan === emp.phongBan && e.employeeCode !== emp.employeeCode).slice(0, 12);
  document.getElementById('team-grid').innerHTML = teammates.length
    ? teammates.map(t => {
        const ti = t.fullName.trim().split(' ').pop()[0].toUpperCase();
        const tg = ROLE_TO_GROUP[t.chucVu] || 'VAN_PHONG';
        return `<div class="team-card">
          <div class="av" style="background:${groupColor(tg)}">${ti}</div>
          <div><div class="name">${t.fullName}</div><div class="dept">${t.chucVu}</div></div>
        </div>`;
      }).join('')
    : '<div class="empty-msg">Chỉ có một mình trong phòng này</div>';
}

async function updateTicker(group) {
  try {
    const resp = await fetch('http://localhost:3001/api/health', { signal: AbortSignal.timeout(2000) });
    if (resp.ok) {
      const d = await resp.json();
      document.getElementById('ticker-text').innerHTML =
        `Server <span>LIVE</span> · ${d.sheets} sheets · ${d.liveTabs} live tabs · Sync GSheets mỗi 15 phút`;
      return;
    }
  } catch {}
  document.getElementById('ticker-text').innerHTML = 'Server <span style="color:#EF4444">OFFLINE</span> — cd nattos-sheets-server && node server.js';
}
