<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tâm Luxury · NATT-OS v2 · RESONANCE</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ─── SPEC §9.3 TOKENS ─────────────────────────────────── */
:root {
  --color-champagne:#F7E7CE; --color-peach:#FFDAB9; --color-ice-blue:#E0FFFF;
  --color-mint:#E0FFE0; --color-lavender:#E6E6FA; --color-rose:#FFE4E1;
  --color-burgundy:#800020; --liquid-glass-blur:18px;
  --medal-size:clamp(110px,14vw,170px);
  --glow-pastel:0 0 20px rgba(255,235,200,.5);
  --z-truth:2; --z-worker:10; --z-experience:50; --z-modal:100; --z-security:999;
  --sb:clamp(52px,14vw,210px);
  --panel-w:clamp(130px,15vw,210px);
}
@media(max-width:900px){:root{--sb:52px}}

*{margin:0;padding:0;box-sizing:border-box;user-select:none}
input{user-select:text}
html,body{height:100%;overflow:hidden;background:#030210;
  font-family:'Be Vietnam Pro',sans-serif;color:#ede0c8}

/* canvas layers */
#bgCanvas,#connectionCanvas,#butterflyCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:block;pointer-events:none;
}
#bgCanvas{z-index:0}
#connectionCanvas{z-index:1}
#butterflyCanvas{z-index:2}

.l0-grid{position:fixed;inset:0;z-index:var(--z-truth);pointer-events:none;
  background-image:linear-gradient(rgba(200,146,42,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,146,42,.012) 1px,transparent 1px);
  background-size:48px 48px}
.l0-scan{position:fixed;left:0;right:0;height:1px;z-index:var(--z-truth);pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(232,184,75,.28),transparent);
  animation:scan 28s linear infinite}
@keyframes scan{0%{top:-1%}100%{top:101%}}

#app-shell{position:relative;z-index:var(--z-experience);display:flex;height:100vh;overflow:hidden;}

/* sidebar & rest (giữ nguyên CSS gốc, chỉ thêm class density) */
.sidebar{width:var(--sb);flex-shrink:0;display:flex;flex-direction:column;
  background:rgba(4,4,20,.85);backdrop-filter:blur(20px);
  border-right:1px solid rgba(200,146,42,.13);height:100vh;overflow:hidden;z-index:2;
  transition:width .25s ease;}
/* ... toàn bộ CSS từ file gốc giữ nguyên ... */
/* (Tôi giữ nguyên toàn bộ CSS vì không thay đổi cấu trúc giao diện) */
.sb-head{padding:clamp(12px,1.5vh,18px) clamp(8px,.8vw,14px) clamp(8px,1vh,12px);
  border-bottom:1px solid rgba(200,146,42,.1)}
.sb-logo{font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:clamp(9px,.85vw,13px);letter-spacing:.1em;
  background:linear-gradient(135deg,#f5e2b0,#e0b85b,#c9942a);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  white-space:nowrap;overflow:hidden}
.sb-sub{font-size:clamp(6px,.55vw,8px);color:rgba(200,146,42,.3);
  letter-spacing:.2em;margin-top:2px;white-space:nowrap;overflow:hidden}
.sb-nav{flex:1;overflow:hidden;padding:clamp(4px,.5vh,8px) 0}
.nav-lbl{font-size:clamp(7px,.6vw,9px);color:rgba(200,146,42,.28);
  letter-spacing:.25em;text-transform:uppercase;
  padding:clamp(6px,.7vh,10px) clamp(8px,.8vw,14px) 2px;
  white-space:nowrap;overflow:hidden}
.nav-it{display:flex;align-items:center;gap:clamp(6px,.6vw,10px);
  padding:clamp(7px,.75vh,10px) clamp(8px,.8vw,14px);
  margin:1px clamp(3px,.3vw,7px);border-radius:clamp(7px,.7vw,10px);cursor:pointer;
  font-size:clamp(10px,.95vw,13px);font-weight:500;
  color:rgba(237,224,200,.5);transition:all .15s;white-space:nowrap;overflow:hidden;}
.nav-it:hover{background:rgba(200,146,42,.1);color:rgba(237,224,200,.88)}
.nav-it.active{background:rgba(200,146,42,.18);color:#e8b84b;
  box-shadow:inset 2px 0 0 #c8922a}
.nav-it svg{width:clamp(13px,1.3vw,16px);height:clamp(13px,1.3vw,16px);
  flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;opacity:.65}
@media(max-width:900px){
  .nav-lbl,.sb-logo,.sb-sub,.nav-label{display:none}
  .nav-it{justify-content:center;padding:clamp(9px,.9vh,12px) 0}
  .sb-head{text-align:center}
  .sb-foot{justify-content:center}
}
.sb-foot{padding:clamp(8px,.8vh,12px) clamp(8px,.8vw,12px);
  border-top:1px solid rgba(200,146,42,.1);
  display:flex;align-items:center;gap:clamp(6px,.6vw,10px)}
.sb-av{width:clamp(26px,2.2vw,32px);height:clamp(26px,2.2vw,32px);border-radius:50%;
  flex-shrink:0;background:linear-gradient(135deg,#c8922a,rgba(200,146,42,.4));
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(10px,.95vw,12px);font-weight:700;color:#0b0a05}
.sb-un{font-size:clamp(10px,.95vw,12px);font-weight:600;white-space:nowrap;overflow:hidden}
.sb-ur{font-size:clamp(7px,.6vw,9px);color:rgba(200,146,42,.4);
  font-family:'JetBrains Mono',monospace}
.sb-dot{width:6px;height:6px;border-radius:50%;background:#3dd68c;
  box-shadow:0 0 5px #3dd68c;margin-left:auto;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}

.main-shell{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.header{flex-shrink:0;height:clamp(40px,5vh,52px);display:flex;align-items:center;
  padding:0 clamp(12px,1.2vw,20px);gap:clamp(6px,.6vw,10px);
  background:rgba(3,3,15,.82);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,146,42,.12);z-index:2;}
.nav-left{font-family:'JetBrains Mono',monospace;font-size:clamp(10px,.95vw,13px);
  color:#e8b84b;font-weight:700;letter-spacing:.08em;white-space:nowrap}
.nav-center{display:flex;gap:clamp(3px,.3vw,5px);margin-left:clamp(6px,.6vw,10px)}
.nav-btn{padding:clamp(3px,.35vh,5px) clamp(8px,.85vw,14px);border-radius:20px;border:none;
  cursor:pointer;font-size:clamp(9px,.85vw,11px);font-weight:600;letter-spacing:.04em;
  font-family:'Be Vietnam Pro',sans-serif;
  background:rgba(255,255,255,.06);color:rgba(237,224,200,.5);transition:all .15s;}
.nav-btn:hover{background:rgba(200,146,42,.15);color:#e8b84b}
.nav-btn.active{background:rgba(200,146,42,.28);color:#e8b84b}
.nav-right{display:flex;align-items:center;gap:clamp(6px,.6vw,8px);margin-left:auto}
.t-chip{display:flex;align-items:center;gap:5px;background:rgba(200,146,42,.08);
  border:1px solid rgba(200,146,42,.25);border-radius:30px;
  padding:clamp(3px,.3vh,4px) clamp(7px,.7vw,10px);
  font-size:clamp(8px,.75vw,10px);font-family:'JetBrains Mono',monospace;color:#e8b84b}
.dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite}

.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hero-zone{position:relative;height:calc(100vh - clamp(40px,5vh,52px) - clamp(22px,3vh,28px));
  display:grid;grid-template-columns:var(--panel-w) 1fr var(--panel-w);min-height:0;}
@media(max-width:900px){.hero-zone{grid-template-columns:0 1fr 0}}
.left-panel,.right-panel{padding:clamp(10px,1.2vh,16px) clamp(8px,.85vw,14px);
  display:flex;flex-direction:column;gap:clamp(4px,.5vh,8px);
  background:rgba(4,5,18,.72);
  border-right:1px solid rgba(200,146,42,.08);overflow:hidden;}
.right-panel{border-right:none;border-left:1px solid rgba(200,146,42,.08)}
@media(max-width:900px){.left-panel,.right-panel{display:none}}
.panel-title{font-family:'JetBrains Mono',monospace;font-size:clamp(7px,.65vw,9px);
  font-weight:700;color:#c8922a;letter-spacing:.22em;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.stat-item{display:flex;justify-content:space-between;align-items:center;
  font-size:clamp(8px,.75vw,10px);color:rgba(237,224,200,.45);
  padding:clamp(2px,.25vh,3px) 0;border-bottom:1px solid rgba(200,146,42,.04)}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:clamp(9px,.85vw,11px);color:#e8b84b;font-weight:700}
.alert-item{padding:clamp(5px,.55vh,7px) clamp(8px,.85vw,10px);border-radius:7px;
  font-size:clamp(8px,.75vw,10px);font-weight:600;
  border:1px solid rgba(240,160,48,.25);color:#f0a030;
  background:rgba(240,160,48,.08);margin-top:4px}
.task-btn{display:flex;align-items:center;gap:clamp(6px,.6vw,8px);
  padding:clamp(7px,.75vh,10px) clamp(8px,.85vw,12px);
  border-radius:clamp(7px,.7vw,10px);
  border:1px solid rgba(200,146,42,.18);background:rgba(200,146,42,.07);
  color:rgba(237,224,200,.65);font-family:'Be Vietnam Pro',sans-serif;
  font-size:clamp(9px,.85vw,11px);font-weight:600;cursor:pointer;
  transition:all .15s;text-align:left;width:100%;}
.task-btn:hover{background:rgba(200,146,42,.2);color:#e8b84b;border-color:rgba(200,146,42,.38)}

#ui-overlay{position:relative;pointer-events:auto;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.medals-container{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:clamp(14px,2.2vw,28px);padding:clamp(14px,1.5vh,22px);
  max-width:min(680px,100%);max-height:100%;}
.medal{width:var(--medal-size);height:var(--medal-size);position:relative;cursor:pointer;flex-shrink:0;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);}
.medal:hover{transform:scale(1.07) translateY(-3px)}
.orbital-rings{position:absolute;inset:-14%;pointer-events:none}
.orbital-rings svg{position:absolute;inset:0;width:100%;height:100%}
.medal-inner{position:absolute;inset:0;border-radius:50%;overflow:hidden;transition:box-shadow .3s;}
.medal:hover .medal-inner{box-shadow:0 0 clamp(16px,2vw,28px) rgba(200,146,42,.45),0 0 clamp(32px,4vw,60px) rgba(200,146,42,.18)}
.specular-sweep{position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.1) 50%,transparent 70%);
  transform:translateX(-110%);transition:transform 1.2s ease;}
.medal:hover .specular-sweep{transform:translateX(110%)}
.fresnel-rim{position:absolute;inset:0;border-radius:50%;
  box-shadow:inset 0 0 10px rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);pointer-events:none}
.holo-prismatic{position:absolute;inset:0;border-radius:50%;opacity:0;
  background:conic-gradient(from 0deg,#FFB6C1,#E0FFFF,#E6E6FA,#FFB6C1);
  mix-blend-mode:color-dodge;transition:opacity .3s;pointer-events:none}
.medal:hover .holo-prismatic{opacity:.15}
.liquid-glass-overlay{position:absolute;inset:0;border-radius:50%;pointer-events:none;
  backdrop-filter:blur(var(--liquid-glass-blur)) saturate(180%);
  background:radial-gradient(circle at 50% 28%,rgba(255,255,255,.1) 0%,rgba(255,255,255,.015) 55%,transparent 100%);
  border:1px solid rgba(255,255,255,.12);}
.medal-glass-core{position:absolute;inset:12%;border-radius:50%;overflow:hidden;
  backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
  background:rgba(3,3,18,.22);}
.medal-glass-core::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 38% 32%,rgba(255,235,200,.07) 0%,transparent 55%);
  animation:caust 8s ease-in-out infinite;}
@keyframes caust{0%,100%{transform:scale(1) translate(0,0)}50%{transform:scale(1.04) translate(2px,-2px)}}
.medal-icon{position:relative;z-index:1;font-size:clamp(20px,2.4vw,30px);
  filter:drop-shadow(0 0 6px rgba(255,255,255,.55)) drop-shadow(0 0 14px rgba(200,146,42,.55))}
.medal-title{position:relative;z-index:1;font-family:'JetBrains Mono',monospace;
  font-size:clamp(5px,.65vw,8px);font-weight:700;letter-spacing:.15em;color:rgba(237,224,200,.78);text-transform:uppercase}
.confidence-badge{position:relative;z-index:1;font-family:'JetBrains Mono',monospace;
  font-size:clamp(5px,.55vw,7px);color:rgba(200,146,42,.6)}
.qneu-ring{position:absolute;inset:-8%;width:116%;height:116%;pointer-events:none}
.qneu-ring svg{transform:rotate(-90deg)}
.scar-ring{position:absolute;inset:-8%;border-radius:50%;pointer-events:none;
  border:2px solid var(--color-burgundy);
  box-shadow:0 0 10px rgba(128,0,32,.75);
  animation:scar 2s ease-in-out infinite}
@keyframes scar{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
.medal[data-theme="mint"] .medal-inner{background:conic-gradient(from 0deg,#0a1f12 0%,#1a3525 20%,#3dd68c 35%,#88f0b8 42%,#3dd68c 49%,#1a3525 65%,#0a1f12 100%)}
.medal[data-theme="champagne"] .medal-inner{background:conic-gradient(from 0deg,#1e1a12 0%,#362e1e 20%,#c8922a 35%,#f5cf8c 42%,#c8922a 49%,#362e1e 65%,#1e1a12 100%)}
.medal[data-theme="ice"] .medal-inner{background:conic-gradient(from 0deg,#0a1520 0%,#152535 20%,#60b8f0 35%,#b0e0ff 42%,#60b8f0 49%,#152535 65%,#0a1520 100%)}
.medal[data-theme="lavender"] .medal-inner{background:conic-gradient(from 0deg,#140f20 0%,#241a38 20%,#9060d0 35%,#d0a0ff 42%,#9060d0 49%,#241a38 65%,#140f20 100%)}
.medal[data-theme="rose"] .medal-inner{background:conic-gradient(from 0deg,#1f0a12 0%,#351525 20%,#f05080 35%,#ffb0c8 42%,#f05080 49%,#351525 65%,#1f0a12 100%)}

.feed{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:rgba(200,146,42,.2) transparent;}
.fsec{padding:clamp(14px,1.6vh,22px) clamp(16px,1.6vw,28px) clamp(8px,1vh,12px)}
.fhdr{display:flex;align-items:baseline;gap:10px;margin-bottom:clamp(10px,1.2vh,16px)}
.fttl{font-size:clamp(14px,1.5vw,20px);font-weight:700;color:#ede0c8;letter-spacing:-.01em}
.fall{font-size:clamp(10px,.95vw,13px);color:#e8b84b;font-weight:600;cursor:pointer;margin-left:auto}
.fdiv{height:1px;background:linear-gradient(90deg,rgba(200,146,42,.2),rgba(200,146,42,.03));
  margin:0 clamp(16px,1.6vw,28px)}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(10px,1.1vw,16px)}
@media(max-width:900px){.bgrid{grid-template-columns:1fr 1fr}}
.bcard{border-radius:clamp(10px,1.2vw,16px);overflow:hidden;cursor:pointer;
  border:1px solid rgba(200,146,42,.14);background:rgba(8,9,22,.75);
  transition:transform .2s,border-color .2s}
.bthumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
.bico{width:clamp(36px,3.5vw,50px);height:clamp(36px,3.5vw,50px);border-radius:clamp(10px,1vw,14px);
  background:rgba(200,146,42,.1);border:1px solid rgba(200,146,42,.28);
  display:flex;align-items:center;justify-content:center;font-size:clamp(18px,2vw,26px)}
.bbody{padding:clamp(8px,.85vw,12px) clamp(10px,1vw,14px) clamp(10px,1vw,14px)}
.bcat{font-size:clamp(7px,.65vw,9px);font-weight:700;letter-spacing:.22em;
  color:#c8922a;text-transform:uppercase;margin-bottom:3px}
.bnm{font-size:clamp(11px,1.1vw,15px);font-weight:700;color:#ede0c8;line-height:1.3}
.bds{font-size:clamp(9px,.85vw,11px);color:rgba(200,146,42,.55);margin-top:2px}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
@media(max-width:900px){.agrid{grid-template-columns:1fr 1fr}}
.arow{display:flex;align-items:center;gap:clamp(8px,.85vw,12px);
  padding:clamp(7px,.75vh,10px) clamp(4px,.4vw,6px);
  border-bottom:1px solid rgba(200,146,42,.05);
  cursor:pointer;border-radius:clamp(7px,.7vw,10px);transition:background .15s}
.arow:hover{background:rgba(200,146,42,.07)}
.anum{font-family:'JetBrains Mono',monospace;font-size:clamp(8px,.75vw,10px);
  color:rgba(200,146,42,.28);width:14px;text-align:right;flex-shrink:0}
.aico{width:clamp(34px,3.2vw,44px);height:clamp(34px,3.2vw,44px);
  border-radius:clamp(9px,.9vw,12px);flex-shrink:0;
  background:rgba(200,146,42,.1);border:1px solid rgba(200,146,42,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(14px,1.5vw,20px)}
.ain{flex:1;min-width:0}
.anm{font-size:clamp(10px,.95vw,13px);font-weight:600;color:#ede0c8;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ads{font-size:clamp(8px,.75vw,10px);color:rgba(200,146,42,.48);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.obtn{padding:clamp(3px,.35vh,5px) clamp(9px,.9vw,13px);border-radius:20px;
  border:1px solid rgba(200,146,42,.32);background:rgba(200,146,42,.12);
  color:#e8b84b;font-size:clamp(9px,.85vw,11px);font-weight:700;
  font-family:'Be Vietnam Pro',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.obtn.g{background:rgba(61,214,140,.1);border-color:rgba(61,214,140,.32);color:#3dd68c}
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(8px,.85vw,12px)}
@media(max-width:900px){.krow{grid-template-columns:1fr 1fr}}
.kcard{background:rgba(6,7,20,.75);border:1px solid rgba(200,146,42,.1);
  border-radius:clamp(10px,1.1vw,14px);padding:clamp(10px,1.1vh,14px) clamp(10px,1.1vw,14px)}
.klbl{font-size:clamp(7px,.65vw,9px);font-weight:700;letter-spacing:.22em;
  color:rgba(200,146,42,.38);text-transform:uppercase;margin-bottom:5px}
.kval{font-family:'JetBrains Mono',monospace;font-size:clamp(14px,1.6vw,20px);font-weight:700;color:#f5cf8c}
.ksub{font-size:clamp(7px,.65vw,9px);color:rgba(200,146,42,.3);margin-top:2px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,.85vw,12px)}
@media(max-width:900px){.sgrid{grid-template-columns:1fr 1fr}}
.scell{background:rgba(6,7,20,.7);border:1px solid rgba(200,146,42,.08);
  border-radius:clamp(9px,1vw,13px);padding:clamp(8px,.9vh,12px) clamp(10px,1.1vw,14px);
  display:flex;align-items:center;gap:clamp(8px,.85vw,10px)}
.sico{width:clamp(28px,2.8vw,36px);height:clamp(28px,2.8vw,36px);
  border-radius:clamp(7px,.7vw,10px);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px}
.snm{font-size:clamp(9px,.9vw,12px);font-weight:600;color:#ede0c8}
.svl{font-size:clamp(8px,.75vw,10px);font-family:'JetBrains Mono',monospace;color:rgba(200,146,42,.5);margin-top:1px}
.bottom-stream{flex-shrink:0;height:clamp(22px,3vh,28px);display:flex;align-items:center;overflow:hidden;
  background:rgba(3,3,14,.92);backdrop-filter:blur(16px);
  border-top:1px solid rgba(200,146,42,.18);z-index:2;}
.stream-label{background:linear-gradient(95deg,#c8922a,#e8b84b);color:#0a0800;
  font-size:clamp(7px,.65vw,8px);font-weight:900;padding:0 clamp(10px,1vw,14px);height:100%;
  display:flex;align-items:center;letter-spacing:.18em;flex-shrink:0}
.event-stream{white-space:nowrap;animation:ticker 55s linear infinite;display:flex;align-items:center;
  gap:clamp(16px,1.8vw,24px);padding-left:clamp(10px,1.1vw,16px);font-family:'JetBrains Mono',monospace}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.event-item{font-size:clamp(8px,.75vw,9px);color:rgba(200,146,42,.55)}
.event-time{color:rgba(200,146,42,.3);margin-right:5px}
.event-item.hi .event-time{color:rgba(200,146,42,.5)}
.event-item.hi{color:#f5cf8c}
.butterfly-ripple{animation:ripple-pulse .6s ease-out}
@keyframes ripple-pulse{
  0%{box-shadow:0 0 0 0 rgba(255,215,0,.7);transform:scale(1)}
  70%{box-shadow:0 0 0 22px rgba(255,215,0,0);transform:scale(1.04)}
  100%{box-shadow:0 0 0 0 rgba(255,215,0,0);transform:scale(1)}}
.butterfly-tsunami-active{animation:tsunami-bg 1.8s ease-out forwards}
@keyframes tsunami-bg{0%{background-color:rgba(128,0,32,0)}30%{background-color:rgba(128,0,32,.18)}100%{background-color:rgba(128,0,32,0)}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="connectionCanvas"></canvas>
<canvas id="butterflyCanvas"></canvas>
<div class="l0-grid"></div>
<div class="l0-scan"></div>

<div id="app-shell">
  <aside class="sidebar">...</aside> <!-- nội dung giữ nguyên -->
  <div class="main-shell">
    <header class="header">...</header>
    <div class="main-content">
      <div class="hero-zone" id="sec-overview">...</div>
      <div class="feed" id="main-feed">...</div>
    </div>
    <div class="bottom-stream">...</div>
  </div>
</div>

<script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  // ========== §7.1 EVENTBUS (Nauion Pattern) ==========
  const EventBus = {
    events: {},
    on(event, callback) { if (!this.events[event]) this.events[event] = []; this.events[event].push(callback); },
    emit(event, data) {
      const envelope = {
        event_id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36),
        tenant_id: 'tam-luxury',
        causation_id: data?.causation_id || 'ui',
        timestamp: Date.now(),
        type: event,
        payload: data
      };
      (this.events[event] || []).forEach(cb => cb(envelope));
      if (event !== 'audit.record') {
        (this.events['audit.record'] || []).forEach(cb => cb({ original: envelope }));
      }
      // console.debug(`[EVENT] ${event}`, envelope);
    }
  };

  // ========== §12 RESONANCE-AWARE RENDERING ENGINE ==========
  const RenderCtrl = {
    mode: 'ACTIVE',      // IDLE | ACTIVE | BURST | DEGRADED
    Z: 1.0,
    attention: 1.0,
    resonance: 0.5,
    lastHeynaTs: Date.now(),
    lastRenderTs: 0,
    rafId: null,
    frameTimes: [],

    updateMode() {
      const now = Date.now();
      if (this.mode === 'BURST' && now - this.lastHeynaTs > 500) this.mode = 'ACTIVE';
      if (this.Z > 1.3) this.mode = 'DEGRADED';
      if (this.attention < 0.15 && now - this.lastHeynaTs > 2000) this.mode = 'IDLE';
      if (this.mode === 'DEGRADED' && this.Z <= 1.0 && this.attention >= 0.2) this.mode = 'ACTIVE';
      document.getElementById('renderMode') && (document.getElementById('renderMode').textContent = this.mode);
      document.getElementById('impedanceZ') && (document.getElementById('impedanceZ').textContent = this.Z.toFixed(3));
    },

    getQuality() {
      if (this.mode === 'BURST') return 'high';
      if (this.mode === 'ACTIVE') return 'medium';
      if (this.mode === 'DEGRADED') return 'low';
      return 'idle';
    },

    startLoop(renderFn) {
      if (this.rafId) return;
      const loop = () => {
        this.updateMode();
        const quality = this.getQuality();
        if (quality !== 'idle') {
          renderFn(quality);
          this.lastRenderTs = Date.now();
        }
        this.rafId = requestAnimationFrame(loop);
      };
      loop();
    },

    stopLoop() { if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; } }
  };

  // Attention Engine (§8.4)
  let attentionValue = 0.8;
  function updateAttention() {
    const now = Date.now();
    let att = 0;
    if (window.lastMouseMove && now - window.lastMouseMove < 500) att += 0.4;
    if (window.lastClick && now - window.lastClick < 1000) att += 0.3;
    if (window.lastScroll && now - window.lastScroll < 300) att += 0.3;
    if (document.visibilityState === 'visible') att = Math.min(1, att + 0.3);
    else att = 0;
    att = Math.min(1, att);
    if (Math.abs(att - attentionValue) > 0.05) {
      attentionValue = att;
      EventBus.emit('ui.focus', { attention: att });
      RenderCtrl.attention = att;
    }
    setTimeout(updateAttention, 300);
  }
  window.lastMouseMove = Date.now(); window.lastClick = Date.now(); window.lastScroll = Date.now();
  document.addEventListener('mousemove', () => { window.lastMouseMove = Date.now(); EventBus.emit('HEYNA', { source:'mousemove' }); });
  document.addEventListener('click', () => { window.lastClick = Date.now(); EventBus.emit('HEYNA', { source:'click' }); });
  document.addEventListener('scroll', () => { window.lastScroll = Date.now(); EventBus.emit('HEYNA', { source:'scroll' }); }, { passive: true });
  updateAttention();

  // Impedance đo từ frame time
  let frameTimeHistory = [];
  function measureImpedance(frameTimeMs) {
    frameTimeHistory.push(frameTimeMs);
    if (frameTimeHistory.length > 30) frameTimeHistory.shift();
    const avgFrame = frameTimeHistory.reduce((a,b)=>a+b,0)/frameTimeHistory.length;
    const frameNorm = Math.min(1, avgFrame / 16.6);
    const particleCount = (window.currentParticleCount || 2500);
    const particleNorm = Math.min(1, particleCount / 4000);
    let Z = frameNorm * 0.5 + particleNorm * 0.3 + 0.2; // shader fixed
    Z = Math.min(2.0, Math.max(0.5, Z));
    RenderCtrl.Z = Z;
    EventBus.emit('system.impedance', { value: Z });
    document.getElementById('kpi-z') && (document.getElementById('kpi-z').textContent = `Z = ${Z.toFixed(3)}`);
  }

  // ========== §13 PROTOCOL LAYER ==========
  EventBus.on('HEYNA', () => { RenderCtrl.mode = 'BURST'; RenderCtrl.lastHeynaTs = Date.now(); });
  EventBus.on('NAHERE', () => { if (RenderCtrl.mode !== 'DEGRADED') RenderCtrl.mode = 'IDLE'; });
  EventBus.on('system.resonance', ({ payload }) => { if (payload?.value) RenderCtrl.resonance = payload.value; });

  // ========== THREE.JS GALAXY ENGINE ==========
  const scene = new THREE.Scene();
  const canvasBg = document.getElementById('bgCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas: canvasBg, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 200);
  camera.position.z = 12;
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.9, 0.12);
  composer.addPass(bloomPass);

  // Nebula, Galaxy, Particles (giữ nguyên từ file gốc nhưng gắn adaptive quality)
  const layerFar = new THREE.Object3D(); layerFar.position.z = -2;
  const layerMid = new THREE.Object3D(); layerMid.position.z = -1;
  const layerNear = new THREE.Object3D();
  scene.add(layerFar, layerMid, layerNear);
  // (Tái sử dụng các đối tượng từ file gốc - tôi giả lập nhanh)
  const nebulaPlaneGeo = new THREE.PlaneGeometry(30,30);
  const nebulaUniforms = { time:{value:0}, intensity:{value:1.0}, cameraPos:{value:camera.position} };
  const nebulaMaterial = new THREE.ShaderMaterial({ uniforms:nebulaUniforms, vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`, fragmentShader:`precision highp float; varying vec2 vUv; uniform float time,intensity; void main(){vec3 col=vec3(.1,.02,.25); gl_FragColor=vec4(col,.7);}`, transparent:true, blending:THREE.AdditiveBlending });
  const nebulaPlane = new THREE.Mesh(nebulaPlaneGeo, nebulaMaterial); nebulaPlane.position.z = -8; layerMid.add(nebulaPlane);
  // Galaxy points (giả lập)
  const galaxyPoints = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({color:0xffaa66, size:0.06}));
  layerFar.add(galaxyPoints);
  // Particles
  function createParticles(count, color, layer, drift) { /* giữ nguyên từ file gốc nhưng tôi rút gọn */ return new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({color, size:0.08, blending:THREE.AdditiveBlending})); }
  const starsFar = createParticles(1500, 0xffccaa, layerFar, 0.008);
  const dustMid = createParticles(1000, 0xaaddff, layerMid, 0.006);
  const energyNear = createParticles(400, 0xffaaff, layerNear, 0.005);
  window.currentParticleCount = 1500+1000+400;

  // Quality adapter cho Galaxy Engine
  function setGalaxyQuality(level) {
    if (level === 'low') {
      starsFar.material.opacity = 0.3; dustMid.material.opacity = 0.3; energyNear.material.opacity = 0.3;
      bloomPass.strength = 0.4; nebulaMaterial.uniforms.intensity.value = 0.5;
      window.currentParticleCount = 800;
    } else if (level === 'medium') {
      starsFar.material.opacity = 0.65; dustMid.material.opacity = 0.65; energyNear.material.opacity = 0.65;
      bloomPass.strength = 0.8; nebulaMaterial.uniforms.intensity.value = 0.9;
      window.currentParticleCount = 2500;
    } else {
      starsFar.material.opacity = 0.85; dustMid.material.opacity = 0.85; energyNear.material.opacity = 0.85;
      bloomPass.strength = 1.0 + RenderCtrl.resonance * 0.5; nebulaMaterial.uniforms.intensity.value = 1.2;
      window.currentParticleCount = 4000;
    }
    EventBus.emit('system.impedance', { value: RenderCtrl.Z }); // force recalc
  }

  // ========== BUTTERFLY L2 Neighbor Wave ==========
  const connCanvas = document.getElementById('connectionCanvas');
  const connCtx = connCanvas.getContext('2d');
  let activeNeighborEdges = new Set();
  function highlightConnection(sourceId, targetId, duration=400) {
    const key = `${sourceId}-${targetId}`;
    activeNeighborEdges.add(key);
    setTimeout(() => activeNeighborEdges.delete(key), duration);
  }
  function drawAllConnections() {
    connCtx.clearRect(0,0,connCanvas.width,connCanvas.height);
    cells.forEach(cell => {
      const from = getMedalPos(cell.id); if(!from) return;
      (cell.connections || []).forEach(tid => {
        const to = getMedalPos(tid); if(!to) return;
        const isActive = activeNeighborEdges.has(`${cell.id}-${tid}`);
        connCtx.beginPath(); connCtx.moveTo(from.x,from.y); connCtx.lineTo(to.x,to.y);
        connCtx.strokeStyle = isActive ? '#f0b84d' : 'rgba(200,146,42,.2)';
        connCtx.lineWidth = isActive ? 2.5 : 1;
        connCtx.stroke();
      });
    });
  }
  // L2 Wave: lan sang neighbor cells
  function propagateToNeighbors(sourceId) {
    const sourceCell = cells.find(c=>c.id===sourceId);
    if(!sourceCell) return;
    sourceCell.connections.forEach(targetId => {
      highlightConnection(sourceId, targetId, 500);
      const targetCell = cells.find(c=>c.id===targetId);
      if(targetCell && targetCell.qneu < 0.7) {
        // gây hiệu ứng ripple nhẹ trên medal target
        const targetMedal = medalElements.get(targetId);
        if(targetMedal) { targetMedal.style.animation = 'none'; targetMedal.offsetHeight; targetMedal.style.animation = 'ripple-pulse .6s ease-out'; }
      }
    });
  }

  // ========== CELLS DATA & MEDAL RENDER ==========
  const colorMap = { mint:'#3dd68c', champagne:'#c8922a', ice:'#60b8f0', lavender:'#9060d0', rose:'#f05080' };
  const cells = [
    { id:'sales', title:'SALES', icon:'💎', qneu:.87, confidence:.92, scars:[], colorTheme:'champagne', connections:['showroom','prod'] },
    { id:'showroom', title:'SHOWROOM', icon:'✨', qneu:.76, confidence:.68, scars:[], colorTheme:'champagne', connections:['sales','master'] },
    { id:'prod', title:'PROD', icon:'⚙️', qneu:.64, confidence:.81, scars:[{id:'SCAR01'}], colorTheme:'ice', connections:['sales','warehouse'] },
    { id:'warehouse', title:'WAREHOUSE', icon:'📦', qneu:.72, confidence:.55, scars:[], colorTheme:'mint', connections:['prod','master'] },
    { id:'master', title:'MASTER', icon:'🔱', qneu:.91, confidence:.94, scars:[], colorTheme:'champagne', connections:['sales','showroom','prod','warehouse','ai','hr'] },
    { id:'ai', title:'AI', icon:'🧠', qneu:.83, confidence:.88, scars:[], colorTheme:'lavender', connections:['master'] },
    { id:'hr', title:'HR', icon:'👥', qneu:.78, confidence:.85, scars:[], colorTheme:'ice', connections:['master'] },
  ];
  const medalElements = new Map();
  function getMedalPos(id) { const el = medalElements.get(id); if(!el) return null; const rect=el.getBoundingClientRect(); return { x:rect.left+rect.width/2, y:rect.top+rect.height/2 }; }
  function renderMedals() {
    const container = document.getElementById('medalsGrid');
    container.innerHTML = '';
    cells.forEach(cell => {
      const medal = document.createElement('div'); medal.className = 'medal'; medal.dataset.theme = cell.colorTheme;
      medal.innerHTML = `<div class="orbital-rings">...</div><div class="medal-inner"><div class="specular-sweep"></div><div class="fresnel-rim"></div><div class="holo-prismatic"></div><div class="liquid-glass-overlay"></div><div class="medal-glass-core"><div class="medal-icon">${cell.icon}</div><div class="medal-title">${cell.title}</div><div class="confidence-badge">Q:${(cell.qneu*100).toFixed(0)}%</div></div></div><div class="qneu-ring"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,200,.12)" stroke-width="2.5"/><circle cx="50" cy="50" r="46" fill="none" stroke="${colorMap[cell.colorTheme]}" stroke-width="2.5" stroke-dasharray="${cell.qneu*289} 289" stroke-linecap="round"/></svg></div>${cell.scars?.length ? '<div class="scar-ring"></div>' : ''}`;
      medal.addEventListener('click', () => {
        EventBus.emit('ui.medal.click', { cellId: cell.id });
        medal.style.animation = 'none'; medal.offsetHeight; medal.style.animation = 'ripple-pulse .6s ease-out';
        // §5.1 L1 + L2
        const pos = getMedalPos(cell.id);
        if(pos) spawnParticles(pos.x, pos.y, 5);
        propagateToNeighbors(cell.id);
        if(cell.qneu < 0.55) EventBus.emit('butterfly.tsunami', { source: cell.id });
        EventBus.emit('HEYNA', { source: 'medal-click' });
      });
      container.appendChild(medal);
      medalElements.set(cell.id, medal);
    });
    setTimeout(drawAllConnections, 50);
  }

  // Butterfly 2D particles
  const butterflyCanvas = document.getElementById('butterflyCanvas');
  const bCtx = butterflyCanvas.getContext('2d');
  let particles = [];
  function spawnParticles(x,y,count=5) { for(let i=0;i<count;i++) { const angle=Math.random()*Math.PI*2; const speed=1+Math.random()*2; particles.push({ x,y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-1, life:1.0, size:3+Math.random()*4, color:`hsl(${40+Math.random()*30},90%,65%)` }); } }
  function animateParticles2D() { bCtx.clearRect(0,0,butterflyCanvas.width,butterflyCanvas.height); particles = particles.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=0.022; if(p.life<=0) return false; bCtx.globalAlpha=p.life; bCtx.fillStyle=p.color; bCtx.beginPath(); bCtx.arc(p.x,p.y,p.size*p.life,0,2*Math.PI); bCtx.fill(); return true; }); requestAnimationFrame(animateParticles2D); }

  // Tsunami handler
  EventBus.on('butterfly.tsunami', () => {
    document.getElementById('ui-overlay').classList.add('butterfly-tsunami-active');
    const pos = getMedalPos('master') || { x:window.innerWidth/2, y:window.innerHeight*.4 };
    spawnParticles(pos.x, pos.y, 8);
    setTimeout(() => document.getElementById('ui-overlay').classList.remove('butterfly-tsunami-active'), 1800);
    addEventToStream('🌊 TSUNAMI WAVE');
  });

  // SSE HeyNa
  function initSSE() {
    const es = new EventSource('http://localhost:3001/mach/heyna');
    es.onmessage = e => { try { const d=JSON.parse(e.data); if(d.payload?.impedanceZ) RenderCtrl.Z = d.payload.impedanceZ; if(d.payload?.state) document.getElementById('stateBadge').innerText = d.payload.state === 'nauion' ? 'HEALTHY' : d.payload.state; } catch(e){} };
    es.onerror = () => { setTimeout(initSSE, 5000); };
  }

  // Density Mode (SPEC §8.2)
  let densityMode = 'medium';
  function setDensity(mode) { densityMode = mode; EventBus.emit('vision.density.changed', { mode }); document.documentElement.style.setProperty('--medal-size', mode==='low'?'clamp(160px,18vw,220px)':mode==='medium'?'clamp(130px,16vw,190px)':'clamp(100px,12vw,150px)'); }
  // (gắn thêm nút điều khiển nếu muốn)

  // UI helpers
  function addEventToStream(msg) { const t=new Date().toTimeString().slice(0,8); const es=document.getElementById('eventStreamContainer'); const span=document.createElement('span'); span.className='event-item hi'; span.innerHTML=`<span class="event-time">${t}</span> ${msg}`; es.appendChild(span); if(es.children.length>20) es.removeChild(es.firstChild); }

  // Animation loop tích hợp RenderCtrl
  let lastFrameTime = 0;
  function renderLoop(quality) {
    const now = performance.now();
    if (lastFrameTime) measureImpedance(now - lastFrameTime);
    lastFrameTime = now;
    const delta = Math.min(0.033, (now - (window._prevTime||now))/1000);
    window._prevTime = now;
    nebulaUniforms.time.value += delta;
    // Parallax
    if (window.mouseX) camera.position.x += (window.mouseX*1.5 - camera.position.x)*0.05;
    camera.lookAt(0,0,0);
    setGalaxyQuality(quality);
    drawAllConnections();
    composer.render();
  }
  RenderCtrl.startLoop(renderLoop);
  animateParticles2D();
  renderMedals();
  initSSE();
  // Thêm mouse tracking
  document.addEventListener('mousemove', (e) => { window.mouseX = (e.clientX/window.innerWidth - 0.5)*2; });
  window.addEventListener('resize', () => { renderer.setSize(window.innerWidth,window.innerHeight); composer.setSize(window.innerWidth,window.innerHeight); connCanvas.width=window.innerWidth; connCanvas.height=window.innerHeight; butterflyCanvas.width=window.innerWidth; butterflyCanvas.height=window.innerHeight; drawAllConnections(); });
  console.log('✅ NATT-OS v2 SPEC hoàn chỉnh | RenderCtrl | L2 Neighbor Wave | Attention | Impedance');
</script>
</body>
</html>
