<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NATT-OS · CONTROL TOWER · Responsive</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    /* ---------- RESET & TOKENS ---------- */
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #030308; font-family: 'Be Vietnam Pro', sans-serif; }
    body { position: relative; color: #eee; }

    :root {
      --color-champagne: #F7E7CE;
      --color-gold: #FFD700;
      --liquid-glass-blur: 18px;
      --medal-size: clamp(90px, 12vw, 150px);
      --border-light: 1px solid rgba(255,255,255,0.15);
    }

    /* Canvas layers */
    #bgCanvas, #connectionCanvas, #butterflyCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }
    #bgCanvas { z-index: 0; }
    #connectionCanvas { z-index: 1; }
    #butterflyCanvas { z-index: 2; }

    /* ----- CONTROL TOWER GRID LAYOUT (responsive) ----- */
    #ui-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: grid;
      grid-template-columns: clamp(180px, 20vw, 260px) 1fr clamp(200px, 22vw, 300px);
      grid-template-rows: 64px 1fr 90px;
      height: 100vh;
      width: 100%;
      pointer-events: none;
    }

    /* Tất cả panel tự bắt sự kiện */
    .header, .left-panel, .core-panel, .right-panel, .bottom-stream {
      pointer-events: auto;
      backdrop-filter: blur(12px);
      background: rgba(10, 10, 20, 0.35);
      border: var(--border-light);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    /* ----- HEADER (NAVIGATION) ----- */
    .header {
      grid-column: 1 / 4;
      grid-row: 1;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: rgba(6, 8, 16, 0.7);
      border-bottom: 1px solid rgba(200,146,42,0.4);
      font-family: 'JetBrains Mono', monospace;
    }
    .nav-left {
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 800;
      background: linear-gradient(135deg, #f5d080, #c8922a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.05em;
      margin-right: 16px;
      white-space: nowrap;
    }
    .nav-center {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      flex: 1;
      padding-bottom: 4px;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }
    .nav-center::-webkit-scrollbar { height: 2px; }
    .nav-center::-webkit-scrollbar-thumb { background: rgba(200,146,42,0.5); border-radius: 4px; }
    .nav-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(14px);
      border-radius: 30px;
      padding: 6px 16px;
      font-size: clamp(9px, 1.5vw, 11px);
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: #ddd;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .nav-btn.active {
      background: rgba(255,215,0,0.25);
      box-shadow: 0 0 15px rgba(255,215,0,0.5);
      border-color: rgba(255,215,0,0.6);
      color: #FFD700;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .nav-right {
      display: flex;
      gap: 12px;
      margin-left: auto;
    }
    .nav-icon {
      background: transparent;
      border: none;
      color: #e8b84b;
      font-size: 20px;
      cursor: pointer;
      filter: drop-shadow(0 0 6px gold);
      transition: 0.2s;
    }
    .nav-icon:hover { transform: scale(1.1); }

    /* ----- LEFT PANEL (STATE) ----- */
    .left-panel {
      grid-column: 1;
      grid-row: 2;
      margin: 12px 0 12px 12px;
      border-radius: 24px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      background: rgba(10, 10, 22, 0.4);
    }
    .panel-title {
      font-family: 'JetBrains Mono';
      font-size: clamp(10px, 1.5vw, 12px);
      font-weight: 700;
      color: #c8922a;
      letter-spacing: 2px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(200,146,42,0.4);
      padding-bottom: 8px;
      text-transform: uppercase;
    }
    .stat-item {
      font-family: 'JetBrains Mono';
      font-size: clamp(10px, 1.8vw, 13px);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      color: #e0e0e0;
    }
    .stat-value { color: #FFD700; font-weight: 700; }
    .alert-item {
      background: rgba(200, 80, 50, 0.2);
      border-left: 4px solid #c85a3a;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: clamp(9px, 1.5vw, 11px);
      font-family: monospace;
      margin-top: auto;
      backdrop-filter: blur(8px);
    }
    .alert-item.warning { border-left-color: #e6b800; background: rgba(230,184,0,0.15); }

    /* ----- CENTER CORE (ORBIT) ----- */
    .core-panel {
      grid-column: 2;
      grid-row: 2;
      margin: 12px 0;
      border-radius: 40px;
      background: transparent;
      border: none;
      backdrop-filter: none;
      box-shadow: none;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    .medals-container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(15px, 3vw, 30px);
      padding: 16px;
      z-index: 60;
      pointer-events: auto;
    }

    /* Medal style */
    .medal {
      position: relative;
      width: var(--medal-size);
      height: var(--medal-size);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      flex-shrink: 0;
    }
    .medal:hover { transform: scale(1.05); z-index: 100; }
    .medal-inner {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      backdrop-filter: blur(12px);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,240,0.15), rgba(0,0,0,0.5));
      border: 1px solid rgba(255,215,0,0.5);
      box-shadow: 0 0 30px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .liquid-glass-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      backdrop-filter: blur(6px);
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,245,0.2) 0%, transparent 70%);
    }
    .medal-icon {
      font-size: clamp(24px, 5vw, 34px);
      filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
      margin-bottom: 4px;
    }
    .medal-title {
      font-size: clamp(7px, 1.5vw, 9px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #ffefc0, #e0b050);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .qneu-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      pointer-events: none;
    }
    .qneu-ring svg { width: 100%; height: 100%; }
    .confidence-badge {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a0e18cc;
      backdrop-filter: blur(8px);
      padding: 2px 6px;
      border-radius: 20px;
      font-size: clamp(6px, 1vw, 7px);
      font-family: monospace;
      font-weight: bold;
      white-space: nowrap;
      border: 0.5px solid rgba(200,146,42,0.5);
    }
    .scar-indicator {
      position: absolute;
      inset: -8%;
      border-radius: 50%;
      border: 2px solid #800020;
      box-shadow: 0 0 12px rgba(128,0,32,0.7);
      animation: scarPulse 1.8s infinite;
      pointer-events: none;
    }
    @keyframes scarPulse { 0%{ opacity: 0.6; transform: scale(1); } 100%{ opacity: 1; transform: scale(1.02); }}

    /* ----- RIGHT PANEL (COMMAND) ----- */
    .right-panel {
      grid-column: 3;
      grid-row: 2;
      margin: 12px 12px 12px 0;
      border-radius: 24px;
      padding: 16px 12px;
      background: rgba(10, 10, 22, 0.4);
      display: flex;
      flex-direction: column;
    }
    .task-btn {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px 6px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #f0e6d2;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(9px, 1.5vw, 11px);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .task-btn:hover {
      background: rgba(255,215,0,0.25);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
      border-color: rgba(255,215,0,0.5);
    }
    .task-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
    }

    /* ----- BOTTOM STREAM (LIVE EVENT) ----- */
    .bottom-stream {
      grid-column: 1 / 4;
      grid-row: 3;
      margin: 0 12px 12px 12px;
      border-radius: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(8px, 1.5vw, 11px);
      border-top: 1px solid rgba(200,146,42,0.3);
      overflow-x: auto;
      white-space: nowrap;
      gap: 20px;
      color: #b8a070;
    }
    .stream-label {
      color: #c8922a;
      font-weight: 700;
      margin-right: 8px;
      background: rgba(200,146,42,0.2);
      padding: 4px 10px;
      border-radius: 30px;
      font-size: inherit;
    }
    .event-stream {
      display: flex;
      gap: 24px;
      align-items: center;
      font-size: inherit;
    }
    .event-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .event-time {
      color: #6a6a8a;
      font-size: 0.9em;
    }

    /* ----- RESPONSIVE BREAKPOINTS ----- */
    @media (max-width: 1024px) {
      #ui-overlay {
        grid-template-columns: clamp(160px, 25vw, 220px) 1fr;
      }
      .right-panel { display: none; }
    }

    @media (max-width: 720px) {
      #ui-overlay {
        grid-template-columns: 1fr;
        grid-template-rows: 60px auto auto 80px;
      }
      .left-panel, .right-panel { display: none; }
      .header { grid-column: 1; }
      .core-panel { grid-column: 1; grid-row: 2; margin: 8px; }
      .bottom-stream {
        grid-column: 1;
        grid-row: 3;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        margin: 0;
        border-radius: 0;
        border-top: 1px solid rgba(200,146,42,0.6);
      }
      .nav-center { justify-content: flex-start; }
      .nav-left { font-size: 16px; }
      .t-chip { display: none; }
    }

    /* Tùy chỉnh thanh cuộn cho bottom stream */
    .bottom-stream::-webkit-scrollbar { height: 2px; }
    .bottom-stream::-webkit-scrollbar-thumb { background: rgba(200,146,42,0.5); }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="connectionCanvas"></canvas>
<canvas id="butterflyCanvas"></canvas>

<div id="ui-overlay">
  <!-- HEADER -->
  <div class="header">
    <div class="nav-left">⚡ NATT-OS</div>
    <div class="nav-center">
      <button class="nav-btn active" data-view="system">SYSTEM</button>
      <button class="nav-btn" data-view="sales">SALES</button>
      <button class="nav-btn" data-view="production">PRODUCTION</button>
      <button class="nav-btn" data-view="ai">AI</button>
    </div>
    <div class="nav-right">
      <button class="nav-icon">⚙️</button>
      <button class="nav-icon">🔍</button>
      <div class="t-chip" style="margin-left: 8px; display: flex; align-items: center; gap: 6px; background: rgba(200,146,42,0.1); border: 1px solid rgba(200,146,42,0.3); border-radius: 40px; padding: 4px 10px; font-size: 10px; color: #e8b84b;">
        <div class="dot" style="background:#3dd68c; width:6px; height:6px; border-radius:50%; animation:pulse 2s infinite;"></div>
        <span id="stateBadge">HEALTHY</span>
      </div>
    </div>
  </div>

  <!-- LEFT PANEL (STATE) -->
  <div class="left-panel">
    <div class="panel-title">⚙️ SYSTEM STATE</div>
    <div class="stat-item"><span>QNEU AVG</span><span class="stat-value" id="qneuAvg">--%</span></div>
    <div class="stat-item"><span>ACTIVE FLOWS</span><span class="stat-value" id="activeFlows">0</span></div>
    <div class="stat-item"><span>GOLD 9999</span><span class="stat-value" id="goldPriceSmall">--M</span></div>
    <div class="alert-item warning" id="alertMessage">⚠ PROD unstable · QNEU 64%</div>
    <div style="margin-top: 16px;">
      <div class="stat-item"><span>🔄 THROUGHPUT</span><span class="stat-value">1.4k/h</span></div>
      <div class="stat-item"><span>🧠 AI LOAD</span><span class="stat-value">23%</span></div>
    </div>
  </div>

  <!-- CENTER CORE (ORBIT) -->
  <div class="core-panel">
    <div class="medals-container" id="medalsGrid"></div>
  </div>

  <!-- RIGHT PANEL (COMMAND) -->
  <div class="right-panel">
    <div class="panel-title">⚡ COMMAND</div>
    <button class="task-btn" id="triggerButterflyBtn">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      🔥 Trigger Butterfly
    </button>
    <button class="task-btn" id="simulateFlowBtn">
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      ⚡ Simulate Flow
    </button>
    <button class="task-btn" id="aiAnalyzeBtn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      🧠 AI Analyze
    </button>
    <button class="task-btn" id="resetStateBtn">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9m0 0v6h6"/></svg>
      🧹 Reset State
    </button>
    <div style="flex:1"></div>
    <div style="font-size: 9px; color: #888; text-align: center; margin-top: 12px;">NATT-OS · v2.0.4</div>
  </div>

  <!-- BOTTOM STREAM -->
  <div class="bottom-stream">
    <span class="stream-label">📡 LIVE STREAM</span>
    <div class="event-stream" id="eventStreamContainer">
      <div class="event-item"><span class="event-time">10:23:01</span> sales.confirm → production.start</div>
      <div class="event-item"><span class="event-time">10:24:15</span> production.start → finishing</div>
      <div class="event-item"><span class="event-time">10:26:40</span> finishing → delivery</div>
    </div>
  </div>
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
</script>

<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  // --- CONFIG ---
  const CONFIG = {
    bloom: { threshold: 0.1, strength: 0.65, radius: 0.8 },
    backgroundReactivity: 0.0
  };

  // --- SCENE SETUP (Vision Engine) ---
  const scene = new THREE.Scene();
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, '#050518');
  gradient.addColorStop(0.5, '#1a1025');
  gradient.addColorStop(1, '#0a0510');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  scene.background = new THREE.CanvasTexture(canvas);
  scene.fog = new THREE.FogExp2(0x0a0510, 0.0012);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.set(0, 0, 12);
  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bgCanvas'), alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ReinhardToneMapping;

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
  bloomPass.threshold = CONFIG.bloom.threshold;
  bloomPass.strength = CONFIG.bloom.strength;
  bloomPass.radius = CONFIG.bloom.radius;
  composer.addPass(bloomPass);

  const layerFar = new THREE.Group(); layerFar.position.z = -15;
  const layerMid = new THREE.Group(); layerMid.position.z = -5;
  const layerNear = new THREE.Group(); layerNear.position.z = 2;
  scene.add(layerFar); scene.add(layerMid); scene.add(layerNear);

  // Nebula cloud
  function createNebulaCloud() {
    const count = 4000;
    const geo = new THREE.BufferGeometry();
    const pos = []; const color = []; const speed = [];
    for (let i = 0; i < count; i++) {
      const r = 4 + Math.random() * 8;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.sin(phi) * Math.sin(theta) * 0.7;
      const z = r * Math.cos(phi);
      pos.push(x, y, z);
      const hue = 0.75 + Math.random() * 0.2;
      const c = new THREE.Color().setHSL(hue, 0.5 + Math.random()*0.3, 0.5 + Math.random()*0.3);
      color.push(c.r, c.g, c.b);
      speed.push((Math.random()-0.5)*0.008, (Math.random()-0.5)*0.008, (Math.random()-0.5)*0.008);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
    geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(color), 3));
    geo.userData.speed = speed;
    return new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
  }
  const nebulaCloud = createNebulaCloud(); layerMid.add(nebulaCloud);

  // Stars
  const stars = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(Array.from({length:4000},()=>(Math.random()-0.5)*400).concat(Array.from({length:4000},()=>(Math.random()-0.5)*200), Array.from({length:4000},()=>(Math.random()-0.5)*100-30))), 3)), new THREE.PointsMaterial({color:0xfff5e6, size:0.25, blending: THREE.AdditiveBlending}));
  layerFar.add(stars);

  // Galaxy
  const galGeo = new THREE.BufferGeometry();
  const galPos = []; const galCol = [];
  for (let i=0; i<6000; i++) {
    const r = Math.pow(Math.random(),1.8)*7;
    const angle = Math.random()*Math.PI*2;
    const spiral = Math.sin(angle*4)*0.5;
    galPos.push(Math.cos(angle)*(r+spiral), (Math.random()-0.5)*1.2, Math.sin(angle)*(r+spiral));
    const c = new THREE.Color().setHSL(0.08+Math.random()*0.1, 0.6, 0.4);
    galCol.push(c.r, c.g, c.b);
  }
  galGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(galPos), 3));
  galGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(galCol), 3));
  const galaxy = new THREE.Points(galGeo, new THREE.PointsMaterial({size:0.09, vertexColors:true, blending:THREE.AdditiveBlending, transparent:true, opacity:0.5}));
  layerMid.add(galaxy);

  // Dust
  const dustGeo = new THREE.BufferGeometry();
  const dustPos = []; const dustVel = [];
  for (let i=0; i<1500; i++) {
    dustPos.push((Math.random()-0.5)*40, (Math.random()-0.5)*20, (Math.random()-0.5)*30 -10);
    dustVel.push((Math.random()-0.5)*0.005, (Math.random()-0.5)*0.003, (Math.random()-0.5)*0.005);
  }
  dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
  dustGeo.userData.vel = dustVel;
  const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({color:0xc0a080, size:0.06, blending:THREE.AdditiveBlending}));
  layerNear.add(dust);

  // --- DATA & UI ---
  const cells = [
    { id: 'sales', title: 'SALES', icon: '💎', qneu: 0.87, confidence: 0.92, scars: [], colorTheme: 'mint', connections: ['showroom','prod'] },
    { id: 'showroom', title: 'SHOWROOM', icon: '✨', qneu: 0.76, confidence: 0.68, scars: [], colorTheme: 'champagne', connections: ['sales','master'] },
    { id: 'prod', title: 'PROD', icon: '⚙️', qneu: 0.64, confidence: 0.81, scars: [{id:'SCAR01'}], colorTheme: 'ice', connections: ['sales','warehouse'] },
    { id: 'warehouse', title: 'WAREHOUSE', icon: '📦', qneu: 0.72, confidence: 0.55, scars: [], colorTheme: 'mint', connections: ['prod','master'] },
    { id: 'master', title: 'MASTER', icon: '🔱', qneu: 0.94, confidence: 0.98, scars: [], colorTheme: 'gold', connections: ['showroom','warehouse','ai'] },
    { id: 'ai', title: 'AI', icon: '🧠', qneu: 0.88, confidence: 0.89, scars: [], colorTheme: 'lavender', connections: ['master','hr'] },
    { id: 'hr', title: 'HR', icon: '👥', qneu: 0.69, confidence: 0.73, scars: [], colorTheme: 'rose', connections: ['ai'] }
  ];
  const colorMap = { mint: '#E0FFE0', champagne: '#F7E7CE', ice: '#E0FFFF', gold: '#FFD700', lavender: '#E6E6FA', rose: '#FFE4E1' };
  const medalElements = new Map();

  const connCanvas = document.getElementById('connectionCanvas');
  const connectionCtx = connCanvas.getContext('2d');
  function drawAllConnections() {
    connectionCtx.clearRect(0, 0, connCanvas.width, connCanvas.height);
    cells.forEach(cell => {
      const from = getMedalPos(cell.id);
      if (!from) return;
      cell.connections.forEach(targetId => {
        const to = getMedalPos(targetId);
        if (to) {
          connectionCtx.beginPath();
          connectionCtx.moveTo(from.x, from.y);
          connectionCtx.lineTo(to.x, to.y);
          connectionCtx.strokeStyle = 'rgba(220,190,120,0.3)';
          connectionCtx.lineWidth = 1.2;
          connectionCtx.stroke();
        }
      });
    });
  }
  function getMedalPos(id) {
    const el = medalElements.get(id);
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
  }

  // Butterfly particles
  const butterflyCanvas = document.getElementById('butterflyCanvas');
  const bCtx = butterflyCanvas.getContext('2d');
  let particles = [];
  function spawnRainbowParticles(x, y, dirX, dirY, count=22) {
    const rainbow = ['#ff4d4d','#ffaa33','#ffff66','#66ff66','#3399ff','#8c5eff','#c77dff'];
    for (let i=0; i<count; i++) {
      const angle = Math.atan2(dirY, dirX) + (Math.random()-0.5)*1.2;
      const speed = 2+Math.random()*5;
      particles.push({x,y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, life:1.0, size:3+Math.random()*5, color: rainbow[Math.floor(Math.random()*rainbow.length)]});
    }
  }

  function updateStats() {
    const avgQneu = cells.reduce((sum, c) => sum + c.qneu, 0) / cells.length;
    document.getElementById('qneuAvg').textContent = `${Math.round(avgQneu*100)}%`;
    document.getElementById('activeFlows').textContent = cells.filter(c=>c.connections.length).length;
    const gold = (87650000 + Math.random()*200000)/1e6;
    document.getElementById('goldPriceSmall').textContent = `${gold.toFixed(2)}M`;
    const prodCell = cells.find(c=>c.id==='prod');
    if (prodCell && prodCell.qneu < 0.7) {
      document.getElementById('alertMessage').innerHTML = `⚠ PROD unstable · QNEU ${Math.round(prodCell.qneu*100)}%`;
    }
  }

  function renderMedals() {
    const container = document.getElementById('medalsGrid');
    container.innerHTML = '';
    cells.forEach(cell => {
      const medal = document.createElement('div');
      medal.className = 'medal';
      medal.innerHTML = `
        <div class="medal-inner">
          <div class="liquid-glass-overlay"></div>
          <div class="medal-icon">${cell.icon}</div>
          <div class="medal-title">${cell.title}</div>
          <div class="confidence-badge">Q:${(cell.qneu*100).toFixed(0)}% C:${(cell.confidence*100).toFixed(0)}%</div>
        </div>
        <div class="qneu-ring"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,200,0.2)" stroke-width="3"/><circle cx="50" cy="50" r="46" fill="none" stroke="${colorMap[cell.colorTheme]}" stroke-width="3" stroke-dasharray="${cell.qneu*289} 289"/></svg></div>
        ${cell.scars.length ? '<div class="scar-indicator"></div>' : ''}
      `;
      medal.addEventListener('click', () => triggerButterfly(cell.id));
      medal.addEventListener('mousemove', (e) => {
        const rect = medal.getBoundingClientRect();
        const overlay = medal.querySelector('.liquid-glass-overlay');
        if (overlay) {
          overlay.style.setProperty('--mx', `${((e.clientX-rect.left)/rect.width)*100}%`);
          overlay.style.setProperty('--my', `${((e.clientY-rect.top)/rect.height)*100}%`);
        }
      });
      container.appendChild(medal);
      medalElements.set(cell.id, medal);
    });
    setTimeout(drawAllConnections, 50);
  }

  function localRipple(cellId) {
    const medal = medalElements.get(cellId);
    if (medal) {
      medal.style.animation = 'none';
      medal.offsetHeight;
      medal.style.animation = 'ripple-pulse 0.6s ease-out';
      const pos = getMedalPos(cellId);
      if (pos) spawnRainbowParticles(pos.x, pos.y, (Math.random()-0.5)*2, (Math.random()-0.5)*2, 20);
    }
    const cell = cells.find(c=>c.id===cellId);
    if (cell) { cell.qneu = Math.min(0.99, cell.qneu+0.005); updateMedalUI(cellId); }
    updateStats();
  }

  function colonyTsunami() {
    CONFIG.backgroundReactivity = 0.9;
    cells.forEach(cell => { const pos = getMedalPos(cell.id); if(pos) spawnRainbowParticles(pos.x, pos.y, 0, -1, 28); localRipple(cell.id); });
    addEvent('🌊 BUTTERFLY TSUNAMI · COLONY WAVE');
  }

  function triggerButterfly(cellId) {
    localRipple(cellId);
    CONFIG.backgroundReactivity = 0.5;
    const cell = cells.find(c=>c.id===cellId);
    if (cell) {
      cell.connections.forEach(target => setTimeout(() => { localRipple(target); }, 120));
      addEvent(`🦋 Butterfly from ${cell.title}`);
    }
    if (cell && cell.qneu < 0.55) colonyTsunami();
  }

  function addEvent(text) {
    const container = document.getElementById('eventStreamContainer');
    const time = new Date().toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const newEvent = document.createElement('div');
    newEvent.className = 'event-item';
    newEvent.innerHTML = `<span class="event-time">${time}</span> ${text}`;
    container.prepend(newEvent);
    if (container.children.length > 8) container.removeChild(container.lastChild);
  }

  function updateMedalUI(id) {
    const cell = cells.find(c=>c.id===id);
    const div = medalElements.get(id);
    if (!div) return;
    const ring = div.querySelector('.qneu-ring svg circle:last-child');
    if (ring) ring.setAttribute('stroke-dasharray', `${cell.qneu*289} 289`);
    div.querySelector('.confidence-badge').textContent = `Q:${(cell.qneu*100).toFixed(0)}% C:${(cell.confidence*100).toFixed(0)}%`;
  }

  // Command buttons
  document.getElementById('triggerButterflyBtn').addEventListener('click', () => {
    const master = cells.find(c=>c.id==='master');
    if (master) triggerButterfly(master.id);
    else colonyTsunami();
  });
  document.getElementById('simulateFlowBtn').addEventListener('click', () => {
    addEvent('⚡ Flow simulated: sales → prod → delivery');
    cells.forEach(c => { c.qneu = Math.min(0.99, c.qneu + 0.01); updateMedalUI(c.id); });
    updateStats();
    CONFIG.backgroundReactivity = 0.3;
  });
  document.getElementById('aiAnalyzeBtn').addEventListener('click', () => {
    addEvent('🧠 AI analysis: system entropy 0.23 · recommend increase QNEU');
  });
  document.getElementById('resetStateBtn').addEventListener('click', () => {
    cells.forEach(c => { c.qneu = 0.7 + Math.random()*0.25; c.confidence = 0.6+Math.random()*0.3; updateMedalUI(c.id); });
    updateStats();
    addEvent('🧹 System state reset to baseline');
    CONFIG.backgroundReactivity = 0.0;
  });

  // Navigation
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      addEvent(`📌 View: ${btn.textContent}`);
    });
  });

  // RAF animation
  let clock = new THREE.Clock();
  function animate() {
    const delta = clock.getDelta();
    // Nebula drift
    if (nebulaCloud.geometry.attributes.position) {
      const pos = nebulaCloud.geometry.attributes.position.array;
      const speed = nebulaCloud.geometry.userData.speed;
      for (let i=0; i<pos.length; i+=3) {
        pos[i] += speed[i]*delta*30; pos[i+1] += speed[i+1]*delta*30; pos[i+2] += speed[i+2]*delta*30;
        if (Math.abs(pos[i])>14) pos[i]*=-0.9;
        if (Math.abs(pos[i+1])>10) pos[i+1]*=-0.9;
        if (Math.abs(pos[i+2])>14) pos[i+2]*=-0.9;
      }
      nebulaCloud.geometry.attributes.position.needsUpdate = true;
    }
    // Dust drift
    if (dust.geometry.attributes.position) {
      const pos = dust.geometry.attributes.position.array;
      const vel = dust.geometry.userData.vel;
      for (let i=0; i<pos.length; i+=3) {
        pos[i] += vel[i]*delta*30; pos[i+1] += vel[i+1]*delta*30; pos[i+2] += vel[i+2]*delta*30;
        if (Math.abs(pos[i])>25) pos[i]*=-0.9;
        if (Math.abs(pos[i+1])>15) pos[i+1]*=-0.9;
        if (Math.abs(pos[i+2])>20) pos[i+2]*=-0.9;
      }
      dust.geometry.attributes.position.needsUpdate = true;
    }
    // Parallax + reactivity
    const reactivity = CONFIG.backgroundReactivity;
    camera.position.x += (mouseX*1.2*(1+reactivity*0.5) - camera.position.x)*0.04;
    camera.position.y += (mouseY*0.8*(1+reactivity*0.3) - camera.position.y)*0.04;
    camera.lookAt(0,0,0);
    layerFar.rotation.y += 0.001;
    layerMid.rotation.y += 0.0005;
    stars.rotation.y += 0.0002;
    galaxy.rotation.y += 0.0008;
    if (reactivity > 0.01) {
      bloomPass.strength = CONFIG.bloom.strength + reactivity*0.5;
      scene.fog.density = 0.0012 + reactivity*0.001;
      CONFIG.backgroundReactivity *= 0.98;
    } else {
      bloomPass.strength = CONFIG.bloom.strength;
      scene.fog.density = 0.0012;
    }
    drawAllConnections();
    composer.render();
    requestAnimationFrame(animate);
  }

  function animateParticles() {
    bCtx.clearRect(0,0,butterflyCanvas.width,butterflyCanvas.height);
    for (let i=particles.length-1; i>=0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.life -= 0.015;
      if (p.life<=0) { particles.splice(i,1); continue; }
      bCtx.globalAlpha = p.life*0.9;
      bCtx.fillStyle = p.color;
      bCtx.beginPath();
      bCtx.arc(p.x, p.y, p.size*p.life, 0, 2*Math.PI);
      bCtx.fill();
    }
    requestAnimationFrame(animateParticles);
  }

  // Resize handler
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    connCanvas.width = window.innerWidth; connCanvas.height = window.innerHeight;
    butterflyCanvas.width = window.innerWidth; butterflyCanvas.height = window.innerHeight;
    drawAllConnections();
    // Cập nhật kích thước orbit (medal size đã dùng clamp nên tự động)
  });

  // CSS ripple keyframe
  const style = document.createElement('style');
  style.textContent = `@keyframes ripple-pulse { 0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.7); transform: scale(1); } 70% { box-shadow: 0 0 0 22px rgba(255,215,0,0); transform: scale(1.03); } 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); transform: scale(1); } } @keyframes pulse { 0%,100%{ opacity: 1; transform: scale(1); } 50%{ opacity: 0.4; transform: scale(0.7); }}`;
  document.head.appendChild(style);

  // Init
  renderMedals();
  updateStats();
  animate();
  animateParticles();
  setInterval(updateStats, 5000);
  setInterval(() => { if (Math.random()<0.1) addEvent('📊 System heartbeat · all nodes healthy'); }, 8000);

  console.log('✅ NATT-OS CONTROL TOWER · Responsive Grid Active');
</script>
</body>
</html>
