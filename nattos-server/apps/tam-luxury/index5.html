<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NATT-OS · GALAXY ENGINE · EventBus</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    /* ---------- RESET & TOKENS ---------- */
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #030308; font-family: 'Be Vietnam Pro', sans-serif; }
    body { position: relative; color: #eee; }

    :root {
      --color-champagne: #F7E7CE;
      --color-gold: #FFD700;
      --liquid-glass-blur: 18px;
      --medal-size: clamp(90px, 12vw, 150px);
      --border-light: 1px solid rgba(255,255,255,0.15);
    }

    /* Canvas layers */
    #bgCanvas, #connectionCanvas, #butterflyCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }
    #bgCanvas { z-index: 0; }
    #connectionCanvas { z-index: 1; }
    #butterflyCanvas { z-index: 2; }

    /* ----- CONTROL TOWER GRID (responsive) ----- */
    #ui-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: grid;
      grid-template-columns: clamp(180px, 20vw, 260px) 1fr clamp(200px, 22vw, 300px);
      grid-template-rows: 64px 1fr 90px;
      height: 100vh;
      width: 100%;
      pointer-events: none;
    }

    .header, .left-panel, .core-panel, .right-panel, .bottom-stream {
      pointer-events: auto;
      backdrop-filter: blur(12px);
      background: rgba(10, 10, 20, 0.35);
      border: var(--border-light);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    /* Header */
    .header {
      grid-column: 1 / 4;
      grid-row: 1;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: rgba(6, 8, 16, 0.7);
      border-bottom: 1px solid rgba(200,146,42,0.4);
      font-family: 'JetBrains Mono', monospace;
    }
    .nav-left {
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 800;
      background: linear-gradient(135deg, #f5d080, #c8922a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.05em;
      margin-right: 16px;
      white-space: nowrap;
    }
    .nav-center {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      flex: 1;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }
    .nav-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(14px);
      border-radius: 30px;
      padding: 6px 16px;
      font-size: clamp(9px, 1.5vw, 11px);
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: #ddd;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .nav-btn.active {
      background: rgba(255,215,0,0.25);
      box-shadow: 0 0 15px rgba(255,215,0,0.5);
      border-color: rgba(255,215,0,0.6);
      color: #FFD700;
    }
    .nav-right { display: flex; gap: 12px; margin-left: auto; }
    .nav-icon {
      background: transparent;
      border: none;
      color: #e8b84b;
      font-size: 20px;
      cursor: pointer;
      filter: drop-shadow(0 0 6px gold);
    }

    /* Left panel */
    .left-panel {
      grid-column: 1;
      grid-row: 2;
      margin: 12px 0 12px 12px;
      border-radius: 24px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      background: rgba(10, 10, 22, 0.4);
    }
    .panel-title {
      font-family: 'JetBrains Mono';
      font-size: clamp(10px, 1.5vw, 12px);
      font-weight: 700;
      color: #c8922a;
      letter-spacing: 2px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(200,146,42,0.4);
      padding-bottom: 8px;
      text-transform: uppercase;
    }
    .stat-item {
      font-family: 'JetBrains Mono';
      font-size: clamp(10px, 1.8vw, 13px);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      color: #e0e0e0;
    }
    .stat-value { color: #FFD700; font-weight: 700; }
    .alert-item {
      background: rgba(200, 80, 50, 0.2);
      border-left: 4px solid #c85a3a;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: clamp(9px, 1.5vw, 11px);
      font-family: monospace;
      margin-top: auto;
      backdrop-filter: blur(8px);
    }

    /* Core panel */
    .core-panel {
      grid-column: 2;
      grid-row: 2;
      margin: 12px 0;
      border-radius: 40px;
      background: transparent;
      border: none;
      backdrop-filter: none;
      box-shadow: none;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    .medals-container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(15px, 3vw, 30px);
      padding: 16px;
      z-index: 60;
      pointer-events: auto;
    }
    .medal {
      position: relative;
      width: var(--medal-size);
      height: var(--medal-size);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .medal-inner {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      backdrop-filter: blur(12px);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,240,0.15), rgba(0,0,0,0.5));
      border: 1px solid rgba(255,215,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .medal-icon { font-size: clamp(24px, 5vw, 34px); margin-bottom: 4px; }
    .medal-title { font-size: clamp(7px, 1.5vw, 9px); font-weight: 800; text-transform: uppercase; }
    .confidence-badge {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a0e18cc;
      backdrop-filter: blur(8px);
      padding: 2px 6px;
      border-radius: 20px;
      font-size: clamp(6px, 1vw, 7px);
      font-family: monospace;
      white-space: nowrap;
      border: 0.5px solid rgba(200,146,42,0.5);
    }

    /* Right panel */
    .right-panel {
      grid-column: 3;
      grid-row: 2;
      margin: 12px 12px 12px 0;
      border-radius: 24px;
      padding: 16px 12px;
      background: rgba(10, 10, 22, 0.4);
      display: flex;
      flex-direction: column;
    }
    .task-btn {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px 6px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #f0e6d2;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(9px, 1.5vw, 11px);
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .task-btn:hover {
      background: rgba(255,215,0,0.25);
      transform: translateY(-3px);
      border-color: rgba(255,215,0,0.5);
    }

    /* Bottom stream */
    .bottom-stream {
      grid-column: 1 / 4;
      grid-row: 3;
      margin: 0 12px 12px 12px;
      border-radius: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(8px, 1.5vw, 11px);
      border-top: 1px solid rgba(200,146,42,0.3);
      overflow-x: auto;
      white-space: nowrap;
      gap: 20px;
      color: #b8a070;
    }
    .stream-label {
      color: #c8922a;
      font-weight: 700;
      margin-right: 8px;
      background: rgba(200,146,42,0.2);
      padding: 4px 10px;
      border-radius: 30px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      #ui-overlay { grid-template-columns: clamp(160px, 25vw, 220px) 1fr; }
      .right-panel { display: none; }
    }
    @media (max-width: 720px) {
      #ui-overlay { grid-template-columns: 1fr; grid-template-rows: 60px auto 80px; }
      .left-panel, .right-panel { display: none; }
      .bottom-stream { position: fixed; bottom: 0; left: 0; right: 0; margin: 0; border-radius: 0; }
    }
  </style>
</head>

<canvas id="bgCanvas"></canvas>

<div id="ui-overlay">

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }

<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  // ---------- EVENT BUS (MANDATORY) ----------
  const EventBus = {
    events: {},
    on(event, callback) { if (!this.events[event]) this.events[event] = []; this.events[event].push(callback); },
    emit(event, data) {
      const envelope = {
        event_id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36),
        tenant_id: 'natt-os',
        causation_id: data?.causation_id || 'ui',
        timestamp: Date.now(),
        type: event,
        payload: data
      };
      console.log('[EVENT]', envelope);
      (this.events[event] || []).forEach(cb => cb(envelope));
      // Audit
      this.emit('audit.record', { original: envelope });
    }
  };

  // ---------- CONFIG ----------
  const CONFIG = {
    bloom: { threshold: 0.15, strength: 0.8, radius: 0.9 },
    nebulaIntensity: 1.0,
    galaxySpeed: 0.1,
    particleSpeed: 0.01
  };

  // ---------- SCENE SETUP (PROCEDURAL BACKGROUND) ----------
  const scene = new THREE.Scene();
  // Procedural background via shader material on a full-screen quad (or canvas gradient)
  // But we'll use a CanvasTexture gradient as fallback, then add raymarching nebula via shader.
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#030210');
  grad.addColorStop(0.6, '#0a0818');
  grad.addColorStop(1, '#020108');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  scene.background = new THREE.CanvasTexture(canvas);
  scene.fog = new THREE.FogExp2(0x050510, 0.0008);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.set(0, 0, 12);
  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bgCanvas'), alpha: false, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ReinhardToneMapping;

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
  bloomPass.threshold = CONFIG.bloom.threshold;
  bloomPass.strength = CONFIG.bloom.strength;
  bloomPass.radius = CONFIG.bloom.radius;
  composer.addPass(bloomPass);

  // ---------- DEPTH LAYERING (Parallax) ----------
  const layerFar = new THREE.Group(); layerFar.position.z = -20;
  const layerMid = new THREE.Group(); layerMid.position.z = -8;
  const layerNear = new THREE.Group(); layerNear.position.z = 2;
  scene.add(layerFar); scene.add(layerMid); scene.add(layerNear);

  // ---------- 1. RAYMARCHING NEBULA (SHADER) ----------
  // Tạo một mặt phẳng lớn với shader material giả lập raymarching nebula
  const nebulaPlaneGeo = new THREE.PlaneGeometry(30, 30);
  const nebulaUniforms = {
    time: { value: 0 },
    intensity: { value: CONFIG.nebulaIntensity },
    cameraPos: { value: camera.position }
  };
  const nebulaMaterial = new THREE.ShaderMaterial({
    uniforms: nebulaUniforms,
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vPosition;
      void main() {
        vUv = uv;
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float time;
      uniform float intensity;
      uniform vec3 cameraPos;
      
      // Simplex noise functions (compact)
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
      float snoise(vec3 v) {
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i  = floor(v + dot(v, C.yyy) );
        vec3 x0 = v -   i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min( g.xyz, l.zxy );
        vec3 i2 = max( g.xyz, l.zxy );
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute( permute( permute( 
                  i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
        float n_ = 0.142857142857;
        vec3  ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ *ns.x + ns.yyyy;
        vec4 y = y_ *ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4( x.xy, y.xy );
        vec4 b1 = vec4( x.zw, y.zw );
        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
        vec3 p0 = vec3(a0.xy,h.x);
        vec3 p1 = vec3(a0.zw,h.y);
        vec3 p2 = vec3(a1.xy,h.z);
        vec3 p3 = vec3(a1.zw,h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
        p0 *= norm.x;
        p1 *= norm.y;
        p2 *= norm.z;
        p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
      }
      
      float fbm(vec3 p) {
        float sum = snoise(p);
        sum += snoise(p*2.0)*0.5;
        sum += snoise(p*4.0)*0.25;
        return sum * 0.5 + 0.5;
      }
      
      void main() {
        // Map UV to world pos (plane facing camera, positioned at z=-5)
        vec3 ro = cameraPos;
        vec3 rd = normalize(vec3(vUv * 2.0 - 1.0, 1.0));
        float t = 0.0;
        float density = 0.0;
        for (int i=0; i<32; i++) {
          vec3 p = ro + rd * t;
          p += vec3(time*0.02, time*0.01, time*0.03);
          float n = fbm(p * 0.8);
          density += n * 0.1;
          t += 0.15;
          if (t > 20.0) break;
        }
        density = clamp(density * intensity, 0.0, 1.0);
        vec3 col1 = vec3(0.7, 0.4, 0.9); // lavender
        vec3 col2 = vec3(0.2, 0.5, 0.9); // ice blue
        vec3 nebulaColor = mix(col1, col2, density);
        gl_FragColor = vec4(nebulaColor * density * 0.8, density * 0.6);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  const nebulaPlane = new THREE.Mesh(nebulaPlaneGeo, nebulaMaterial);
  nebulaPlane.position.z = -8;
  layerMid.add(nebulaPlane);

  // ---------- 2. SHADER GALAXY (spiral field) ----------
  const galaxyCount = 8000;
  const galaxyGeo = new THREE.BufferGeometry();
  const positions = [];
  const colors = [];
  for (let i = 0; i < galaxyCount; i++) {
    const r = Math.pow(Math.random(), 1.5) * 6;
    const angle = Math.random() * Math.PI * 2;
    const spiralOffset = Math.sin(angle * 5) * 0.8;
    const x = Math.cos(angle) * (r + spiralOffset);
    const z = Math.sin(angle) * (r + spiralOffset);
    const y = (Math.random() - 0.5) * 0.8;
    positions.push(x, y, z);
    const hue = 0.6 + Math.random() * 0.2;
    const col = new THREE.Color().setHSL(hue, 0.7, 0.5);
    colors.push(col.r, col.g, col.b);
  }
  galaxyGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
  galaxyGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
  const galaxyMat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.7 });
  const galaxyPoints = new THREE.Points(galaxyGeo, galaxyMat);
  galaxyPoints.position.y = -0.5;
  layerFar.add(galaxyPoints);

  // ---------- 3. GPU PARTICLES (Stars + Dust + Energy) ----------
  function createParticles(count, sizeRange, colorHint, layer, driftSpeed) {
    const geo = new THREE.BufferGeometry();
    const pos = [];
    const col = [];
    for (let i = 0; i < count; i++) {
      const r = 5 + Math.random() * 15;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.sin(phi) * Math.sin(theta) * 0.5;
      const z = r * Math.cos(phi);
      pos.push(x, y, z);
      const c = new THREE.Color(colorHint).multiplyScalar(0.8 + Math.random()*0.5);
      col.push(c.r, c.g, c.b);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
    geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(col), 3));
    const mat = new THREE.PointsMaterial({ size: sizeRange, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true });
    const points = new THREE.Points(geo, mat);
    points.userData = { drift: driftSpeed, initialPos: pos.slice() };
    layer.add(points);
    return points;
  }

  const starsFar = createParticles(2500, 0.15, '#ffffff', layerFar, 0.002);
  const dustMid = createParticles(2000, 0.1, '#aaccff', layerMid, 0.005);
  const energyNear = createParticles(800, 0.2, '#ffdd99', layerNear, 0.008);

  // ---------- 4. NOISE ANIMATION cho particles ----------
  function animateParticles(time) {
    [starsFar, dustMid, energyNear].forEach(pts => {
      const posAttr = pts.geometry.attributes.position;
      const pos = posAttr.array;
      const init = pts.userData.initialPos;
      const drift = pts.userData.drift;
      for (let i = 0; i < pos.length; i+=3) {
        const idx = i/3;
        // simple noise offset
        const nx = Math.sin(init[i]*0.5 + time*0.5) * 0.1;
        const ny = Math.cos(init[i+1]*0.4 + time*0.3) * 0.1;
        const nz = Math.sin(init[i+2]*0.6 + time*0.4) * 0.1;
        pos[i] = init[i] + nx + Math.sin(time*0.2 + idx)*drift;
        pos[i+1] = init[i+1] + ny + Math.cos(time*0.15 + idx)*drift;
        pos[i+2] = init[i+2] + nz + Math.sin(time*0.25 + idx)*drift;
      }
      posAttr.needsUpdate = true;
    });
  }

  // ---------- 5. EVENT BUS BINDING (Dynamic Response) ----------
  EventBus.on('butterfly.tsunami', (env) => {
    CONFIG.nebulaIntensity = Math.min(1.8, CONFIG.nebulaIntensity + 0.4);
    nebulaUniforms.intensity.value = CONFIG.nebulaIntensity;
    bloomPass.strength = 1.2;
    setTimeout(() => {
      CONFIG.nebulaIntensity = 1.0;
      nebulaUniforms.intensity.value = 1.0;
      bloomPass.strength = CONFIG.bloom.strength;
    }, 2000);
    addEventToStream('🌊 GALAXY REACTS: TSUNAMI WAVE');
  });

  EventBus.on('butterfly.local', (env) => {
    CONFIG.nebulaIntensity = 1.2;
    nebulaUniforms.intensity.value = 1.2;
    setTimeout(() => { CONFIG.nebulaIntensity = 1.0; nebulaUniforms.intensity.value = 1.0; }, 800);
  });

  // ---------- UI LOGIC (chỉ emit event) ----------
  const cells = [
    { id: 'sales', title: 'SALES', icon: '💎', qneu: 0.87, confidence: 0.92, scars: [], colorTheme: 'mint', connections: ['showroom','prod'] },
    { id: 'showroom', title: 'SHOWROOM', icon: '✨', qneu: 0.76, confidence: 0.68, scars: [], colorTheme: 'champagne', connections: ['sales','master'] },
    { id: 'prod', title: 'PROD', icon: '⚙️', qneu: 0.64, confidence: 0.81, scars: [{id:'SCAR01'}], colorTheme: 'ice', connections: ['sales','warehouse'] },
    { id: 'warehouse', title: 'WAREHOUSE', icon: '📦', qneu: 0.72, confidence: 0.55, scars: [], colorTheme: 'mint', connections: ['prod','master'] },
    { id: 'master', title: 'MASTER', icon: '🔱', qneu: 0.94, confidence: 0.98, scars: [], colorTheme: 'gold', connections: ['showroom','warehouse','ai'] },
    { id: 'ai', title: 'AI', icon: '🧠', qneu: 0.88, confidence: 0.89, scars: [], colorTheme: 'lavender', connections: ['master','hr'] },
    { id: 'hr', title: 'HR', icon: '👥', qneu: 0.69, confidence: 0.73, scars: [], colorTheme: 'rose', connections: ['ai'] }
  ];
  const colorMap = { mint: '#E0FFE0', champagne: '#F7E7CE', ice: '#E0FFFF', gold: '#FFD700', lavender: '#E6E6FA', rose: '#FFE4E1' };
  const medalElements = new Map();

  // Canvas connections
  const connCanvas = document.getElementById('connectionCanvas');
  const connectionCtx = connCanvas.getContext('2d');
  function drawAllConnections() {
    connectionCtx.clearRect(0, 0, connCanvas.width, connCanvas.height);
    cells.forEach(cell => {
      const from = getMedalPos(cell.id);
      if (!from) return;
      cell.connections.forEach(targetId => {
        const to = getMedalPos(targetId);
        if (to) {
          connectionCtx.beginPath();
          connectionCtx.moveTo(from.x, from.y);
          connectionCtx.lineTo(to.x, to.y);
          connectionCtx.strokeStyle = 'rgba(220,190,120,0.3)';
          connectionCtx.lineWidth = 1.2;
          connectionCtx.stroke();
        }
      });
    });
  }
  function getMedalPos(id) {
    const el = medalElements.get(id);
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
  }

  function addEventToStream(text) {
    const container = document.getElementById('eventStreamContainer');
    const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
    const div = document.createElement('div');
    div.className = 'event-item';
    div.innerHTML = `<span class="event-time">${time}</span> ${text}`;
    container.prepend(div);
    if (container.children.length > 6) container.removeChild(container.lastChild);
  }

  function renderMedals() {
    const container = document.getElementById('medalsGrid');
    container.innerHTML = '';
    cells.forEach(cell => {
      const medal = document.createElement('div');
      medal.className = 'medal';
      medal.innerHTML = `
        <div class="medal-inner">
          <div class="liquid-glass-overlay"></div>
          <div class="medal-icon">${cell.icon}</div>
          <div class="medal-title">${cell.title}</div>
          <div class="confidence-badge">Q:${(cell.qneu*100).toFixed(0)}% C:${(cell.confidence*100).toFixed(0)}%</div>
        </div>
        <div class="qneu-ring"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,200,0.2)" stroke-width="3"/><circle cx="50" cy="50" r="46" fill="none" stroke="${colorMap[cell.colorTheme]}" stroke-width="3" stroke-dasharray="${cell.qneu*289} 289"/></svg></div>
      `;
      medal.addEventListener('click', () => {
        EventBus.emit('ui.medal.click', { cellId: cell.id });
        // local ripple effect (UI animation)
        medal.style.animation = 'none';
        medal.offsetHeight;
        medal.style.animation = 'ripple-pulse 0.6s ease-out';
      });
      container.appendChild(medal);
      medalElements.set(cell.id, medal);
    });
    setTimeout(drawAllConnections, 50);
  }

  // Subscribe to ui events
  EventBus.on('ui.medal.click', ({ payload }) => {
    const cell = cells.find(c => c.id === payload.cellId);
    if (cell) {
      addEventToStream(`🦋 Butterfly from ${cell.title}`);
      EventBus.emit('butterfly.local', { source: cell.id });
      if (cell.qneu < 0.55) EventBus.emit('butterfly.tsunami', {});
    }
  });

  document.getElementById('triggerButterflyBtn').addEventListener('click', () => {
    EventBus.emit('ui.command.trigger', { action: 'butterfly' });
  });
  EventBus.on('ui.command.trigger', () => EventBus.emit('butterfly.tsunami', {}));

  document.getElementById('simulateFlowBtn').addEventListener('click', () => {
    EventBus.emit('ui.command.simulate', {});
    addEventToStream('⚡ Flow simulated');
  });
  document.getElementById('aiAnalyzeBtn').addEventListener('click', () => {
    EventBus.emit('ui.command.analyze', {});
    addEventToStream('🧠 AI analysis running');
  });
  document.getElementById('resetStateBtn').addEventListener('click', () => {
    EventBus.emit('ui.command.reset', {});
    addEventToStream('🧹 System reset');
  });

  // Navigation
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      EventBus.emit('ui.nav.change', { view: btn.dataset.view });
    });
  });

  // Update stats
  function updateStats() {
    const avgQneu = cells.reduce((sum, c) => sum + c.qneu, 0) / cells.length;
    document.getElementById('qneuAvg').textContent = `${Math.round(avgQneu*100)}%`;
    document.getElementById('activeFlows').textContent = cells.filter(c=>c.connections.length).length;
    const gold = (87650000 + Math.random()*200000)/1e6;
    document.getElementById('goldPriceSmall').textContent = `${gold.toFixed(2)}M`;
  }
  setInterval(updateStats, 5000);
  updateStats();

  // Animation loop
  let clock = new THREE.Clock();
  function animate() {
    const delta = clock.getDelta();
    const elapsedTime = performance.now() * 0.001;
    
    // Update shader time
    nebulaUniforms.time.value = elapsedTime * 0.5;
    
    // Noise animation for particles
    animateParticles(elapsedTime);
    
    // Galaxy rotation
    galaxyPoints.rotation.y += 0.001;
    
    // Parallax
    camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.03;
    camera.position.y += (-mouseY * 0.8 - camera.position.y) * 0.03;
    camera.lookAt(0, 0, 0);
    
    layerFar.rotation.y += 0.0005;
    layerMid.rotation.y += 0.0003;
    
    drawAllConnections();
    composer.render();
    requestAnimationFrame(animate);
  }

  // Butterfly particles (UI effect)
  const butterflyCanvas = document.getElementById('butterflyCanvas');
  const bCtx = butterflyCanvas.getContext('2d');
  let particles = [];
  function spawnParticles(x, y) {
    for (let i=0; i<15; i++) {
      particles.push({
        x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4-1,
        life: 1.0, color: `hsl(${Math.random()*60 + 200}, 80%, 60%)`
      });
    }
  }
  function animateParticles2D() {
    bCtx.clearRect(0,0,butterflyCanvas.width,butterflyCanvas.height);
    particles = particles.filter(p => {
      p.x += p.vx; p.y += p.vy; p.life -= 0.02;
      if (p.life <= 0) return false;
      bCtx.globalAlpha = p.life;
      bCtx.fillStyle = p.color;
      bCtx.beginPath();
      bCtx.arc(p.x, p.y, 4*p.life, 0, 2*Math.PI);
      bCtx.fill();
      return true;
    });
    requestAnimationFrame(animateParticles2D);
  }
  EventBus.on('butterfly.local', ({ payload }) => {
    const pos = getMedalPos(payload.source);
    if (pos) spawnParticles(pos.x, pos.y);
  });
  EventBus.on('butterfly.tsunami', () => {
    for (let i=0; i<30; i++) {
      setTimeout(() => spawnParticles(window.innerWidth/2, window.innerHeight/2), i*20);
    }
  });

  // Resize
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    connCanvas.width = window.innerWidth; connCanvas.height = window.innerHeight;
    butterflyCanvas.width = window.innerWidth; butterflyCanvas.height = window.innerHeight;
    drawAllConnections();
  });

  // CSS ripple
  const style = document.createElement('style');
  style.textContent = `@keyframes ripple-pulse { 0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.7); transform: scale(1); } 70% { box-shadow: 0 0 0 22px rgba(255,215,0,0); transform: scale(1.03); } 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); transform: scale(1); } } @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.4; transform:scale(0.7); }}`;
  document.head.appendChild(style);

  // Start
  renderMedals();
  animate();
  animateParticles2D();
  console.log('✅ NATT-OS GALAXY ENGINE with EventBus active');
</script>
</body>
</html>
