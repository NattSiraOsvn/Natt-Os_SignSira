<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tâm Luxury · Nauion Attendance (CSV Linked)</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ===== NAUION v2.5 CORE ===== */
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-deep:#020208;--bg-layer:rgba(6,6,18,0.72);--glass-blur:18px;--glass-saturate:180%;
      --glass-border:rgba(255,255,255,0.06);--glass-shadow:0 32px 80px rgba(0,0,0,0.85);
      --gold:#F5E2C0;--gold-soft:#c8922a;--gold-bright:#e8b84b;
      --green:#3dd68c;--red:#f05050;--amber:#f0a030;--text-main:rgba(238,225,200,0.88);
      --font-sans:'Be Vietnam Pro',sans-serif;--font-mono:'JetBrains Mono',monospace;
      --radius-card:12px;--z-modal:100;
    }
    body{
      min-height:100vh;background:var(--bg-deep);color:var(--text-main);font-family:var(--font-sans);
      font-size:13px;line-height:1.5;background-image:radial-gradient(ellipse at 40% 30%,rgba(200,146,42,0.06) 0%,transparent 50%);
      padding:24px 32px;
    }
    .app-container{max-width:1440px;margin:0 auto;}
    .liquid-glass{
      backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-saturate));
      background:radial-gradient(circle at var(--mouse-x,50%) var(--mouse-y,50%),rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.01) 70%,transparent);
      border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);border-radius:var(--radius-card);
    }
    .natt-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 24px;border-bottom:1px solid rgba(200,146,42,0.1);}
    .brand{display:flex;align-items:center;gap:12px;}
    .brand-text h1{font-family:var(--font-mono);font-size:18px;font-weight:500;background:linear-gradient(135deg,var(--gold),var(--gold-soft));-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:0.08em;}
    .header-meta{display:flex;gap:12px;align-items:center;}
    .wifi-pill{padding:6px 14px;border-radius:40px;font-family:var(--font-mono);font-size:10px;border:1px solid;}
    .wifi-pill.ok{background:rgba(61,214,140,0.08);border-color:rgba(61,214,140,0.25);color:var(--green);}
    .live-clock{font-family:var(--font-mono);padding:6px 14px;background:rgba(18,24,32,0.6);border-radius:30px;color:var(--gold-bright);}
    .dashboard{display:grid;grid-template-columns:1.2fr 0.9fr;gap:24px;margin:28px 0;}
    .hero-panel{padding:28px 24px;}
    .hero-time{font-family:var(--font-mono);font-size:72px;font-weight:300;background:linear-gradient(135deg,var(--gold-bright),var(--mint));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
    select,input,textarea{background:rgba(12,18,28,0.8);border:1px solid rgba(200,146,42,0.2);color:var(--text-main);padding:12px 16px;border-radius:6px;width:100%;backdrop-filter:blur(12px);}
    .checkin-btn{padding:18px;border-radius:12px;font-weight:700;font-size:18px;cursor:pointer;background:transparent;border:1.5px solid;width:100%;margin-top:12px;}
    .btn-in{background:linear-gradient(145deg,rgba(61,214,140,0.15),rgba(61,214,140,0.03));border-color:rgba(61,214,140,0.4);color:var(--green);}
    .btn-out{background:linear-gradient(145deg,rgba(240,80,80,0.12),rgba(240,80,80,0.03));border-color:rgba(240,80,80,0.4);color:var(--red);}
    .checkin-btn.disabled{opacity:0.4;pointer-events:none;}
    .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-family:var(--font-mono);font-size:9px;}
    .badge-green{background:rgba(61,214,140,0.12);color:var(--green);border:1px solid rgba(61,214,140,0.2);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:var(--z-modal);}
    .modal{width:420px;padding:28px;background:var(--bg-layer);backdrop-filter:blur(24px);border:1px solid var(--glass-border);border-radius:20px;}
    .toast-container{position:fixed;bottom:24px;right:24px;z-index:300;}
    .toast{padding:14px 20px;background:var(--bg-layer);border-radius:40px;border-left:4px solid;margin-top:8px;animation:slideIn 0.3s;}
    @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    .data-table{width:100%;border-collapse:collapse;background:rgba(6,6,18,0.4);border-radius:12px;overflow:hidden;margin-top:20px;}
    .data-table th{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;color:var(--text-mute);padding:12px 16px;background:rgba(0,0,0,0.3);}
    .data-table td{padding:10px 16px;border-bottom:1px solid rgba(200,146,42,0.06);}
  </style>
</head>
<body>
<div class="app-container">
  <header class="natt-header">
    <div class="brand">
      <svg width="38" height="34" viewBox="0 0 120 104"><polygon points="60,2 18,34 38,2" fill="url(#gd1)" opacity=".9"/><polygon points="60,2 102,34 82,2" fill="url(#gd1)" opacity=".9"/><polygon points="18,34 102,34 60,102" fill="url(#gd1)" opacity=".5"/><rect x="44" y="40" width="32" height="5.5" rx="1" fill="#c8922a"/><rect x="57" y="45.5" width="6" height="20" rx="1" fill="#c8922a"/><linearGradient id="gd1"><stop offset="0%" stop-color="#f5d080"/><stop offset="100%" stop-color="#c8922a"/></linearGradient></svg>
      <div class="brand-text"><h1>TÂM LUXURY</h1><div style="font-size:9px;color:var(--text-mute);">Nauion Attendance · CSV Linked</div></div>
    </div>
    <div class="header-meta">
      <div id="wifiPill" class="wifi-pill fail"><span>⬤</span> <span id="wifiLabel">Đang kiểm tra</span></div>
      <div class="live-clock" id="liveClock">--:--:--</div>
    </div>
  </header>

  <div class="dashboard">
    <div class="hero-panel liquid-glass">
      <div class="hero-time" id="heroTime">--:--</div>
      <div class="hero-date" id="heroDate">--</div>
      <div style="margin-top:20px;"><label>Nhân viên</label><select id="empSelect"></select></div>
      <div id="selectedEmpCard" style="margin-top:16px;padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;display:none;">
        <span id="empNameDisplay"></span> <span id="empCodeDisplay" style="color:var(--gold-soft);"></span>
        <div><span id="empDeptDisplay"></span></div>
      </div>
    </div>
    <div>
      <div class="liquid-glass" style="padding:20px;">
        <div style="display:flex;gap:8px;align-items:center;"><span>🛜 MẠNG NỘI BỘ</span><button id="refreshIpBtn" style="background:none;border:1px solid var(--gold-soft);color:var(--gold-soft);padding:4px 12px;border-radius:20px;">🔄 Kiểm tra lại</button></div>
        <div id="wifiSsid">SSID: —</div><div id="wifiIp">IP: —</div><div id="wifiAuthMsg"></div>
      </div>
      <button class="checkin-btn btn-in disabled" id="btnCheckin">🟢 CHECK-IN</button>
      <button class="checkin-btn btn-out disabled" id="btnCheckout">🔴 CHECK-OUT</button>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <div style="flex:1;text-align:center;"><span id="tsIn">--:--</span><br>Check-in</div>
        <div style="flex:1;text-align:center;"><span id="tsOut">--:--</span><br>Check-out</div>
        <div style="flex:1;text-align:center;"><span id="tsHours">0h</span><br>Giờ làm</div>
      </div>
      <button id="exportBtn" style="margin-top:16px;width:100%;padding:10px;background:var(--gold-soft);border:none;border-radius:6px;font-weight:bold;">📥 Tải file chấm công mới</button>
    </div>
  </div>

  <table class="data-table">
    <thead><tr><th>Mã NV</th><th>Tên</th><th>Check-in</th><th>Check-out</th><th>Giờ</th><th>siraSign</th></tr></thead>
    <tbody id="todayTbody"></tbody>
  </table>
</div>

<!-- Modals -->
<div id="sirasignModal" class="modal-overlay" style="display:none;">
  <div class="modal liquid-glass">
    <h3>🔐 siraSign Verification</h3>
    <p style="margin-bottom:16px;">Nhập mã PIN (mặc định: 123456)</p>
    <input type="password" id="sirasignPin" placeholder="PIN" maxlength="6">
    <div style="display:flex;gap:12px;margin-top:20px;">
      <button id="sirasignConfirmBtn" style="flex:1;padding:12px;background:var(--gold-soft);border:none;border-radius:8px;">Xác nhận</button>
      <button id="sirasignCancelBtn" style="flex:1;padding:12px;background:transparent;border:1px solid var(--text-mute);border-radius:8px;">Hủy</button>
    </div>
  </div>
</div>

<div id="reportModal" class="modal-overlay" style="display:none;">
  <div class="modal liquid-glass">
    <h3>📝 Báo cáo cuối ngày</h3>
    <textarea id="workReportInput" rows="5" placeholder="Nhập công việc đã làm..."></textarea>
    <div style="margin-top:12px;"><label><input type="checkbox" id="overtimeCheck"> Làm thêm giờ</label> <input type="number" id="overtimeHours" placeholder="Giờ OT" style="width:100px;" disabled></div>
    <div style="display:flex;gap:12px;margin-top:20px;">
      <button id="submitReportBtn" style="flex:1;padding:12px;background:var(--gold-soft);">Check-out</button>
      <button id="cancelReportBtn" style="flex:1;padding:12px;background:transparent;border:1px solid var(--text-mute);">Hủy</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
  // ═══════════════════════════════════════════════════════════════════
  // natt-os NAUION v2.5 – CELL-DRIVEN ATTENDANCE (CSV DATABASE)
  // ═══════════════════════════════════════════════════════════════════

  // --- EventBus ---
  class EventBus {
    constructor(){this.events=new Map();}
    on(e,cb){if(!this.events.has(e))this.events.set(e,[]);this.events.get(e).push(cb);}
    emit(e,data){(this.events.get(e)||[]).forEach(cb=>cb(data));}
  }
  const bus = new EventBus();

  // --- Helpers ---
  const pad=n=>String(n).padStart(2,'0');
  const formatTime=d=>`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const toast=(msg,type='info')=>{
    const el=document.createElement('div');el.className=`toast ${type}`;
    el.style.borderLeftColor=type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--gold-soft)';
    el.innerHTML=`<span>${type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span> ${msg}`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(()=>el.remove(),4000);
  };

  // --- Đường dẫn tới CSV (tương đối từ file HTML) ---
  const CSV_BASE = '/database/ctytam/khoivanhanh/soluong/';
  async function fetchCSV(filename) {
    const res = await /* [HEYNA-MIGRATE] */ /* [HEYNA-MIGRATE] */ fetch(CSV_BASE + filename);
    const text = await res.text();
    const lines = text.trim().split('\n').filter(l=>l.trim());
    const headers = lines[0].split(',').map(h=>h.trim());
    return lines.slice(1).map(line=>{
      const vals = line.split(',').map(v=>v.trim());
      return headers.reduce((o,h,i)=>{o[h]=vals[i];return o;},{});
    });
  }

  // --- Cell: HR (quản lý nhân sự & chấm công) ---
  class HRCell {
    employees = [];
    attendance = new Map(); // key: ma_nv -> record
    todayStr = new Date().toLocaleDateString('vi-VN');

    constructor(){
      bus.on('HEYNA',async({type,payload})=>{
        if(type==='CHECKIN') await this.checkin(payload);
        if(type==='CHECKOUT') await this.checkout(payload);
        if(type==='REFRESH') await this.load();
      });
    }

    async load(){
      try {
        this.employees = await fetchCSV('danhsachnhansu.csv');
        const records = await fetchCSV('dulieuchamcong.csv');
        this.attendance.clear();
        records.filter(r=>r.ngay===this.todayStr).forEach(r=>{
          this.attendance.set(r.ma_nv,{
            checkIn: r.check_in, checkOut: r.check_out, ip: r.ip, network: r.network,
            sirasign: r.sirasign, report: r.report, overtime: parseFloat(r.overtime)||0
          });
        });
        bus.emit('NAHERE',{source:'hr-cell',employees:this.employees,attendance:this.attendance});
      } catch(e){
        console.warn('Không đọc được CSV, dùng dữ liệu mẫu',e);
        this.employees = [{ma_nv:'TLXR001',ho_ten:'Nguyễn Thị Mai',phong_ban:'Kinh Doanh'}];
        bus.emit('NAHERE',{source:'hr-cell',employees:this.employees,attendance:new Map()});
      }
    }

    async checkin({empCode, ip, network, sirasign}){
      if(sirasign!=='VALID'){toast('siraSign không hợp lệ','error');return;}
      if(this.attendance.has(empCode)){toast('Hôm nay đã check-in','info');return;}
      const now = new Date();
      const record = {
        checkIn: formatTime(now), checkOut: null, ip, network,
        sirasign: `sira-${Date.now().toString(36)}`, report: null, overtime: 0
      };
      this.attendance.set(empCode, record);
      toast(`✅ Check-in ${record.checkIn}`, 'success');
      bus.emit('NAHERE',{source:'hr-cell',attendance:this.attendance});
    }

    async checkout({empCode, report, overtime, sirasign}){
      const rec = this.attendance.get(empCode);
      if(!rec) return toast('Chưa check-in','error');
      if(rec.checkOut) return toast('Đã checkout','info');
      if(!report) return toast('Cần nhập báo cáo','error');
      const now = new Date();
      rec.checkOut = formatTime(now);
      rec.report = report;
      rec.overtime = overtime;
      rec.sirasign += `-OUT-${Date.now().toString(36)}`;
      toast(`🔴 Check-out ${rec.checkOut}`, 'success');
      bus.emit('NAHERE',{source:'hr-cell',attendance:this.attendance});
    }

    exportToCSV(){
      const rows = [['ngay','ma_nv','check_in','check_out','ip','network','sirasign','report','overtime']];
      for(let [code, rec] of this.attendance){
        rows.push([this.todayStr, code, rec.checkIn||'', rec.checkOut||'', rec.ip||'', rec.network||'', rec.sirasign||'', rec.report||'', rec.overtime]);
      }
      return rows.map(r=>r.join(',')).join('\n');
    }
  }

  // --- Cell: Config ---
  class ConfigCell {
    rules = {startTime:'08:00',lateAfterMinutes:15,standardHours:8};
    async load(){
      try{
        const data = await fetchCSV('quytaccty.csv');
        if(data.length) this.rules = data[0];
      }catch(e){}
      bus.emit('NAHERE',{source:'config-cell',rules:this.rules});
    }
  }

  // --- Khởi tạo Cells ---
  const hrCell = new HRCell();
  const configCell = new ConfigCell();
  await hrCell.load();
  await configCell.load();

  // --- UI State ---
  let currentEmpCode = null;
  let networkState = {internal:false, ip:null, ssid:null};
  let pendingAction = null;

  // --- Network detection (hỗ trợ localhost) ---
  async function detectNetwork(){
    let ip=null, internal=false, ssid='';
    const host=window.location.hostname;
    try{
      const pc=new RTCPeerConnection({iceServers:[]}); pc.createDataChannel('');
      const offer=await pc.createOffer(); await pc.setLocalDescription(offer);
      await new Promise(r=>setTimeout(r,200));
      const sdp=pc.localDescription?.sdp||'';
      const ips=(sdp.match(/IP4 (\d+\.\d+\.\d+\.\d+)/g)||[]).map(x=>x.replace('IP4 ',''));
      pc.close();
      ip=ips.find(x=>x.startsWith('192.168')||x.startsWith('10.')||x.startsWith('172.16'))||ips[0];
    }catch(e){}
    if(!ip) ip = (host==='localhost'||host==='127.0.0.1')?host:'Không xác định';
    internal = ip==='localhost'||ip==='127.0.0.1'||ip.startsWith('192.168.')||ip.startsWith('10.')||ip.startsWith('172.16.');
    ssid = internal?(ip.includes('192.168.1')?'TamLuxury-HCM-5G':(host==='localhost'?'Localhost':'Nội bộ')):'Mạng ngoài';
    networkState = {ip,internal,ssid};
    updateWifiUI();
  }

  function updateWifiUI(){
    const pill=document.getElementById('wifiPill'), label=document.getElementById('wifiLabel');
    document.getElementById('wifiSsid').textContent=`SSID: ${networkState.ssid}`;
    document.getElementById('wifiIp').textContent=`IP: ${networkState.ip}`;
    const auth=document.getElementById('wifiAuthMsg');
    if(networkState.internal){
      pill.className='wifi-pill ok'; label.textContent='WiFi Công ty';
      auth.innerHTML='<span style="color:var(--green);">✅ Cho phép chấm công</span>';
    }else{
      pill.className='wifi-pill fail'; label.textContent='Ngoài mạng';
      auth.innerHTML='<span style="color:var(--red);">❌ Không thể chấm công</span>';
    }
    updateButtons();
  }

  // --- Render UI từ NAHERE ---
  bus.on('NAHERE',({source,employees,attendance,rules})=>{
    if(source==='hr-cell'){
      if(employees){
        const sel=document.getElementById('empSelect');
        sel.innerHTML='<option value="">-- Chọn nhân viên --</option>'+
          employees.map(e=>`<option value="${e.ma_nv}">${e.ma_nv} - ${e.ho_ten}</option>`).join('');
      }
      if(attendance){
        renderTodayTable(attendance);
        if(currentEmpCode){
          const rec=attendance.get(currentEmpCode);
          document.getElementById('tsIn').textContent=rec?.checkIn||'--:--';
          document.getElementById('tsOut').textContent=rec?.checkOut||'--:--';
          if(rec?.checkIn&&rec?.checkOut){
            const [ih,im]=rec.checkIn.split(':').map(Number),[oh,om]=rec.checkOut.split(':').map(Number);
            const hrs=((oh*60+om)-(ih*60+im))/60+(rec.overtime||0);
            document.getElementById('tsHours').textContent=hrs.toFixed(1)+'h';
          }else document.getElementById('tsHours').textContent='0h';
        }
      }
    }
    if(source==='config-cell'){ /* có thể cập nhật giao diện */ }
    updateButtons();
  });

  function renderTodayTable(attMap){
    const tbody=document.getElementById('todayTbody');
    let html='';
    for(let [code,rec] of attMap){
      const emp=hrCell.employees.find(e=>e.ma_nv===code);
      const hrs=rec.checkOut?(()=>{
        const [ih,im]=rec.checkIn.split(':').map(Number),[oh,om]=rec.checkOut.split(':').map(Number);
        return ((oh*60+om)-(ih*60+im))/60+(rec.overtime||0);
      })():null;
      html+=`<tr><td>${code}</td><td>${emp?.ho_ten||''}</td><td>${rec.checkIn||'—'}</td><td>${rec.checkOut||'—'}</td><td>${hrs?hrs.toFixed(1)+'h':'—'}</td><td><span class="badge badge-green">${rec.sirasign?.slice(-8)||'—'}</span></td></tr>`;
    }
    tbody.innerHTML=html||'<tr><td colspan="6" style="text-align:center;">Chưa có dữ liệu</td></tr>';
  }

  function updateButtons(){
    const btnIn=document.getElementById('btnCheckin'), btnOut=document.getElementById('btnCheckout');
    if(!currentEmpCode||!networkState.internal){btnIn.classList.add('disabled');btnOut.classList.add('disabled');return;}
    const rec=hrCell.attendance.get(currentEmpCode);
    if(!rec||!rec.checkIn){btnIn.classList.remove('disabled');btnOut.classList.add('disabled');}
    else if(!rec.checkOut){btnIn.classList.add('disabled');btnOut.classList.remove('disabled');}
    else {btnIn.classList.add('disabled');btnOut.classList.add('disabled');}
  }

  // --- Event Handlers ---
  document.getElementById('empSelect').addEventListener('change',e=>{
    currentEmpCode=e.target.value;
    const emp=hrCell.employees.find(e=>e.ma_nv===currentEmpCode);
    if(emp){
      document.getElementById('selectedEmpCard').style.display='block';
      document.getElementById('empNameDisplay').textContent=emp.ho_ten;
      document.getElementById('empCodeDisplay').textContent=emp.ma_nv;
      document.getElementById('empDeptDisplay').textContent=emp.phong_ban;
    }else{
      document.getElementById('selectedEmpCard').style.display='none';
    }
    bus.emit('NAHERE',{source:'hr-cell',attendance:hrCell.attendance}); // cập nhật giờ
  });

  function opensiraSignModal(action){
    pendingAction=action;
    document.getElementById('sirasignModal').style.display='flex';
    document.getElementById('sirasignPin').value='';
  }

  document.getElementById('btnCheckin').addEventListener('click',()=>opensiraSignModal('checkin'));
  document.getElementById('btnCheckout').addEventListener('click',()=>opensiraSignModal('checkout'));

  document.getElementById('sirasignConfirmBtn').addEventListener('click',()=>{
    const pin=document.getElementById('sirasignPin').value;
    if(pin!=='123456'){toast('Sai PIN','error');return;}
    document.getElementById('sirasignModal').style.display='none';
    if(pendingAction==='checkin'){
      bus.emit('HEYNA',{type:'CHECKIN',payload:{empCode:currentEmpCode,ip:networkState.ip,network:networkState.ssid,sirasign:'VALID'}});
    }else{
      // Mở modal báo cáo
      document.getElementById('reportModal').style.display='flex';
    }
    pendingAction=null;
  });
  document.getElementById('sirasignCancelBtn').addEventListener('click',()=>{
    document.getElementById('sirasignModal').style.display='none'; pendingAction=null;
  });

  document.getElementById('overtimeCheck').addEventListener('change',e=>{
    document.getElementById('overtimeHours').disabled=!e.target.checked;
  });
  document.getElementById('submitReportBtn').addEventListener('click',()=>{
    const report=document.getElementById('workReportInput').value.trim();
    if(!report){toast('Nhập báo cáo','error');return;}
    const overtime=document.getElementById('overtimeCheck').checked?parseFloat(document.getElementById('overtimeHours').value)||0:0;
    document.getElementById('reportModal').style.display='none';
    bus.emit('HEYNA',{type:'CHECKOUT',payload:{empCode:currentEmpCode,report,overtime,sirasign:'VALID'}});
  });
  document.getElementById('cancelReportBtn').addEventListener('click',()=>{
    document.getElementById('reportModal').style.display='none';
  });

  document.getElementById('refreshIpBtn').addEventListener('click',detectNetwork);
  document.getElementById('exportBtn').addEventListener('click',()=>{
    const csv=hrCell.exportToCSV();
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`dulieuchamcong_${hrCell.todayStr.replace(/\//g,'-')}.csv`;
    a.click();
    toast('Đã tải file chấm công mới. Hãy thay thế file cũ trong thư mục database.','success');
  });

  // Clock
  function updateClock(){
    const d=new Date();
    document.getElementById('liveClock').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    document.getElementById('heroTime').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
    document.getElementById('heroDate').textContent=`${['CN','T2','T3','T4','T5','T6','T7'][d.getDay()]}, ${d.getDate()}/${d.getMonth()+1}`;
  }
  setInterval(updateClock,1000); updateClock();

  // Khởi động network
  detectNetwork();
</script>
<script src="heyna-client.js"></script>
</body>
</html>
