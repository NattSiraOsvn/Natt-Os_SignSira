<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NATT-OS · NAUION 4D | Tâm Luxury Sinh Thể Số</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ---------- RESET & TOKENS ---------- */
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #030308; font-family: 'Be Vietnam Pro', sans-serif; }
body { position: relative; }
input, textarea { user-select: text; }

/* design tokens (pastel ánh kim) */
:root {
  --color-champagne: #F7E7CE;
  --color-peach: #FFDAB9;
  --color-ice-blue: #E0FFFF;
  --color-mint: #E0FFE0;
  --color-lavender: #E6E6FA;
  --color-rose: #FFE4E1;
  --color-burgundy: #800020;
  --liquid-glass-blur: 18px;
  --z-security: 999;
  --medal-size: clamp(110px, 14vw, 170px);
  --glow-pastel: 0 0 20px rgba(255,235,200,0.5);
}

/* liquid glass base */
.liquid-glass {
  backdrop-filter: blur(var(--liquid-glass-blur)) saturate(180%);
  background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.02) 70%, transparent 100%);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: inherit;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
}

/* main UI overlay */
#ui-overlay {
  position: absolute;
  inset: 0;
  z-index: 50;
  display: flex;
  flex-direction: column;
  pointer-events: auto;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
}

/* header */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,10,16,0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(200,146,42,0.2);
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 60px;
  font-family: 'JetBrains Mono', monospace;
}
.tlogo {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, #f5d080, #c8922a);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 0.08em;
}
.tsub { font-size: 8px; color: #a89070; margin-left: 10px; letter-spacing: 0.2em; }
.t-r { margin-left: auto; display: flex; gap: 12px; }
.t-chip {
  background: rgba(200,146,42,0.1);
  border: 1px solid rgba(200,146,42,0.3);
  border-radius: 40px;
  padding: 4px 12px;
  font-size: 10px;
  font-family: monospace;
  color: #e8b84b;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{ opacity: 1; transform: scale(1); } 50%{ opacity: 0.4; transform: scale(0.7); }}

/* hero */
.hero-mini {
  text-align: center;
  padding: 20px 24px 12px;
}
.hero-mini h1 {
  font-family: 'JetBrains Mono';
  font-size: 22px;
  background: linear-gradient(135deg, #f5d080, #e8b84b);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-mini p { font-size: 9px; color: #705838; letter-spacing: 0.2em; }

/* medals grid */
.medals-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 28px;
  padding: 28px 24px 48px;
  position: relative;
  z-index: 60;
}

/* Medal card (Nauion cell) */
.medal {
  position: relative;
  width: var(--medal-size);
  height: var(--medal-size);
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  flex-shrink: 0;
}
.medal:hover { transform: scale(1.05); }
.medal-inner {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  overflow: hidden;
  backdrop-filter: blur(12px);
  background: radial-gradient(circle at 30% 30%, rgba(255,255,240,0.1), rgba(0,0,0,0.4));
  border: 1px solid rgba(255,215,0,0.4);
  box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.liquid-glass-overlay {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  backdrop-filter: blur(6px);
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,245,0.2) 0%, transparent 70%);
}
.medal-icon {
  font-size: 34px;
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
  margin-bottom: 6px;
}
.medal-title {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #ffefc0, #e0b050);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.qneu-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  pointer-events: none;
}
.qneu-ring svg { width: 100%; height: 100%; }
.confidence-badge {
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  background: #0a0e18cc;
  backdrop-filter: blur(8px);
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 7px;
  font-family: monospace;
  font-weight: bold;
  white-space: nowrap;
  border: 0.5px solid rgba(200,146,42,0.5);
}
.scar-indicator {
  position: absolute;
  inset: -10%;
  border-radius: 50%;
  border: 2px solid #800020;
  box-shadow: 0 0 12px rgba(128,0,32,0.7);
  animation: scarPulse 1.8s infinite;
  pointer-events: none;
}
@keyframes scarPulse { 0%{ opacity: 0.6; transform: scale(1); } 100%{ opacity: 1; transform: scale(1.02); }}

/* connection canvas */
#connectionCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 45;
}

/* butterfly rainbow particle canvas */
#butterflyCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 70;
}

/* ticker */
.ticker {
  position: sticky;
  bottom: 0;
  background: rgba(6,8,14,0.9);
  backdrop-filter: blur(16px);
  border-top: 1px solid rgba(200,146,42,0.3);
  display: flex;
  height: 28px;
  align-items: center;
  overflow: hidden;
  font-family: monospace;
  font-size: 9px;
  z-index: 90;
}
.tick-tag {
  background: #c8922a;
  color: #020202;
  font-weight: bold;
  padding: 0 16px;
  height: 100%;
  display: flex;
  align-items: center;
}
.tick-scroll {
  white-space: nowrap;
  animation: marquee 35s linear infinite;
  padding-left: 20px;
  color: #b8a070;
}
@keyframes marquee { 0%{ transform: translateX(0); } 100%{ transform: translateX(-50%); } }

/* responsive */
@media (max-width: 720px) { .medals-container { gap: 18px; } }
</style>

<body>

<!-- 3D Canvas (Four-Dimensional Engine) -->
<canvas id="bgCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; display:block; z-index:0;"></canvas>
<canvas id="connectionCanvas"></canvas>
<canvas id="butterflyCanvas"></canvas>

<div id="ui-overlay">
  <div class="topbar">
    <div class="tlogo">⚡ NAUION · TÂM LUXURY</div>

      <div class="t-chip"><div class="dot" style="background:#3dd68c"></div><span id="stateBadge">HEALTHY</span></div>

    </div>
  </div>
  <div class="hero-mini"><h1>🌀 BUTTERFLY PROPAGATION · 7 SẮC CẦU VỒNG NGƯỢC</h1><p>NHẤN VÀO MEDAL → LAN TỎA SÓNG CẢM XÚC HỆ THỐNG</p></div>

  <!-- Nauion Cells (Medals) -->
  <div class="medals-container" id="medalsGrid"></div>
  <div style="height: 20px;"></div>
  <div class="ticker"><div class="tick-tag">🌈 REVERSE RAINBOW WAVE</div><div class="tick-scroll" id="tickerMsg">⚡ HỆ THỐNG SẴN SÀNG · LAN TỎA HIỆU ỨNG CÁNH BƯỚM · 7 MÀU NGƯỢC: ĐỎ - CAM - VÀNG - LỤC - LAM - CHÀM - TÍM</div></div>
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  
// --- 1. FOUR-DIMENSIONAL BACKGROUND: Galaxy + Nebula + Particles + Depth Parallax ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x01010a);
scene.fog = new THREE.FogExp2(0x01010a, 0.0008);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 0, 12);
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => { mouseX = (e.clientX / window.innerWidth) * 2 - 1; mouseY = (e.clientY / window.innerHeight) * 2 - 1; });

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bgCanvas'), alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ReinhardToneMapping;
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
bloomPass.threshold = 0.2;
bloomPass.strength = 0.8;
bloomPass.radius = 0.5;
composer.addPass(bloomPass);

// Starfield (GPU Particles)
const starCount = 3500;
const starGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPositions[i*3] = (Math.random() - 0.5) * 400;
  starPositions[i*3+1] = (Math.random() - 0.5) * 200;
  starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.6 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// Spiral Galaxy Particles (shader-like)
const galaxyCount = 8000;
const galaxyGeo = new THREE.BufferGeometry();
const galPos = [];
const colors = [];
for (let i = 0; i < galaxyCount; i++) {
  const r = Math.pow(Math.random(), 1.5) * 8;
  const angle = Math.random() * Math.PI * 2;
  const spiralOffset = Math.sin(angle * 5) * 0.6;
  const x = Math.cos(angle) * (r + spiralOffset);
  const z = Math.sin(angle) * (r + spiralOffset);
  const y = (Math.random() - 0.5) * 1.2;
  galPos.push(x, y, z);
  const mixColor = new THREE.Color().setHSL(0.12 + Math.random() * 0.08, 0.8, 0.5);
  colors.push(mixColor.r, mixColor.g, mixColor.b);
}
galaxyGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(galPos), 3));
galaxyGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
const galaxyPoints = new THREE.Points(galaxyGeo, new THREE.PointsMaterial({ size: 0.08, vertexColors: true, blending: THREE.AdditiveBlending }));
scene.add(galaxyPoints);

// Nebula volumetric cloud (particle cloud)
const nebulaParticles = 2500;
const nebulaGeo = new THREE.BufferGeometry();
const nebPos = [];
for (let i = 0; i < nebulaParticles; i++) {
  const rad = Math.random() * 14;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const x = rad * Math.sin(phi) * Math.cos(theta);
  const y = rad * Math.sin(phi) * Math.sin(theta) * 0.6;
  const z = rad * Math.cos(phi);
  nebPos.push(x + (Math.random() - 0.5)*2, y*0.8, z + (Math.random() - 0.5)*3);
}
nebulaGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(nebPos), 3));
const nebulaMat = new THREE.PointsMaterial({ color: 0xb57c4c, size: 0.12, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending });
const nebulaCloud = new THREE.Points(nebulaGeo, nebulaMat);
scene.add(nebulaCloud);

// Depth layering groups
const layerBack = new THREE.Group(); layerBack.position.z = -10;
const layerMid = new THREE.Group(); layerMid.position.z = -4;
scene.add(layerBack); scene.add(layerMid);
// floating dust
const dustCount = 1800;
const dustGeo = new THREE.BufferGeometry();
const dustPos = [];
for (let i = 0; i < dustCount; i++) {
  dustPos.push((Math.random() - 0.5) * 50, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 20 - 15);
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
const dustMat = new THREE.PointsMaterial({ color: 0xcca87a, size: 0.05, transparent: true, opacity: 0.3 });
const dustLayer = new THREE.Points(dustGeo, dustMat);
layerMid.add(dustLayer);

// animation loop: parallax & rotation
let time = 0;
function animateBackground() {
  time += 0.008;
  // camera parallax
  camera.position.x += (mouseX * 0.8 - camera.position.x) * 0.05;
  camera.position.y += (-mouseY * 0.5 - camera.position.y) * 0.05;
  camera.lookAt(0, 0, 0);
  stars.rotation.y = time * 0.02;
  galaxyPoints.rotation.y = time * 0.01;
  galaxyPoints.rotation.x = Math.sin(time * 0.1) * 0.1;
  nebulaCloud.rotation.y = time * 0.005;
  layerBack.rotation.y = time * 0.003;
  layerMid.rotation.x = Math.sin(time * 0.2) * 0.02;
  requestAnimationFrame(animateBackground);
  composer.render();
}
animateBackground();

// --- 2. NAUION CELLS (MEDALS) & BUTTERFLY PROPAGATION (Reverse Rainbow)---
const cells = [
  { id: 'sales', title: 'SALES CORE', cat: 'business', qneu: 0.87, confidence: 0.92, scars: [], colorTheme: 'mint', icon: '💎', connections: ['showroom','prod'] },
  { id: 'showroom', title: 'SHOWROOM', cat: 'luxury', qneu: 0.76, confidence: 0.68, scars: [], colorTheme: 'champagne', icon: '✨', connections: ['sales','master'] },
  { id: 'prod', title: 'XƯỞNG SX', cat: 'production', qneu: 0.64, confidence: 0.81, scars: [{id:'SCAR01', lesson:'hao hụt'}], colorTheme: 'ice', icon: '⚙️', connections: ['sales','warehouse'] },
  { id: 'warehouse', title: 'KHO VẬT', cat: 'logistics', qneu: 0.72, confidence: 0.55, scars: [], colorTheme: 'mint', icon: '📦', connections: ['prod','master'] },
  { id: 'master', title: 'MASTER DASH', cat: 'constitution', qneu: 0.94, confidence: 0.98, scars: [], colorTheme: 'gold', icon: '🔱', connections: ['showroom','warehouse','ai'] },
  { id: 'ai', title: 'KRIS · AI', cat: 'intelligence', qneu: 0.88, confidence: 0.89, scars: [], colorTheme: 'lavender', icon: '🧠', connections: ['master','hr'] },
  { id: 'hr', title: 'HR ORBIT', cat: 'human', qneu: 0.69, confidence: 0.73, scars: [], colorTheme: 'rose', icon: '👥', connections: ['ai'] }
];

const colorMap = { mint: '#E0FFE0', champagne: '#F7E7CE', ice: '#E0FFFF', gold: '#FFD700', lavender: '#E6E6FA', rose: '#FFE4E1' };
const medalsContainer = document.getElementById('medalsGrid');
const medalElements = new Map();
let connectionCtx, connCanvas;

function initConnCanvas() {
  connCanvas = document.getElementById('connectionCanvas');
  connCanvas.width = window.innerWidth;
  connCanvas.height = window.innerHeight;
  connectionCtx = connCanvas.getContext('2d');
  window.addEventListener('resize', () => { connCanvas.width = window.innerWidth; connCanvas.height = window.innerHeight; drawAllConnections(); });
}

function getMedalPos(id) {
  const el = medalElements.get(id);
  if (!el) return null;
  const rect = el.getBoundingClientRect();
  return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
}

function drawAllConnections() {
  if (!connectionCtx) return;
  connectionCtx.clearRect(0, 0, connCanvas.width, connCanvas.height);
  connectionCtx.beginPath();
  connectionCtx.strokeStyle = 'rgba(200,180,120,0.25)';
  connectionCtx.lineWidth = 1.5;
  for (let cell of cells) {
    const from = getMedalPos(cell.id);
    if (!from) continue;
    for (let connId of cell.connections) {
      const to = getMedalPos(connId);
      if (to) {
        connectionCtx.beginPath();
        connectionCtx.moveTo(from.x, from.y);
        connectionCtx.lineTo(to.x, to.y);
        connectionCtx.stroke();
      }
    }
  }
}
setInterval(() => drawAllConnections(), 300);
window.addEventListener('resize', () => setTimeout(drawAllConnections, 100));

// --- Butterfly Event System + Reverse Rainbow Particle Engine ---
const butterflyCanvas = document.getElementById('butterflyCanvas');
let bCtx, particles = [];
function initButterflyCanvas() {
  butterflyCanvas.width = window.innerWidth;
  butterflyCanvas.height = window.innerHeight;
  bCtx = butterflyCanvas.getContext('2d');
  window.addEventListener('resize', () => { butterflyCanvas.width = window.innerWidth; butterflyCanvas.height = window.innerHeight; });
}
function spawnRainbowParticles(x, y, directionX, directionY, count = 22, colorSequence = true) {
  const reverseRainbow = ['#ff4d4d','#ffaa33','#ffff66','#66ff66','#3399ff','#8c5eff','#c77dff']; // đỏ -> cam -> vàng -> lục -> lam -> chàm -> tím
  for (let i = 0; i < count; i++) {
    const angle = Math.atan2(directionY, directionX) + (Math.random() - 0.5) * 1.2;
    const speed = 2 + Math.random() * 5;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed;
    let colorIdx = colorSequence ? Math.floor(Math.random() * reverseRainbow.length) : i % reverseRainbow.length;
    particles.push({
      x, y, vx, vy, life: 1.0, size: 3 + Math.random() * 5,
      color: reverseRainbow[colorIdx % reverseRainbow.length]
    });
  }
}
function animateParticles() {
  if (!bCtx) return;
  bCtx.clearRect(0, 0, butterflyCanvas.width, butterflyCanvas.height);
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.02;
    p.size *= 0.98;
    if (p.life <= 0 || p.x < 0 || p.x > butterflyCanvas.width || p.y < 0 || p.y > butterflyCanvas.height) {
      particles.splice(i,1);
      continue;
    }
    bCtx.globalAlpha = p.life * 0.9;
    bCtx.fillStyle = p.color;
    bCtx.beginPath();
    bCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    bCtx.fill();
  }
  requestAnimationFrame(animateParticles);
}

// Butterfly propagation (local, neighbor, tsunami)
function localRipple(cellId, cause = 'click') {
  const medalDiv = medalElements.get(cellId);
  if (medalDiv) {
    medalDiv.style.animation = 'none';
    medalDiv.offsetHeight;
    medalDiv.style.animation = 'ripple-pulse 0.6s ease-out';
    const pos = getMedalPos(cellId);
    if (pos) spawnRainbowParticles(pos.x, pos.y, (Math.random()-0.5)*2, (Math.random()-0.5)*2, 18, true);
  }
  // update QNEU demo: slight evolution
  const cell = cells.find(c => c.id === cellId);
  if (cell && cell.qneu > 0.3) cell.qneu = Math.min(0.99, cell.qneu + 0.005);
  updateMedalUI(cellId);
}

async function neighborWave(sourceId, targetIds) {
  for (let target of targetIds) {
    const fromPos = getMedalPos(sourceId);
    const toPos = getMedalPos(target);
    if (fromPos && toPos) {
      // animated traveling line visual (draw dynamic line)
      const steps = 20;
      for (let s = 0; s <= steps; s++) {
        setTimeout(() => {
          if (!connectionCtx) return;
          drawAllConnections();
          connectionCtx.beginPath();
          connectionCtx.moveTo(fromPos.x, fromPos.y);
          const t = s/steps;
          const midX = fromPos.x + (toPos.x - fromPos.x)*t;
          const midY = fromPos.y + (toPos.y - fromPos.y)*t;
          connectionCtx.lineTo(midX, midY);
          connectionCtx.strokeStyle = `hsl(${30 + t*300}, 80%, 60%)`;
          connectionCtx.lineWidth = 4;
          connectionCtx.stroke();
          setTimeout(() => drawAllConnections(), 80);
        }, s * 18);
      }
      setTimeout(() => {
        spawnRainbowParticles(toPos.x, toPos.y, (Math.random()-0.5)*2, (Math.random()-0.5)*2, 12, true);
        localRipple(target, 'neighbor');
      }, 180);
    }
  }
}

function colonyTsunami(severity = 'medium') {
  document.body.style.transition = 'background 0.6s';
  document.body.style.backgroundColor = 'rgba(128,0,32,0.2)';
  setTimeout(() => document.body.style.backgroundColor = '', 1000);
  for (let cell of cells) {
    const pos = getMedalPos(cell.id);
    if (pos) spawnRainbowParticles(pos.x, pos.y, 0, -1, 28, true);
    localRipple(cell.id, 'tsunami');
  }
  const msgDiv = document.getElementById('tickerMsg');
  msgDiv.innerHTML = '🌊🌪️ BUTTERFLY TSUNAMI · COLONY REVERSE RAINBOW WAVE · HỆ THỐNG RUNG ĐỘNG';
  setTimeout(() => { msgDiv.innerHTML = '⚡ HỆ THỐNG SẴN SÀNG · LAN TỎA HIỆU ỨNG CÁNH BƯỚM · 7 MÀU NGƯỢC: ĐỎ - CAM - VÀNG - LỤC - LAM - CHÀM - TÍM'; }, 2500);
}

async function triggerButterfly(cellId) {
  const cell = cells.find(c => c.id === cellId);
  if (!cell) return;
  localRipple(cellId, 'trigger');
  // neighbor wave L2
  const neighbors = cell.connections;
  if (neighbors.length) await neighborWave(cellId, neighbors);
  // 20% chance random tsunami or if qneu < 0.5, simulate colony event
  if (cell.qneu < 0.55 || Math.random() < 0.2) {
    colonyTsunami();
  }
  // update state badge
  document.getElementById('stateBadge').innerHTML = `🌀 ${cell.title.toUpperCase()}`;
  setTimeout(() => document.getElementById('stateBadge').innerHTML = 'HEALTHY', 1500);
}

function updateMedalUI(cellId) {
  const cell = cells.find(c => c.id === cellId);
  const div = medalElements.get(cellId);
  if (!div) return;
  const ringSvg = div.querySelector('.qneu-ring svg circle:last-child');
  if (ringSvg) {
    const circum = 2 * Math.PI * 42;
    const dash = cell.qneu * circum;
    ringSvg.setAttribute('stroke-dasharray', `${dash} ${circum}`);
  }
  const badge = div.querySelector('.confidence-badge');
  if (badge) badge.textContent = `Q:${(cell.qneu*100).toFixed(0)}% C:${(cell.confidence*100).toFixed(0)}%`;
  const scarDiv = div.querySelector('.scar-indicator');
  if (cell.scars.length > 0 && !scarDiv) {
    const newScar = document.createElement('div');
    newScar.className = 'scar-indicator';
    div.appendChild(newScar);
  } else if (cell.scars.length === 0 && scarDiv) scarDiv.remove();
}

function renderMedals() {
  medalsContainer.innerHTML = '';
  cells.forEach(cell => {
    const medal = document.createElement('div');
    medal.className = 'medal';
    medal.setAttribute('data-id', cell.id);
    medal.innerHTML = `
      <div class="medal-inner">
        <div class="liquid-glass-overlay" style="--mx:50%;--my:50%"></div>
        <div class="medal-icon">${cell.icon}</div>
        <div class="medal-title">${cell.title}</div>
        <div class="confidence-badge">Q:${(cell.qneu*100).toFixed(0)}% C:${(cell.confidence*100).toFixed(0)}%</div>
      </div>
      <div class="qneu-ring"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,200,0.2)" stroke-width="3"/><circle cx="50" cy="50" r="46" fill="none" stroke="${colorMap[cell.colorTheme] || '#F7E7CE'}" stroke-width="3" stroke-dasharray="${cell.qneu * 289} 289" stroke-linecap="round"/></svg></div>
      ${cell.scars.length ? '<div class="scar-indicator"></div>' : ''}
    `;
    medal.addEventListener('click', (e) => { e.stopPropagation(); triggerButterfly(cell.id); });
    medal.addEventListener('mousemove', (e) => {
      const rect = medal.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      const overlay = medal.querySelector('.liquid-glass-overlay');
      if (overlay) overlay.style.setProperty('--mx', `${x}%`); overlay.style.setProperty('--my', `${y}%`);
    });
    medalsContainer.appendChild(medal);
    medalElements.set(cell.id, medal);
  });
  setTimeout(() => drawAllConnections(), 50);
}
