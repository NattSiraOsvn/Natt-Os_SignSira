<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tâm Luxury · NATT-OS</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ─── SPEC §9.3 TOKENS ─────────────────────────────────── */
:root {
  --color-champagne:#F7E7CE; --color-peach:#FFDAB9; --color-ice-blue:#E0FFFF;
  --color-mint:#E0FFE0; --color-lavender:#E6E6FA; --color-rose:#FFE4E1;
  --color-burgundy:#800020; --liquid-glass-blur:18px;
  --medal-size:clamp(110px,14vw,170px);
  --glow-pastel:0 0 20px rgba(255,235,200,.5);
  --z-truth:2; --z-worker:10; --z-experience:50; --z-modal:100; --z-security:999;
  /* sidebar fluid */
  --sb:clamp(52px,14vw,210px);
  --panel-w:clamp(0px,15vw,210px);
}
@media(max-width:900px){:root{--sb:52px}}

/* ─── RESET ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
input{user-select:text}
html,body{height:100%;overflow:hidden;background:#030210;
  font-family:'Be Vietnam Pro',sans-serif;color:#ede0c8}

/* ─── CANVAS LAYERS ────────────────────────────────────── */
#bgCanvas,#connectionCanvas,#butterflyCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:block;pointer-events:none;
}
#bgCanvas{z-index:0}
#connectionCanvas{z-index:1}
#butterflyCanvas{z-index:2}

/* SPEC §1.2 Truth Layer Grid */
.l0-grid{position:fixed;inset:0;z-index:var(--z-truth);pointer-events:none;
  background-image:
    linear-gradient(rgba(200,146,42,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,146,42,.012) 1px,transparent 1px);
  background-size:48px 48px}
.l0-scan{position:fixed;left:0;right:0;height:1px;z-index:var(--z-truth);pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(232,184,75,.28),transparent);
  animation:scan 28s linear infinite}
@keyframes scan{0%{top:-1%}100%{top:101%}}

/* ─── APP SHELL ─────────────────────────────────────────── */
#app-shell{
  position:relative;z-index:var(--z-experience);
  display:flex;height:100vh;overflow:hidden;
}

/* ─── SIDEBAR ──────────────────────────────────────────── */
.sidebar{
  width:var(--sb);flex-shrink:0;
  display:flex;flex-direction:column;
  background:rgba(4,4,20,.85);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(200,146,42,0.13);
  height:100vh;overflow:hidden;z-index:2;
  transition:width .25s ease;
}
.sb-head{padding:clamp(12px,1.5vh,18px) clamp(8px,.8vw,14px) clamp(8px,1vh,12px);
  border-bottom:1px solid rgba(200,146,42,0.1)}
.sb-logo{font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:clamp(9px,.85vw,13px);letter-spacing:.1em;
  background:linear-gradient(135deg,#f5e2b0,#e0b85b,#c9942a);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  white-space:nowrap;overflow:hidden}
.sb-sub{font-size:clamp(6px,.55vw,8px);color:rgba(200,146,42,0.3);
  letter-spacing:.2em;margin-top:2px;white-space:nowrap;overflow:hidden}
.sb-nav{flex:1;overflow-y:auto;padding:clamp(4px,0.5vh,8px) 0}
.nav-lbl{font-size:clamp(7px,.6vw,9px);color:rgba(200,146,42,0.28);
  letter-spacing:.25em;text-transform:uppercase;
  padding:clamp(6px,.7vh,10px) clamp(8px,.8vw,14px) 2px;
  white-space:nowrap;overflow:hidden}
.nav-it{
  display:flex;align-items:center;gap:clamp(6px,.6vw,10px);
  padding:clamp(7px,.75vh,10px) clamp(8px,.8vw,14px);
  margin:1px clamp(3px,.3vw,7px);
  border-radius:clamp(7px,0.7vw,10px);cursor:pointer;
  font-size:clamp(10px,.95vw,13px);font-weight:500;
  color:rgba(237,224,200,0.5);transition:all .15s;
  white-space:nowrap;overflow:hidden;
}
.nav-it:hover{background:rgba(200,146,42,0.1);color:rgba(237,224,200,0.88)}
.nav-it.active{background:rgba(200,146,42,0.18);color:#e8b84b;
  box-shadow:inset 2px 0 0 #c8922a}
.nav-it svg{width:clamp(13px,1.3vw,16px);height:clamp(13px,1.3vw,16px);
  flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;opacity:0.65}
.nav-it.active svg{opacity:1}

@media(max-width:900px){
  .nav-lbl,.sb-logo,.sb-sub,.nav-label{display:none}
  .nav-it{justify-content:center;padding:clamp(9px,0.9vh,12px) 0}
  .sb-head{text-align:center}
  .sb-foot{justify-content:center}
}

.sb-foot{padding:clamp(8px,0.8vh,12px) clamp(8px,.8vw,12px);
  border-top:1px solid rgba(200,146,42,0.1);
  display:flex;align-items:center;gap:clamp(6px,.6vw,10px)}
.sb-av{width:clamp(26px,2.2vw,32px);height:clamp(26px,2.2vw,32px);border-radius:50%;
  flex-shrink:0;background:linear-gradient(135deg,#c8922a,rgba(200,146,42,0.4));
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(10px,.95vw,12px);font-weight:700;color:#0b0a05}
.sb-un{font-size:clamp(10px,.95vw,12px);font-weight:600;white-space:nowrap;overflow:hidden}
.sb-ur{font-size:clamp(7px,0.6vw,9px);color:rgba(200,146,42,0.4);
  font-family:'JetBrains Mono',monospace}
.sb-dot{width:6px;height:6px;border-radius:50%;background:#3dd68c;
  box-shadow:0 0 5px #3dd68c;margin-left:auto;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:0.6;transform:scale(0.9)}50%{opacity:1;transform:scale(1.15)}}

/* ─── MAIN SHELL ─────────────────────────────────────────── */
.main-shell{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ─── TOPBAR ───────────────────────────────────────────── */
.header{
  flex-shrink:0;height:clamp(40px,5vh,52px);
  display:flex;align-items:center;padding:0 clamp(12px,1.2vw,20px);gap:clamp(6px,.6vw,10px);
  background:rgba(3,3,15,.82);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,146,42,0.12);z-index:2;
}
.nav-left{font-family:'JetBrains Mono',monospace;font-size:clamp(10px,.95vw,13px);
  color:#e8b84b;font-weight:700;letter-spacing:.08em;white-space:nowrap}
.nav-center{display:flex;gap:clamp(3px,0.3vw,5px);margin-left:clamp(6px,.6vw,10px)}
.nav-btn{
  padding:clamp(3px,0.35vh,5px) clamp(8px,0.85vw,14px);border-radius:20px;border:none;
  cursor:pointer;font-size:clamp(9px,.85vw,11px);font-weight:600;letter-spacing:.04em;
  font-family:'Be Vietnam Pro',sans-serif;
  background:rgba(255,255,255,.06);color:rgba(237,224,200,0.5);transition:all .15s;
}
.nav-btn:hover{background:rgba(200,146,42,0.15);color:#e8b84b}
.nav-btn.active{background:rgba(200,146,42,0.28);color:#e8b84b}
.nav-right{display:flex;align-items:center;gap:clamp(6px,.6vw,8px);margin-left:auto}
.t-chip{display:flex;align-items:center;gap:5px;background:rgba(200,146,42,0.08);
  border:1px solid rgba(200,146,42,0.25);border-radius:30px;
  padding:clamp(3px,0.3vh,4px) clamp(7px,.7vw,10px);
  font-size:clamp(8px,.75vw,10px);font-family:'JetBrains Mono',monospace;color:#e8b84b}

/* ─── MAIN CONTENT ─────────────────────────────────────── */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ─── HERO ZONE ────────────────────────────────────────── */
.hero-zone{
  position:relative;
  height:calc(100vh - clamp(40px,5vh,52px) - clamp(22px,3vh,28px));
  display:grid;
  grid-template-columns:var(--panel-w) minmax(0,1fr) var(--panel-w);
  min-height:0;
}
@media(max-width:900px){.hero-zone{grid-template-columns:0 1fr 0}}

.left-panel,.right-panel{
  padding:clamp(10px,1.2vh,16px) clamp(8px,0.85vw,14px);
  display:flex;flex-direction:column;gap:clamp(4px,0.5vh,8px);
  background:rgba(4,5,18,.72);
  border-right:1px solid rgba(200,146,42,0.08);overflow:hidden;
}
.right-panel{border-right:none;border-left:1px solid rgba(200,146,42,0.08)}
@media(max-width:900px){.left-panel,.right-panel{display:none}}

.panel-title{font-family:'JetBrains Mono',monospace;
  font-size:clamp(7px,0.65vw,9px);font-weight:700;color:#c8922a;
  letter-spacing:.22em;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.panel-title svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}

.stat-item{display:flex;justify-content:space-between;align-items:center;
  font-size:clamp(8px,.75vw,10px);color:rgba(237,224,200,0.45);
  padding:clamp(2px,0.25vh,3px) 0;border-bottom:1px solid rgba(200,146,42,0.04)}
.stat-value{font-family:'JetBrains Mono',monospace;
  font-size:clamp(9px,.85vw,11px);color:#e8b84b;font-weight:700}
.stat-value.g{color:#3dd68c}.stat-value.r{color:#f05050}.stat-value.a{color:#f0a030}

.task-btn{
  display:flex;align-items:center;gap:clamp(6px,0.6vw,8px);
  padding:clamp(7px,0.75vh,10px) clamp(8px,0.85vw,12px);
  border-radius:clamp(7px,0.7vw,10px);
  border:1px solid rgba(200,146,42,0.18);background:rgba(200,146,42,0.07);
  color:rgba(237,224,200,0.65);font-family:'Be Vietnam Pro',sans-serif;
  font-size:clamp(9px,.85vw,11px);font-weight:600;cursor:pointer;
  transition:all .15s;text-align:left;width:100%;
}
.task-btn:hover{background:rgba(200,146,42,0.2);color:#e8b84b;border-color:rgba(200,146,42,0.38)}

/* ─── MEDALS CENTER ────────────────────────────────────── */
#ui-overlay{
  position:relative;pointer-events:auto;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  flex:1;min-width:0;width:100%;
}
.medals-container{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:clamp(14px,2.2vw,28px);padding:clamp(14px,1.5vh,22px);
  max-width:min(680px,100%);max-height:100%;
}

/* ─── MEDAL LAYERS ─────────────────────────────────────── */
.medal{
  width:var(--medal-size);height:var(--medal-size);
  position:relative;cursor:pointer;flex-shrink:0;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);
}
.medal:hover{transform:scale(1.07) translateY(-3px)}

.orbital-rings{position:absolute;inset:-14%;pointer-events:none}
.orbital-rings svg{position:absolute;inset:0;width:100%;height:100%}

.medal-inner{
  position:absolute;inset:0;border-radius:50%;overflow:hidden;
  transition:box-shadow .3s;
}
.medal:hover .medal-inner{box-shadow:0 0 clamp(16px,2vw,28px) rgba(200,146,42,0.45),0 0 clamp(32px,4vw,60px) rgba(200,146,42,0.18)}

.specular-sweep{
  position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.1) 50%,transparent 70%);
  transform:translateX(-110%);transition:transform 1.2s ease;
}
.medal:hover .specular-sweep{transform:translateX(110%)}

.fresnel-rim{position:absolute;inset:0;border-radius:50%;
  box-shadow:inset 0 0 10px rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);pointer-events:none}

.liquid-glass-overlay{
  position:absolute;inset:0;border-radius:50%;pointer-events:none;
  backdrop-filter:blur(var(--liquid-glass-blur)) saturate(180%);
  background:radial-gradient(circle at 50% 28%,rgba(255,255,255,0.1) 0%,rgba(255,255,255,0.015) 55%,transparent 100%);
  border:1px solid rgba(255,255,255,0.12);
}

.medal-glass-core{
  position:absolute;inset:12%;border-radius:50%;overflow:hidden;
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
  background:rgba(3,3,18,.22);
}

.medal-icon{position:relative;z-index:1;font-size:clamp(20px,2.4vw,30px);
  filter:drop-shadow(0 0 6px rgba(255,255,255,0.55)) drop-shadow(0 0 14px rgba(200,146,42,0.55))}
.medal-title{position:relative;z-index:1;
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(5px,0.65vw,8px);font-weight:700;
  letter-spacing:.15em;color:rgba(237,224,200,0.78);text-transform:uppercase}

.qneu-ring{position:absolute;inset:-8%;width:116%;height:116%;pointer-events:none}
.qneu-ring svg{transform:rotate(-90deg)}

/* ─── FEED ─────────────────────────────────────────────── */
.feed{
  flex:1;overflow-y:auto;scroll-behavior:smooth;
  scrollbar-width:thin;scrollbar-color:rgba(200,146,42,0.2) transparent;
}
.fsec{padding:clamp(14px,1.6vh,22px) clamp(16px,1.6vw,28px) clamp(8px,1vh,12px)}
.fttl{font-size:clamp(14px,1.5vw,20px);font-weight:700;color:#ede0c8;margin-bottom:12px}

.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:900px){.agrid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.agrid{grid-template-columns:1fr}}

.arow{display:flex;align-items:center;gap:12px;padding:8px;
  background:rgba(200,146,42,0.03);border-radius:10px;cursor:pointer;transition:background 0.2s}
.arow:hover{background:rgba(200,146,42,0.08)}
.aico{width:40px;height:40px;border-radius:8px;background:rgba(200,146,42,0.1);
  display:flex;align-items:center;justify-content:center;font-size:18px}
.anm{font-size:13px;font-weight:600}
.ads{font-size:10px;color:rgba(200,146,42,0.5)}

/* ─── BOTTOM STREAM ────────────────────────────────────── */
.bottom-stream{
  flex-shrink:0;height:clamp(22px,3vh,28px);
  display:flex;align-items:center;overflow:hidden;
  background:rgba(3,3,14,.92);backdrop-filter:blur(16px);
  border-top:1px solid rgba(200,146,42,0.18);z-index:2;
}
.stream-label{background:linear-gradient(95deg,#c8922a,#e8b84b);color:#0a0800;
  font-size:clamp(7px,.65vw,8px);font-weight:900;
  padding:0 clamp(10px,1vw,14px);height:100%;
  display:flex;align-items:center;letter-spacing:.18em;flex-shrink:0}
.event-stream{white-space:nowrap;display:flex;align-items:center;gap:24px;
  padding-left:16px;font-family:'JetBrains Mono',monospace}
.event-item{font-size:clamp(8px,.75vw,9px);color:rgba(200,146,42,0.55)}
.event-time{color:rgba(200,146,42,0.3);margin-right:5px}

/* ─── ANIMATIONS ─────────────────────────────────────────── */
@keyframes ripple-pulse{
  0%{box-shadow:0 0 0 0 rgba(255,215,0,0.7);transform:scale(1)}
  70%{box-shadow:0 0 0 22px rgba(255,215,0,0);transform:scale(1.04)}
  100%{box-shadow:0 0 0 0 rgba(255,215,0,0);transform:scale(1)}
}
</style>
</head>

<div id="app-shell">
  <aside class="sidebar">
    <div class="sb-head">

<script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

/* ─── §7.1 EVENTBUS (SURGICAL FIX: ADD OFF) ──────────────── */
const EventBus = {
  events: {},
  on(event, callback) {
    if (!this.events[event]) this.events[event] = [];
    this.events[event].push(callback);
    return () => this.off(event, callback); // Trả về hàm hủy lắng nghe
  },
  off(event, callback) {
    if (!this.events[event]) return;
    this.events[event] = this.events[event].filter(cb => cb !== callback);
  },
  emit(event, data) {
    const envelope = {
      event_id: crypto.randomUUID(),
      timestamp: Date.now(),
      type: event,
      payload: data
    };
    (this.events[event] || []).forEach(cb => cb(envelope));
    if (event !== 'audit.record') this.emit('audit.record', { original: envelope });
  }
};

/* ─── OPT-01R: UNIFIED RENDER CONTROL ────────────────────── */
const RenderCtrl = {
  mode: 'IDLE',
  Z: 1.0,
  attention: 0.0,
  lastHeynaTs: 0,
  rafId: null,
  
  updateMode() {
    const now = Date.now();
    const oldMode = this.mode;

    if (this.Z > 1.3) this.mode = 'DEGRADED';
    else if (now - this.lastHeynaTs < 1000) this.mode = 'BURST';
    else if (this.attention > 0.2) this.mode = 'ACTIVE';
    else this.mode = 'IDLE';

    if (oldMode !== this.mode) {
      document.getElementById('renderMode').textContent = this.mode;
      EventBus.emit('render.mode.changed', { newMode: this.mode });
    }
  },

  start() {
    if (this.rafId) return;
    const loop = () => {
      this.updateMode();
      if (this.mode !== 'IDLE') {
        renderFrame();
      }
      this.rafId = requestAnimationFrame(loop);
    };
    this.rafId = requestAnimationFrame(loop);
  }
};

/* ─── GALAXY & SCENE SETUP ──────────────────────────────── */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.z = 12;

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bgCanvas'), antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.9, 0.12);
composer.addPass(bloomPass);

// Galaxy Particles (Reduced to 3000 for stability)
const galaxyGeo = new THREE.BufferGeometry();
const posArray = new Float32Array(3000 * 3);
for(let i=0; i<9000; i++) posArray[i] = (Math.random()-0.5) * 20;
galaxyGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const galaxyMat = new THREE.PointsMaterial({ size: 0.05, color: 0x60b8f0, transparent: true, opacity: 0.6 });
const galaxyPoints = new THREE.Points(galaxyGeo, galaxyMat);
scene.add(galaxyPoints);

/* ─── 2D CANVASES & CACHE ────────────────────────────────── */
const connCanvas = document.getElementById('connectionCanvas');
const connCtx = connCanvas.getContext('2d');
const butterflyCanvas = document.getElementById('butterflyCanvas');
const bCtx = butterflyCanvas.getContext('2d');

let medalPosCache = new Map();
let butterflyParticles = [];

function updateMedalCache() {
  medalPosCache.clear();
  cells.forEach(c => {
    const el = document.querySelector(`[data-cell-id="${c.id}"]`);
    if (el) {
      const r = el.getBoundingClientRect();
      medalPosCache.set(c.id, { x: r.left + r.width/2, y: r.top + r.height/2 });
    }
  });
}

function draw2DLayers() {
  // Clear once per frame
  connCtx.clearRect(0, 0, connCanvas.width, connCanvas.height);
  bCtx.clearRect(0, 0, butterflyCanvas.width, butterflyCanvas.height);

  // Connections
  cells.forEach(cell => {
    const from = medalPosCache.get(cell.id);
    if (!from) return;
    (cell.connections || []).forEach(toId => {
      const to = medalPosCache.get(toId);
      if (!to) return;
      connCtx.beginPath();
      connCtx.moveTo(from.x, from.y);
      connCtx.lineTo(to.x, to.y);
      connCtx.strokeStyle = 'rgba(200,146,42,0.1)';
      connCtx.stroke();
    });
  });

  // Butterfly
  butterflyParticles = butterflyParticles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
    if (p.life <= 0) return false;
    bCtx.globalAlpha = p.life;
    bCtx.fillStyle = '#e8b84b';
    bCtx.beginPath(); bCtx.arc(p.x, p.y, 3 * p.life, 0, Math.PI*2); bCtx.fill();
    return true;
  });
}

/* ─── MAIN RENDER FRAME ─────────────────────────────────── */
const clock = new THREE.Clock();
function renderFrame() {
  const delta = clock.getDelta();
  const elapsed = performance.now() * 0.001;

  // 3D Animations
  galaxyPoints.rotation.y += 0.02 * delta;
  
  // 2D Unified Draw
  draw2DLayers();

  composer.render();
}

/* ─── CELLS DATA ────────────────────────────────────────── */
const cells = [
  { id:'sales', title:'SALES', icon:'💎', qneu:0.87, color:'#c8922a', connections:['prod'] },
  { id:'prod', title:'PROD', icon:'⚙️', qneu:0.64, color:'#60b8f0', connections:['warehouse'] },
  { id:'warehouse', title:'WH', icon:'🏭', qneu:0.72, color:'#3dd68c', connections:['sales'] }
];

function renderUI() {
  const grid = document.getElementById('medalsGrid');
  grid.innerHTML = cells.map(c => `
    <div class="medal" data-cell-id="${c.id}" onclick="triggerHeyNa('${c.id}')">
      <div class="medal-inner" style="border: 2px solid ${c.color}">
        <div class="liquid-glass-overlay"></div>
        <div class="medal-glass-core">
          <div class="medal-icon">${c.icon}</div>
          <div class="medal-title">${c.title}</div>
        </div>
      </div>
    </div>
  `).join('');

  const appGrid = document.getElementById('appGrid');
  appGrid.innerHTML = cells.map(c => `
    <div class="arow">
      <div class="aico">${c.icon}</div>
      <div class="ain"><div class="anm">${c.title} Terminal</div><div class="ads">QNEU ${(c.qneu*100).toFixed(0)}%</div></div>
    </div>
  `).join('');
  
  setTimeout(updateMedalCache, 100);
}

/* ─── UTILS & EVENT HANDLERS ────────────────────────────── */
window.triggerHeyNa = (id) => {
  RenderCtrl.lastHeynaTs = Date.now();
  EventBus.emit('HEYNA', { source: id });
  // Spawn particles
  const pos = medalPosCache.get(id);
  if(pos) {
    for(let i=0; i<5; i++) {
      butterflyParticles.push({
        x: pos.x, y: pos.y,
        vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
        life: 1.0
      });
    }
  }
  addEventToStream(`Xung HeyNa từ ${id}`);
};

function addEventToStream(msg) {
  const es = document.getElementById('eventStreamContainer');
  const span = document.createElement('span');
  span.className = 'event-item';
  span.innerHTML = `<span class="event-time">${new Date().toTimeString().slice(0,8)}</span> ${msg}`;
  es.appendChild(span);
  while (es.children.length > 10) es.removeChild(es.firstChild);
}

/* ─── INITIALIZATION ───────────────────────────────────── */
window.onload = () => {
  renderUI();
  RenderCtrl.start();

  // Attention Engine
  window.addEventListener('mousemove', () => {
    RenderCtrl.attention = 1.0;
    setTimeout(() => { RenderCtrl.attention = 0.0; }, 2000);
  });

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    connCanvas.width = window.innerWidth; connCanvas.height = window.innerHeight;
    butterflyCanvas.width = window.innerWidth; butterflyCanvas.height = window.innerHeight;
    updateMedalCache();
  });


  // ── MẠCH HEYNA — SSE TRUNG ƯƠNG (SPEC v2.4 OPT-01R) ──────────
  function initMachHeyna() {
    const mach = new EventSource('http://localhost:3001/mach/heyna');
    mach.onopen = () => {
      console.log('[NauionEngine] Whau — Mạch HeyNa sống');
      RenderCtrl.attention = 1.0;
      document.getElementById('stateBadge').textContent = 'HEALTHY';
    };
    mach.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        addEventToStream(`${d.event || d.type || 'Nahere'}`);
        EventBus.emit('heyna.pulse', d);
        RenderCtrl.lastHeynaTs = Date.now();
        RenderCtrl.attention = 1.0;
        setTimeout(() => { RenderCtrl.attention = 0.0; }, 2000);
      } catch {}
    };
    mach.onerror = () => {
      console.warn('[NauionEngine] lech — Mạch HeyNa đứt, Whao fallback 5s');
      document.getElementById('stateBadge').textContent = 'RECONNECTING';
      setTimeout(initMachHeyna, 5000);
      mach.close();
    };
  }

  initMachHeyna();
  console.log('✅ NATT-OS v3.2 | Unified Heartbeat | Memory Leak Fixed');
};

window.navTo = (id, el) => {
  document.querySelectorAll('.nav-it').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  triggerHeyNa('nav');
};
