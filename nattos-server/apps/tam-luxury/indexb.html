<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>natt-os · NAUION 4D | VISION ENGINE (P0+P1)</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    /* ---------- RESET & TOKENS (giữ nguyên phong cách luxury) ---------- */
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #030308; font-family: 'Be Vietnam Pro', sans-serif; }
    body { position: relative; }
    input, textarea { user-select: text; }

    :root {
      --color-champagne: #F7E7CE;
      --color-peach: #FFDAB9;
      --color-ice-blue: #E0FFFF;
      --color-mint: #E0FFE0;
      --color-lavender: #E6E6FA;
      --color-rose: #FFE4E1;
      --color-burgundy: #800020;
      --liquid-glass-blur: 18px;
      --z-security: 999;
      --medal-size: clamp(110px, 14vw, 170px);
      --glow-pastel: 0 0 20px rgba(255,235,200,0.5);
    }

    .liquid-glass {
      backdrop-filter: blur(var(--liquid-glass-blur)) saturate(180%);
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.02) 70%, transparent 100%);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: inherit;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    #ui-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,10,16,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(200,146,42,0.2);
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 60px;
      font-family: 'JetBrains Mono', monospace;
    }
    .tlogo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #f5d080, #c8922a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.08em;
    }
    .tsub { font-size: 8px; color: #a89070; margin-left: 10px; letter-spacing: 0.2em; }
    .t-r { margin-left: auto; display: flex; gap: 12px; }
    .t-chip {
      background: rgba(200,146,42,0.1);
      border: 1px solid rgba(200,146,42,0.3);
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 10px;
      font-family: monospace;
      color: #e8b84b;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{ opacity: 1; transform: scale(1); } 50%{ opacity: 0.4; transform: scale(0.7); }}

    .hero-mini {
      text-align: center;
      padding: 20px 24px 12px;
    }
    .hero-mini h1 {
      font-family: 'JetBrains Mono';
      font-size: 22px;
      background: linear-gradient(135deg, #f5d080, #e8b84b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero-mini p { font-size: 9px; color: #705838; letter-spacing: 0.2em; }

    .medals-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 28px;
      padding: 28px 24px 48px;
      position: relative;
      z-index: 60;
    }

    .medal {
      position: relative;
      width: var(--medal-size);
      height: var(--medal-size);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      flex-shrink: 0;
    }
    .medal:hover { transform: scale(1.05); }
    .medal-inner {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      backdrop-filter: blur(12px);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,240,0.1), rgba(0,0,0,0.4));
      border: 1px solid rgba(255,215,0,0.4);
      box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .liquid-glass-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      backdrop-filter: blur(6px);
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,245,0.2) 0%, transparent 70%);
    }
    .medal-icon {
      font-size: 34px;
      filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
      margin-bottom: 6px;
    }
    .medal-title {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #ffefc0, #e0b050);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .qneu-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      pointer-events: none;
    }
    .qneu-ring svg { width: 100%; height: 100%; }
    .confidence-badge {
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a0e18cc;
      backdrop-filter: blur(8px);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 7px;
      font-family: monospace;
      font-weight: bold;
      white-space: nowrap;
      border: 0.5px solid rgba(200,146,42,0.5);
    }
    .scar-indicator {
      position: absolute;
      inset: -10%;
      border-radius: 50%;
      border: 2px solid #800020;
      box-shadow: 0 0 12px rgba(128,0,32,0.7);
      animation: scarPulse 1.8s infinite;
      pointer-events: none;
    }
    @keyframes scarPulse { 0%{ opacity: 0.6; transform: scale(1); } 100%{ opacity: 1; transform: scale(1.02); }}

    #connectionCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 45;
    }

    #butterflyCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 70;
    }

    .ticker {
      position: sticky;
      bottom: 0;
      background: rgba(6,8,14,0.9);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(200,146,42,0.3);
      display: flex;
      height: 28px;
      align-items: center;
      overflow: hidden;
      font-family: monospace;
      font-size: 9px;
      z-index: 90;
    }
    .tick-tag {
      background: #c8922a;
      color: #020202;
      font-weight: bold;
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
    }
    .tick-scroll {
      white-space: nowrap;
      animation: marquee 35s linear infinite;
      padding-left: 20px;
      color: #b8a070;
    }
    @keyframes marquee { 0%{ transform: translateX(0); } 100%{ transform: translateX(-50%); } }

    @media (max-width: 720px) { .medals-container { gap: 18px; } }
  </style>
</head>
<body>

<canvas id="bgCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; display:block; z-index:0;"></canvas>
<canvas id="connectionCanvas"></canvas>
<canvas id="butterflyCanvas"></canvas>

<div id="ui-overlay">
  <div class="topbar">
    <div class="tlogo">⚡ NAUION · VISION ENGINE</div>
    <span class="tsub">SINH THỂ SỐ 4D | natt-os</span>
    <div class="t-r">
      <div class="t-chip"><div class="dot" style="background:#3dd68c"></div><span id="stateBadge">HEALTHY</span></div>
      <div class="t-chip"><div class="dot" style="background:#e8b84b"></div><span id="goldPrice">9999: --</span></div>
    </div>
  </div>
  <div class="hero-mini"><h1>🌀 BUTTERFLY PROPAGATION · 7 SẮC CẦU VỒNG NGƯỢC</h1><p>NHẤN VÀO MEDAL → LAN TỎA SÓNG CẢM XÚC HỆ THỐNG</p></div>
  <div class="medals-container" id="medalsGrid"></div>
  <div style="height: 20px;"></div>
  <div class="ticker"><div class="tick-tag">🌈 REVERSE RAINBOW WAVE</div><div class="tick-scroll" id="tickerMsg">⚡ HỆ THỐNG SẴN SÀNG · LAN TỎA HIỆU ỨNG CÁNH BƯỚM · 7 MÀU NGƯỢC: ĐỎ - CAM - VÀNG - LỤC - LAM - CHÀM - TÍM</div></div>
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
</script>

<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  
  // --- CONFIG GLOBAL ---
  const CONFIG = {
    bloom: { threshold: 0.1, strength: 0.65, radius: 0.8 },
    parallaxFactor: 0.8,
    noiseSpeed: 0.002,
    backgroundReactivity: 0.0  // sẽ thay đổi khi butterfly trigger
  };

  // --- SETUP SCENE VỚI GRADIENT BACKGROUND (P1) ---
  const scene = new THREE.Scene();
  // Gradient background dạng canvas texture
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, '#050518');
  gradient.addColorStop(0.5, '#1a1025');
  gradient.addColorStop(1, '#0a0510');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const bgTexture = new THREE.CanvasTexture(canvas);
  scene.background = bgTexture;
  scene.fog = new THREE.FogExp2(0x0a0510, 0.0012);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.set(0, 0, 12);
  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bgCanvas'), alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ReinhardToneMapping;

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
  bloomPass.threshold = CONFIG.bloom.threshold;
  bloomPass.strength = CONFIG.bloom.strength;
  bloomPass.radius = CONFIG.bloom.radius;
  composer.addPass(bloomPass);

  // --- LAYER PARALLAX (P0) ---
  const layerFar = new THREE.Group();
  const layerMid = new THREE.Group();
  const layerNear = new THREE.Group();
  scene.add(layerFar);
  scene.add(layerMid);
  scene.add(layerNear);
  layerFar.position.z = -15;
  layerMid.position.z = -5;
  layerNear.position.z = 2;

  // --- RAYMARCHING FAKE (P0): Dùng shader particle cloud với noise động thay thế nebula cũ ---
  function createNebulaCloud() {
    const count = 4000;
    const geo = new THREE.BufferGeometry();
    const pos = [];
    const color = [];
    const speed = []; // lưu drift velocity
    for (let i = 0; i < count; i++) {
      const r = 4 + Math.random() * 8;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.sin(phi) * Math.sin(theta) * 0.7;
      const z = r * Math.cos(phi);
      pos.push(x, y, z);
      
      // pastel palette (P1)
      const hue = 0.75 + Math.random() * 0.2; // xanh tím pastel
      const c = new THREE.Color().setHSL(hue, 0.5 + Math.random()*0.3, 0.5 + Math.random()*0.3);
      color.push(c.r, c.g, c.b);
      
      speed.push(
        (Math.random()-0.5)*0.008,
        (Math.random()-0.5)*0.008,
        (Math.random()-0.5)*0.008
      );
    }
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
    geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(color), 3));
    geo.userData.speed = speed;
    
    const mat = new THREE.PointsMaterial({
      size: 0.15,
      vertexColors: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const cloud = new THREE.Points(geo, mat);
    return cloud;
  }

  const nebulaCloud = createNebulaCloud();
  layerMid.add(nebulaCloud);

  // Starfield với noise animation (P0)
  const starCount = 4000;
  const starGeo = new THREE.BufferGeometry();
  const starPos = [];
  for (let i = 0; i < starCount; i++) {
    starPos.push((Math.random()-0.5)*400, (Math.random()-0.5)*200, (Math.random()-0.5)*100 - 30);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
  const starMat = new THREE.PointsMaterial({ color: 0xfff5e6, size: 0.25, transparent: true, blending: THREE.AdditiveBlending });
  const stars = new THREE.Points(starGeo, starMat);
  layerFar.add(stars);

  // Spiral Galaxy (giảm visibility P1)
  const galaxyCount = 6000;
  const galGeo = new THREE.BufferGeometry();
  const galPos = [];
  const galCol = [];
  for (let i = 0; i < galaxyCount; i++) {
    const r = Math.pow(Math.random(), 1.8) * 7;
    const angle = Math.random() * Math.PI * 2;
    const spiral = Math.sin(angle*4)*0.5;
    const x = Math.cos(angle)*(r+spiral);
    const z = Math.sin(angle)*(r+spiral);
    const y = (Math.random()-0.5)*1.2;
    galPos.push(x, y, z);
    const hue = 0.08 + Math.random()*0.1;
    const c = new THREE.Color().setHSL(hue, 0.6, 0.4);
    galCol.push(c.r, c.g, c.b);
  }
  galGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(galPos), 3));
  galGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(galCol), 3));
  const galMat = new THREE.PointsMaterial({ size: 0.09, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.5 });
  const galaxy = new THREE.Points(galGeo, galMat);
  layerMid.add(galaxy);

  // Dust với drift (P1)
  const dustCount = 1500;
  const dustGeo = new THREE.BufferGeometry();
  const dustPos = [];
  const dustVel = [];
  for (let i=0; i<dustCount; i++) {
    dustPos.push((Math.random()-0.5)*40, (Math.random()-0.5)*20, (Math.random()-0.5)*30 - 10);
    dustVel.push((Math.random()-0.5)*0.005, (Math.random()-0.5)*0.003, (Math.random()-0.5)*0.005);
  }
  dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
  dustGeo.userData.vel = dustVel;
  const dustMat = new THREE.PointsMaterial({ color: 0xc0a080, size: 0.06, transparent: true, blending: THREE.AdditiveBlending });
  const dust = new THREE.Points(dustGeo, dustMat);
  layerNear.add(dust);

  // --- RAF THAY SETINTERVAL (P0) ---
  let clock = new THREE.Clock();
  let lastConnectionDraw = 0;
  let lastGoldUpdate = 0;
  let lastTsunami = 0;

  // --- ANIMATION LOOP (tích hợp noise, parallax, drift, background reaction) ---
  function animate() {
    const delta = clock.getDelta();
    const elapsedTime = performance.now() * 0.001; // seconds
    
    // ---- NOISE ANIMATION cho particle (P0) ----
    // Nebula cloud drift
    if (nebulaCloud.geometry.attributes.position) {
      const positions = nebulaCloud.geometry.attributes.position.array;
      const speeds = nebulaCloud.geometry.userData.speed;
      for (let i=0; i<positions.length; i+=3) {
        const idx = i/3;
        positions[i] += speeds[idx*3] * delta * 30;
        positions[i+1] += speeds[idx*3+1] * delta * 30;
        positions[i+2] += speeds[idx*3+2] * delta * 30;
        // boundary wrap
        if (Math.abs(positions[i]) > 14) positions[i] *= -0.9;
        if (Math.abs(positions[i+1]) > 10) positions[i+1] *= -0.9;
        if (Math.abs(positions[i+2]) > 14) positions[i+2] *= -0.9;
      }
      nebulaCloud.geometry.attributes.position.needsUpdate = true;
    }
    
    // Dust drift
    if (dust.geometry.attributes.position) {
      const posAttr = dust.geometry.attributes.position;
      const pos = posAttr.array;
      const vel = dust.geometry.userData.vel;
      for (let i=0; i<pos.length; i+=3) {
        const idx = i/3;
        pos[i] += vel[idx*3] * delta * 30;
        pos[i+1] += vel[idx*3+1] * delta * 30;
        pos[i+2] += vel[idx*3+2] * delta * 30;
        if (Math.abs(pos[i]) > 25) pos[i] *= -0.9;
        if (Math.abs(pos[i+1]) > 15) pos[i+1] *= -0.9;
        if (Math.abs(pos[i+2]) > 20) pos[i+2] *= -0.9;
      }
      posAttr.needsUpdate = true;
    }

    // ---- PARALLAX THEO LAYER (P0) + BACKGROUND REACTION (P0) ----
    const reactivity = CONFIG.backgroundReactivity;
    const targetX = mouseX * 1.2 * (1 + reactivity*0.5);
    const targetY = mouseY * 0.8 * (1 + reactivity*0.3);
    
    camera.position.x += (targetX - camera.position.x) * 0.04;
    camera.position.y += (targetY - camera.position.y) * 0.04;
    camera.lookAt(0, 0, 0);
    
    // Layer rotation parallax
    layerFar.rotation.y += 0.001;
    layerMid.rotation.y += 0.0005;
    layerNear.rotation.x = Math.sin(elapsedTime*0.1)*0.03;
    
    stars.rotation.y += 0.0002;
    galaxy.rotation.y += 0.0008;
    
    // Reactive bloom & fog (butterfly reaction)
    if (reactivity > 0.01) {
      bloomPass.strength = CONFIG.bloom.strength + reactivity * 0.5;
      scene.fog.density = 0.0012 + reactivity * 0.001;
      CONFIG.backgroundReactivity *= 0.98;
    } else {
      bloomPass.strength = CONFIG.bloom.strength;
      scene.fog.density = 0.0012;
    }
    
    // ---- THAY THẾ SETINTERVAL BẰNG KIỂM TRA THỜI GIAN (P0) ----
    const now = performance.now();
    if (now - lastConnectionDraw > 120) {
      drawAllConnections();
      lastConnectionDraw = now;
    }
    if (now - lastGoldUpdate > 12000) {
      updateGoldPrice();
      lastGoldUpdate = now;
    }
    if (now - lastTsunami > 28000 && Math.random()<0.1) {
      colonyTsunami('ambient');
      lastTsunami = now;
    }
    
    composer.render();
    requestAnimationFrame(animate);
  }

  // --- CẬP NHẬT GIÁ VÀNG (dùng RAF timer) ---
  function updateGoldPrice() {
    const goldVal = 87650000 + Math.random() * 200000;
    const gold18k = goldVal * 0.75;
    document.getElementById('goldPrice').innerHTML = `9999: ${(goldVal/1e6).toFixed(2)}M · 18K: ${(gold18k/1e6).toFixed(2)}M`;
  }

  // --- KHỞI TẠO MEDALS & BUTTERFLY (giữ nguyên logic, cải tiến reaction) ---
  const cells = [
    { id: 'sales', title: 'SALES CORE', cat: 'business', qneu: 0.87, confidence: 0.92, scars: [], colorTheme: 'mint', icon: '💎', connections: ['showroom','prod'] },
    { id: 'showroom', title: 'SHOWROOM', cat: 'luxury', qneu: 0.76, confidence: 0.68, scars: [], colorTheme: 'champagne', icon: '✨', connections: ['sales','master'] },
    { id: 'prod', title: 'XƯỞNG SX', cat: 'production', qneu: 0.64, confidence: 0.81, scars: [{id:'SCAR01'}], colorTheme: 'ice', icon: '⚙️', connections: ['sales','warehouse'] },
    { id: 'warehouse', title: 'KHO VẬT', cat: 'logistics', qneu: 0.72, confidence: 0.55, scars: [], colorTheme: 'mint', icon: '📦', connections: ['prod','master'] },
    { id: 'master', title: 'MASTER DASH', cat: 'constitution', qneu: 0.94, confidence: 0.98, scars: [], colorTheme: 'gold', icon: '🔱', connections: ['showroom','warehouse','ai'] },
    { id: 'ai', title: 'KRIS · AI', cat: 'intelligence', qneu: 0.88, confidence: 0.89, scars: [], colorTheme: 'lavender', icon: '🧠', connections: ['master','hr'] },
    { id: 'hr', title: 'HR ORBIT', cat: 'human', qneu: 0.69, confidence: 0.73, scars: [], colorTheme: 'rose', icon: '👥', connections: ['ai'] }
  ];

  const colorMap = { mint: '#E0FFE0', champagne: '#F7E7CE', ice: '#E0FFFF', gold: '#FFD700', lavender: '#E6E6FA', rose: '#FFE4E1' };
  const medalsContainer = document.getElementById('medalsGrid');
  const medalElements = new Map();
  let connectionCtx, connCanvas;

  function initConnCanvas() {
    connCanvas = document.getElementById('connectionCanvas');
    connCanvas.width = window.innerWidth;
    connCanvas.height = window.innerHeight;
    connectionCtx = connCanvas.getContext('2d');
  }

  function getMedalPos(id) {
    const el = medalElements.get(id);
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
  }

  function drawAllConnections() {
    if (!connectionCtx) return;
    connectionCtx.clearRect(0, 0, connCanvas.width, connCanvas.height);
    cells.forEach(cell => {
      const from = getMedalPos(cell.id);
      if (!from) return;
      cell.connections.forEach(connId => {
        const to = getMedalPos(connId);
        if (to) {
          connectionCtx.beginPath();
          connectionCtx.moveTo(from.x, from.y);
          connectionCtx.lineTo(to.x, to.y);
          connectionCtx.strokeStyle = 'rgba(220,190,120,0.3)';
          connectionCtx.lineWidth = 1.2;
          connectionCtx.stroke();
        }
      });
    });
  }

  // Butterfly Canvas & Particles (giữ nguyên, chỉ thêm background reaction)
  const butterflyCanvas = document.getElementById('butterflyCanvas');
  let bCtx, particles = [];
  function initButterflyCanvas() {
    butterflyCanvas.width = window.innerWidth;
    butterflyCanvas.height = window.innerHeight;
    bCtx = butterflyCanvas.getContext('2d');
  }
  function spawnRainbowParticles(x, y, dirX, dirY, count=22) {
    const rainbow = ['#ff4d4d','#ffaa33','#ffff66','#66ff66','#3399ff','#8c5eff','#c77dff'];
    for (let i=0; i<count; i++) {
      const angle = Math.atan2(dirY, dirX) + (Math.random()-0.5)*1.2;
      const speed = 2+Math.random()*5;
      particles.push({
        x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
        life: 1.0, size: 3+Math.random()*5,
        color: rainbow[Math.floor(Math.random()*rainbow.length)]
      });
    }
  }
  function animateParticles() {
    if (!bCtx) return;
    bCtx.clearRect(0, 0, butterflyCanvas.width, butterflyCanvas.height);
    for (let i=particles.length-1; i>=0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.life -= 0.015;
      p.size *= 0.98;
      if (p.life<=0) { particles.splice(i,1); continue; }
      bCtx.globalAlpha = p.life*0.9;
      bCtx.fillStyle = p.color;
      bCtx.beginPath();
      bCtx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
      bCtx.fill();
    }
    requestAnimationFrame(animateParticles);
  }

  function localRipple(cellId) {
    const medal = medalElements.get(cellId);
    if (medal) {
      medal.style.animation = 'none';
      medal.offsetHeight;
      medal.style.animation = 'ripple-pulse 0.6s ease-out';
      const pos = getMedalPos(cellId);
      if (pos) spawnRainbowParticles(pos.x, pos.y, (Math.random()-0.5)*2, (Math.random()-0.5)*2, 20);
    }
    const cell = cells.find(c=>c.id===cellId);
    if (cell && cell.qneu>0.3) cell.qneu = Math.min(0.99, cell.qneu+0.005);
    updateMedalUI(cellId);
  }

  function colonyTsunami(severity='medium') {
    CONFIG.backgroundReactivity = 0.9; // BIND BUTTERFLY → BACKGROUND (P0)
    cells.forEach(cell => {
      const pos = getMedalPos(cell.id);
      if (pos) spawnRainbowParticles(pos.x, pos.y, 0, -1, 28);
      localRipple(cell.id);
    });
    document.getElementById('tickerMsg').innerHTML = '🌊🌪️ BUTTERFLY TSUNAMI · REVERSE RAINBOW · HỆ THỐNG RUNG ĐỘNG';
    setTimeout(()=> document.getElementById('tickerMsg').innerHTML = '⚡ HỆ THỐNG SẴN SÀNG · LAN TỎA HIỆU ỨNG CÁNH BƯỚM · 7 MÀU NGƯỢC', 2500);
  }

  async function triggerButterfly(cellId) {
    localRipple(cellId);
    CONFIG.backgroundReactivity = 0.5;
    const cell = cells.find(c=>c.id===cellId);
    if (cell && cell.connections.length) {
      for (let target of cell.connections) {
        setTimeout(() => {
          const pos = getMedalPos(target);
          if (pos) spawnRainbowParticles(pos.x, pos.y, 0.5, -0.5, 14);
          localRipple(target);
        }, 120);
      }
    }
    if (cell && cell.qneu < 0.55) colonyTsunami();
    document.getElementById('stateBadge').innerHTML = `🌀 ${cell?.title || ''}`;
    setTimeout(()=> document.getElementById('stateBadge').innerHTML = 'HEALTHY', 1500);
  }

  function updateMedalUI(id) {
    const cell = cells.find(c=>c.id===id);
    const div = medalElements.get(id);
    if (!div) return;
    const ring = div.querySelector('.qneu-ring svg circle:last-child');
    if (ring) {
      const circum = 2*Math.PI*46;
      ring.setAttribute('stroke-dasharray', `${cell.qneu*circum} ${circum}`);
    }
    const badge = div.querySelector('.confidence-badge');
    if (badge) badge.textContent = `Q:${(cell.qneu*100).toFixed(0)}% C:${(cell.confidence*100).toFixed(0)}%`;
  }

  function renderMedals() {
    medalsContainer.innerHTML = '';
    cells.forEach(cell => {
      const medal = document.createElement('div');
      medal.className = 'medal';
      medal.setAttribute('data-id', cell.id);
      medal.innerHTML = `
        <div class="medal-inner">
          <div class="liquid-glass-overlay"></div>
          <div class="medal-icon">${cell.icon}</div>
          <div class="medal-title">${cell.title}</div>
          <div class="confidence-badge">Q:${(cell.qneu*100).toFixed(0)}% C:${(cell.confidence*100).toFixed(0)}%</div>
        </div>
        <div class="qneu-ring"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,200,0.2)" stroke-width="3"/><circle cx="50" cy="50" r="46" fill="none" stroke="${colorMap[cell.colorTheme]}" stroke-width="3" stroke-dasharray="${cell.qneu*289} 289"/></svg></div>
        ${cell.scars.length ? '<div class="scar-indicator"></div>' : ''}
      `;
      medal.addEventListener('click', (e) => { e.stopPropagation(); triggerButterfly(cell.id); });
      medal.addEventListener('mousemove', (e) => {
        const rect = medal.getBoundingClientRect();
        const x = ((e.clientX - rect.left)/rect.width)*100;
        const y = ((e.clientY - rect.top)/rect.height)*100;
        const overlay = medal.querySelector('.liquid-glass-overlay');
        if (overlay) { overlay.style.setProperty('--mx', `${x}%`); overlay.style.setProperty('--my', `${y}%`); }
      });
      medalsContainer.appendChild(medal);
      medalElements.set(cell.id, medal);
    });
    setTimeout(drawAllConnections, 50);
  }

  // CSS ripple
  const styleSheet = document.createElement("style");
  styleSheet.textContent = `@keyframes ripple-pulse { 0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.7); transform: scale(1); } 70% { box-shadow: 0 0 0 22px rgba(255,215,0,0); transform: scale(1.03); } 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); transform: scale(1); } }`;
  document.head.appendChild(styleSheet);

  // INIT ALL
  initConnCanvas();
  initButterflyCanvas();
  renderMedals();
  animateParticles();
  animate();
  updateGoldPrice();
  
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    connCanvas.width = window.innerWidth; connCanvas.height = window.innerHeight;
    butterflyCanvas.width = window.innerWidth; butterflyCanvas.height = window.innerHeight;
    drawAllConnections();
  });

  console.log('✅ natt-os VISION ENGINE (P0+P1) ACTIVE — Butterfly binds to cosmos');
</script>
<script src="heyna-client.js"></script>
</body>
