<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>NATT-OS · Liquid Glass Extreme — NaUion v2.2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   NAUION LIQUID GLASS EXTREME — SPEC v2.2
   Khúc xạ động · Caustics dày · Ánh kim chảy · Fresnel ướt
═══════════════════════════════════════════════════════════════════ */
:root {
  /* Pastel deep palette */
  --glass-mint: #C8F7E8;   --glass-lavender: #E0D4FF;
  --glass-peach: #FFE0C8;   --glass-ice: #D4F1F9;
  --glass-rose: #FFD9E6;    --glass-gold: #FDEBB3;
  --glass-bg-core: rgba(20, 18, 28, 0.35);
  
  --glow-intense: 0 0 25px rgba(200, 220, 200, 0.7), 0 0 8px rgba(255, 245, 210, 0.5);
  --border-glass: 1.5px solid rgba(255, 255, 245, 0.45);
  --shadow-glass: 0 25px 45px -12px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.5);
  
  --z-truth: 1;    --z-worker: 10;   --z-experience: 50;
  --z-modal: 100;  --z-alert: 200;
  
  --header-h: 70px;
  --medal-size: clamp(110px, 16vw, 150px);
}
* { margin:0; padding:0; box-sizing: border-box; }
body {
  background: radial-gradient(circle at 20% 30%, #101018, #050508);
  color: #F0F0F0;
  font-family: 'Inter', sans-serif;
  height: 100vh;
  overflow: hidden;
  backdrop-filter: blur(0px);
}

/* ══ Truth Layer — tinh tế, không lấn át glass ══ */
.truth-grid {
  position: fixed; inset:0; z-index: var(--z-truth); pointer-events: none;
  background-image: 
    linear-gradient(rgba(200, 210, 200, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200, 210, 200, 0.05) 1px, transparent 1px);
  background-size: 55px 55px;
}
.truth-aura {
  position: fixed; inset:0; z-index: var(--z-truth); pointer-events: none;
  background: radial-gradient(ellipse 80% 70% at 30% 40%, rgba(180, 220, 200, 0.12) 0%, transparent 70%);
}
.truth-scan {
  position: fixed; left:0; right:0; height: 3px; pointer-events: none; z-index: var(--z-truth);
  background: linear-gradient(to right, transparent, rgba(200, 230, 210, 0.6), transparent);
  animation: scanGlass 12s linear infinite;
}
@keyframes scanGlass { 0%{ top:-2%; } 100%{ top:102%; } }

/* ══ Layout chính ══ */
.app {
  position: fixed; inset:0; display: flex; flex-direction: column;
  z-index: var(--z-experience);
}

/* ══ Header — Liquid Glass dày ══ */
.glass-header {
  height: var(--header-h); background: var(--glass-bg-core);
  backdrop-filter: blur(20px) saturate(220%);
  border-bottom: var(--border-glass);
  display: flex; align-items: center; padding: 0 32px; gap: 32px;
  box-shadow: inset 0 1px 0 rgba(255,255,245,0.2), 0 4px 20px rgba(0,0,0,0.1);
}
.logo {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 15px; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #E0F0E0, #F0E0C0);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  text-shadow: 0 0 12px rgba(200,230,200,0.3);
}
.nav-links {
  display: flex; gap: 8px; background: rgba(20, 20, 30, 0.4);
  padding: 5px 12px; border-radius: 60px; backdrop-filter: blur(12px);
  border: 0.5px solid rgba(255,255,245,0.2);
}
.nav-item {
  padding: 8px 24px; font-size: 13px; font-weight: 600;
  border-radius: 40px; cursor: pointer; transition: all 0.25s;
  color: #CCCCDD; letter-spacing: -0.2px;
}
.nav-item.active {
  background: rgba(255, 255, 245, 0.2); color: #FFFFFF;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 4px 12px rgba(0,0,0,0.1);
  border: 0.5px solid rgba(255,255,245,0.4);
}
.nav-item:hover:not(.active) { background: rgba(255,255,245,0.08); color: #F0F0FF; }
.top-right {
  margin-left: auto; display: flex; align-items: center; gap: 24px;
}
.stats-pill {
  background: rgba(20, 20, 30, 0.5); backdrop-filter: blur(12px);
  border-radius: 40px; padding: 6px 18px; font-size: 12px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  color: #DDDDF0; font-family: monospace;
  border: 0.5px solid rgba(255,255,245,0.2);
}
.badge-glass {
  background: rgba(200, 220, 210, 0.2); backdrop-filter: blur(8px);
  color: #E0FFE0; padding: 5px 16px; border-radius: 40px;
  font-size: 11px; font-weight: 700; border: 0.5px solid rgba(255,255,245,0.4);
  text-shadow: 0 0 5px rgba(0,0,0,0.2);
}

/* ══ Content — Worker layer ══ */
.content {
  flex: 1; overflow-y: auto; padding: 32px 36px;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: rgba(30,30,40,0.5); border-radius: 10px; }
.content::-webkit-scrollbar-thumb { background: rgba(200,220,200,0.4); border-radius: 10px; }

/* ══ Glass Card — extreme liquid glass ══ */
.glass-card {
  background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(255, 255, 245, 0.18) 0%, rgba(255, 255, 245, 0.03) 70%, transparent 100%);
  backdrop-filter: blur(24px) saturate(220%);
  border: var(--border-glass);
  border-radius: 40px;
  padding: 28px;
  box-shadow: var(--shadow-glass), inset 0 0 40px rgba(255,255,245,0.05);
  transition: all 0.3s ease;
}
.glass-card:hover {
  border-color: rgba(255, 255, 245, 0.7);
  background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(255, 255, 245, 0.25) 0%, rgba(255, 255, 245, 0.05) 70%, transparent 100%);
  box-shadow: 0 30px 50px -20px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.4);
}

/* ══ Medal — 9 lớp Liquid Glass cực đỉnh ══ */
.medal-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 32px; margin-top: 28px;
}
.medal {
  position: relative; width: var(--medal-size); height: var(--medal-size);
  margin: 0 auto; cursor: pointer; transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
}
.medal:hover { transform: translateY(-8px) scale(1.02); }
/* orbital rings (3 lớp) */
.orbit-ring {
  position: absolute; inset: -12%; border-radius: 50%; border-style: solid;
  pointer-events: none; opacity: 0.6;
}
.ring-slow { border: 1px dashed rgba(200, 230, 210, 0.5); animation: spinSlow 26s linear infinite; }
.ring-med { border: 1px dotted rgba(230, 210, 170, 0.4); animation: spinMedRev 18s linear infinite; transform: scale(1.12); }
.ring-fast { border: 0.5px solid rgba(180, 210, 230, 0.4); animation: spinFast 10s linear infinite; transform: scale(1.24); }
@keyframes spinSlow { to { transform: rotate(360deg); } }
@keyframes spinMedRev { to { transform: rotate(-360deg); } }
@keyframes spinFast { to { transform: rotate(360deg); } }
/* PBR shell + specular sweep mạnh */
.medal-shell {
  position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(from var(--medal-angle,0deg), #1A1A24, #2A2A34, var(--cat-color-light), #2A2A34);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
}
.medal-sweep {
  position: absolute; inset: 0; border-radius: 50%;
  background: linear-gradient(115deg, transparent 20%, rgba(255,255,245,0.5) 45%, rgba(255,255,245,0.1) 70%, transparent);
  transform: translateX(-110%); transition: transform 0.9s cubic-bezier(0.2,0.8,0.4,1);
}
.medal:hover .medal-sweep { transform: translateX(110%); }
/* Fresnel rim ướt */
.fresnel-rim {
  position: absolute; inset: -2%; border-radius: 50%;
  border: 1px solid rgba(255,255,245,0.5);
  filter: blur(1px);
  pointer-events: none;
  opacity: 0.7;
}
/* Holo prismatic (hover) */
.holo-layer {
  position: absolute; inset: 0; border-radius: 50%; opacity: 0;
  background: conic-gradient(from var(--holo-angle,0deg), #FFB6C1, #D4F1F9, #E0D4FF, #FFD9E6);
  mix-blend-mode: overlay;
  transition: opacity 0.2s;
  pointer-events: none;
}
.medal:hover .holo-layer { opacity: 0.5; animation: holoSpin 3s linear infinite; }
@keyframes holoSpin { to { --holo-angle: 360deg; } }
/* Liquid Glass Overlay (lớp 5) */
.liquid-overlay {
  position: absolute; inset: 0; border-radius: 50%;
  backdrop-filter: blur(18px) saturate(200%);
  background: radial-gradient(circle at 40% 40%, rgba(255,255,245,0.2), rgba(255,255,245,0.02) 80%);
  pointer-events: none;
}
/* Glass core + caustics */
.glass-core {
  position: absolute; inset: 12%; border-radius: 50%;
  backdrop-filter: blur(14px);
  background: radial-gradient(circle at 30% 30%, rgba(255,255,245,0.25), rgba(255,255,245,0.02));
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.caustic-dynamic {
  position: absolute; inset: 0; border-radius: 50%;
  filter: url(#caustic-glass);
  opacity: 0.4;
  mix-blend-mode: overlay;
}
.medal-icon { font-size: 34px; filter: drop-shadow(0 0 12px rgba(255,245,200,0.6)); z-index: 2; }
/* QNEU ring dày */
.qneu-ring { position: absolute; inset: -8%; transform: rotate(-90deg); }
.qneu-ring circle { fill: none; stroke-width: 3; stroke: var(--cat-color); filter: drop-shadow(0 0 6px var(--cat-color)); }
/* Scar ring */
.scar-glass { position: absolute; inset: -8%; border-radius: 50%; border: 2px solid #FFA0B0; box-shadow: 0 0 15px #FFB0C0; animation: scarPulse 1.5s infinite; }
@keyframes scarPulse { 0%{ opacity:0.5; transform:scale(1); } 50%{ opacity:1; transform:scale(1.03); } 100%{ opacity:0.5; transform:scale(1); } }
.medal-label { text-align: center; margin-top: 16px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; color: #DDDDEE; text-shadow: 0 0 6px rgba(0,0,0,0.3); }

/* KPI glass cards */
.kpi-panel {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr));
  gap: 20px; margin-bottom: 36px;
}
.kpi-glass {
  background: rgba(20, 20, 30, 0.45); backdrop-filter: blur(16px);
  border-radius: 32px; padding: 20px 12px; text-align: center;
  border: 0.5px solid rgba(255,255,245,0.2);
  box-shadow: inset 0 1px 0 rgba(255,255,245,0.1), 0 8px 20px rgba(0,0,0,0.1);
}
.kpi-value { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #E8FFE8, #F0E8C0); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -1px; }
.kpi-label { font-size: 11px; font-weight: 600; color: #BBBBCC; margin-top: 8px; text-transform: uppercase; }
.trend-up { color: #A0F0C0; } .trend-down { color: #F0B0A0; }

/* Tables glass */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { text-align: left; padding: 14px 10px; color: #AAAACC; font-weight: 600; border-bottom: 1px solid rgba(255,255,245,0.15); }
.data-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,245,0.08); color: #E0E0F0; }

/* Ticker glass */
.ticker {
  height: 38px; background: rgba(10, 10, 18, 0.7); backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,245,0.25);
  display: flex; align-items: center; overflow: hidden; flex-shrink: 0;
}
.ticker-label {
  background: rgba(200, 230, 210, 0.2); color: #E0FFE0; padding: 0 24px; height: 100%;
  display: flex; align-items: center; font-weight: 700; font-size: 11px;
  border-right: 1px solid rgba(255,255,245,0.3);
}
.ticker-scroll { white-space: nowrap; animation: marqueeGlass 55s linear infinite; display: flex; gap: 32px; padding-left: 20px; }
@keyframes marqueeGlass { 0%{ transform: translateX(0); } 100%{ transform: translateX(-50%); } }
.ticker-item { font-size: 11px; font-weight: 500; color: #CCCCE0; letter-spacing: 0.3px; }

/* Butterfly ripple cực mạnh */
.butterfly-ripple {
  position: fixed; inset:0; pointer-events: none; z-index: 300;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(200, 220, 200, 0.5) 0%, transparent 70%);
  animation: rippleGlass 0.7s ease-out forwards;
}
@keyframes rippleGlass { 0%{ opacity:0.9; transform:scale(0.6); } 100%{ opacity:0; transform:scale(3.5); } }

/* Notifications */
.notify-stack {
  position: fixed; top: 90px; right: 24px; z-index: 400;
  display: flex; flex-direction: column; gap: 12px; pointer-events: none;
}
.notify {
  background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(20px);
  border-left: 4px solid #A0D0B0; border-radius: 24px; padding: 14px 20px; width: 300px;
  font-size: 12px; box-shadow: var(--shadow-glass); pointer-events: auto;
  animation: slideGlass 0.25s ease; color: #EEEEFF;
}
@keyframes slideGlass { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
.notify-title { font-weight: 700; margin-bottom: 4px; color: #D0FFD0; }

/* Mouse glow */
.mouse-glow {
  position: fixed; width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(200, 220, 200, 0.12), transparent);
  pointer-events: none; z-index: 9999; mix-blend-mode: screen;
  transform: translate(-50%, -50%);
}
</style>
<svg style="position:absolute;width:0;height:0"><filter id="caustic-glass"><feTurbulence type="turbulence" baseFrequency="0.022 0.026" numOctaves="3"><animate attributeName="baseFrequency" values="0.022 0.026;0.028 0.022;0.022 0.026" dur="7s" repeatCount="indefinite"/></feTurbulence><feDisplacementMap scale="14" in="SourceGraphic"/></filter></svg>
</head>
<body>

<div class="truth-grid"></div><div class="truth-aura"></div><div class="truth-scan"></div>

<div class="app">
  <div class="glass-header">
    <div class="logo">NATT·OS <span style="font-size:10px;">liquid glass colony</span></div>
    <div class="nav-links" id="nav-links"></div>
    <div class="top-right">
      <div class="stats-pill"><span>✨</span> <span id="cell-count">—</span></div>
      <div class="stats-pill"><span>🧬</span> <span id="z-value">Z 1.00</span></div>
      <div id="state-badge" class="badge-glass">HEALTHY</div>
    </div>
  </div>
  <div class="content" id="content-view"></div>
  <div class="ticker">
    <div class="ticker-label">LIVE COLONY · LIQUID GLASS</div>
    <div class="ticker-scroll" id="ticker-scroll"></div>
  </div>
</div>
<div class="notify-stack" id="notify-stack"></div>
<div class="mouse-glow" id="mouse-glow"></div>

<script>
// ======================== NAUION LIQUID GLASS EXTREME — SSE + BUTTERFLY ========================
const SERVER = 'http://localhost:3001';
const UI = {
  Z: 1.0, systemState: 'HEALTHY', risk: 12, commits: '—', hash: '—',
  metrics: {}, auditLog: [], production: { stages: [], metrics: {} }, gold: {}
};
let activeView = 'dashboard';

const MODULES = [
  { id:'dashboard', title:'Tổng quan', icon:'🏛️', group:'core' },
  { id:'production_wallboard', title:'Sản xuất', icon:'📺', group:'prod' },
  { id:'audit_trail', title:'Audit', icon:'📜', group:'audit' },
  { id:'monitoring', title:'Giám sát', icon:'📡', group:'sys' },
  { id:'showroom', title:'Showroom', icon:'💎', group:'core' }
];

function renderNav() {
  const nav = document.getElementById('nav-links');
  nav.innerHTML = MODULES.map(m => `<div class="nav-item ${activeView === m.id ? 'active' : ''}" data-view="${m.id}">${m.icon} ${m.title}</div>`).join('');
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => switchView(el.dataset.view));
  });
}
function switchView(viewId) { activeView = viewId; renderNav(); renderContent(); }

function renderContent() {
  const container = document.getElementById('content-view');
  if (activeView === 'dashboard') renderDashboard(container);
  else if (activeView === 'production_wallboard') renderProduction(container);
  else if (activeView === 'audit_trail') renderAudit(container);
  else if (activeView === 'monitoring') renderMonitoring(container);
  else renderPlaceholder(container);
}

function renderDashboard(container) {
  const medalCells = [
    { id:'gatekeeper', name:'GATEKEEPER', cat:'KERNEL', qneu:0.98, color:'#B0C4A2', light:'#D0F0D0', scar:false, icon:'👑' },
    { id:'quantum', name:'QUANTUM CORE', cat:'INFRA', qneu:0.91, color:'#A5D0E0', light:'#C8E8F8', scar:false, icon:'⚛️' },
    { id:'sira', name:'SIRASIGN', cat:'SECURITY', qneu:0.89, color:'#F5CDB0', light:'#FFE0D0', scar:true, icon:'🔒' },
    { id:'iseu', name:'ISEU ENGINE', cat:'EVOLUTION', qneu:0.77, color:'#C8E0C0', light:'#E0F8E0', scar:false, icon:'🧬' },
    { id:'butterfly', name:'BUTTERFLY', cat:'PROPAGATION', qneu:0.82, color:'#DAC8F0', light:'#F0E8FF', scar:false, icon:'🦋' }
  ];
  const kpis = [
    { label:'IMPEDANCE Z', value: UI.Z.toFixed(2), trend: UI.Z < 1.8 ? 'up' : 'down' },
    { label:'CELLS ACTIVE', value: Object.keys(UI.metrics).length || 38, trend:'up' },
    { label:'COLONY RISK', value: UI.risk + '/100', trend: UI.risk < 25 ? 'down' : 'up' },
    { label:'SYSTEM', value: UI.systemState, trend:'up' }
  ];
  container.innerHTML = `
    <div class="glass-card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;"><h2 style="font-size:22px; font-weight:600;">🏛️ Tổng quan Colony</h2><span class="badge-glass">Liquid Glass Extreme</span></div>
      <div class="kpi-panel">${kpis.map(k => `<div class="kpi-glass"><div class="kpi-value">${k.value}</div><div class="kpi-label">${k.label}</div><div class="${k.trend === 'up' ? 'trend-up' : 'trend-down'}" style="font-size:10px;">${k.trend === 'up' ? '↑ ổn định' : '↓ điều chỉnh'}</div></div>`).join('')}</div>
      <div style="font-size:14px; font-weight:600; margin: 16px 0 12px;">⚡ NATT-CELL Medal (tiến hóa)</div>
      <div class="medal-grid">
        ${medalCells.map(cell => `
          <div class="medal" data-cell="${cell.id}" style="--cat-color:${cell.color}; --cat-color-light:${cell.light}; --medal-angle:0deg;" onmouseenter="updateMedalAngle(this, event)">
            <div class="orbit-ring ring-slow"></div><div class="orbit-ring ring-med"></div><div class="orbit-ring ring-fast"></div>
            <div class="medal-shell"></div><div class="medal-sweep"></div>
            <div class="fresnel-rim"></div>
            <div class="holo-layer"></div>
            <div class="liquid-overlay"></div>
            <div class="glass-core"><div class="caustic-dynamic"></div><div class="medal-icon">${cell.icon}</div></div>
            <svg class="qneu-ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" stroke-dasharray="${cell.qneu * 276} 276" stroke="${cell.color}"/></svg>
            ${cell.scar ? '<div class="scar-glass"></div>' : ''}
            <div class="medal-label">${cell.name}<br><span style="font-size:8px;">QNEU ${cell.qneu}</span></div>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:40px;"><div style="font-weight:600; margin-bottom:16px;">📊 Dòng chảy dữ liệu (HeyNa)</div>
      <table class="data-table"><thead><tr><th>Cell</th><th>Metric</th><th>Value</th></tr></thead><tbody>
        ${Object.entries(UI.metrics).slice(0,6).map(([k,v]) => `<tr><td style="font-family:monospace;">${k}</td><td>${v.metric || 'pulse'}</td><td>${v.value ?? '1.0'}</td>`).join('') || '<tr><td colspan="3">⏳ chờ tín hiệu từ server...</td></tr>'}
      </tbody></table></div>
    </div>
  `;
}

function renderProduction(container) {
  const p = UI.production || {};
  container.innerHTML = `<div class="glass-card"><div style="display:flex; gap:14px; align-items:center; margin-bottom:24px;"><span style="font-size:32px;">📺</span><div><h3 style="font-size:20px;">Wallboard Xưởng</h3><div style="font-size:12px; opacity:0.7;">Tâm Luxury · OEE realtime</div></div></div>
  <div class="kpi-panel"><div class="kpi-glass"><div class="kpi-value">${p.metrics?.dailyOutput || '—'}</div><div class="kpi-label">Sản lượng ngày</div></div>
  <div class="kpi-glass"><div class="kpi-value">${p.metrics?.oee || '—'}%</div><div class="kpi-label">OEE</div></div>
  <div class="kpi-glass"><div class="kpi-value">${p.metrics?.avgPuritySX || '—'}%</div><div class="kpi-label">Phổ thực tế</div></div></div>
  <div class="medal-grid" style="grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); gap:16px;">${(p.stages || []).map(s => `<div class="kpi-glass" style="padding:16px;"><div class="kpi-value" style="font-size:22px;">${s.count}</div><div class="kpi-label">${s.stage?.replace('_',' ')}</div></div>`).join('') || '<div style="color:#AAA;">Đang đồng bộ sản xuất...</div>'}</div></div>`;
}

function renderAudit(container) {
  container.innerHTML = `<div class="glass-card"><h3 style="margin-bottom:20px;">📜 Sổ cái truy vết</h3>
  <table class="data-table"><thead><tr><th>Loại</th><th>Tác nhân</th><th>Thời gian</th></tr></thead><tbody>
    ${(UI.auditLog || []).slice(0,20).map(a => `<tr><td>${a.type || 'event'}</td><td>${a.actor || 'system'}</td><td>${new Date(a.ts).toLocaleTimeString()}</td>`).join('') || '<tr><td colspan="3">Đang chờ audit stream...</td></tr>'}
  </tbody></table></div>`;
}

function renderMonitoring(container) {
  container.innerHTML = `<div class="glass-card"><div class="kpi-panel"><div class="kpi-glass"><div class="kpi-value">${UI.Z.toFixed(4)}</div><div class="kpi-label">Impedance Z (ISEU)</div></div>
  <div class="kpi-glass"><div class="kpi-value">${UI.systemState}</div><div class="kpi-label">Trạng thái</div></div></div>
  <div><div style="font-weight:600; margin-bottom:12px;">🔁 Mạch HeyNa (last signals)</div>
  ${Object.entries(UI.metrics).slice(0,12).map(([k,v]) => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,245,0.08);"><span style="font-family:monospace;">${k}</span><span>${v.value ?? 1}</span></div>`).join('')}</div></div>`;
}
function renderPlaceholder(container) { container.innerHTML = `<div class="glass-card" style="text-align:center; opacity:0.7;">⬡ Module đang phát triển</div>`; }

// ======================== EVENT BUS (SSE) ========================
let sse = null;
function startMachHeyna() {
  if (sse) sse.close();
  sse = new EventSource(`${SERVER}/mach/heyna`);
  sse.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.event === 'nauion.state') {
        if (data.payload?.impedanceZ !== undefined) UI.Z = data.payload.impedanceZ;
        if (data.payload?.state) UI.systemState = data.payload.state === 'nauion' ? 'HEALTHY' : data.payload.state.toUpperCase();
        updateTopBar();
        if (activeView === 'dashboard' || activeView === 'monitoring') renderContent();
      }
      if (data.event === 'cell.metric') {
        const id = data.payload?.cell || 'unknown';
        UI.metrics[id] = data.payload;
        if (activeView === 'dashboard') renderContent();
        triggerButterflyRipple(id, 'local');
      }
      if (data.event === 'audit.record') {
        if (!UI.auditLog) UI.auditLog = [];
        UI.auditLog.unshift({ ...data.payload, ts: data.ts || Date.now() });
        UI.auditLog = UI.auditLog.slice(0, 60);
        if (activeView === 'audit_trail') renderContent();
        addNotif('📋 Audit', `${data.payload.type || 'event'} from ${data.payload.actor || 'cell'}`, 'butterfly');
        triggerButterflyRipple('audit', 'neighbor');
      }
      if (data.event === 'gia-vang.updated') { UI.gold = data.payload; updateTicker(); }
      if (data.event === 'production.update') { UI.production = data.payload; if (activeView === 'production_wallboard') renderContent(); }
    } catch(e) {}
  };
  sse.onerror = () => { setTimeout(startMachHeyna, 4000); };
}

function triggerButterflyRipple(source, level = 'local') {
  const rippleDiv = document.createElement('div');
  rippleDiv.className = 'butterfly-ripple';
  document.body.appendChild(rippleDiv);
  setTimeout(() => rippleDiv.remove(), 700);
  addNotif(`🦋 ${level} ripple`, `nguồn: ${source}`, 'butterfly');
  if (level === 'local') UI.Z = Math.min(3.0, UI.Z + 0.006);
  if (level === 'neighbor') UI.Z = Math.min(3.0, UI.Z + 0.015);
  updateTopBar();
  if (activeView === 'monitoring' || activeView === 'dashboard') renderContent();
}

function addNotif(title, body, type='info') {
  const stack = document.getElementById('notify-stack');
  const n = document.createElement('div');
  n.className = 'notify';
  n.innerHTML = `<div class="notify-title">${title}</div><div>${body}</div>`;
  stack.appendChild(n);
  setTimeout(() => n.remove(), 4200);
}

async function loadExternalData() {
  try {
    const [suc, gold, prod] = await Promise.all([
      fetch(`${SERVER}/kenh/suc`).then(r=>r.json()).catch(()=>({commits:'—',hash:'—'})),
      fetch(`${SERVER}/kenh/gia-vang`).then(r=>r.json()).catch(()=>({})),
      fetch(`${SERVER}/kenh/production`).then(r=>r.json()).catch(()=>({}))
    ]);
    UI.commits = suc.commits || '—'; UI.hash = suc.hash || '—';
    UI.gold = gold; UI.production = prod;
    updateTopBar(); updateTicker();
    if (activeView === 'production_wallboard') renderContent();
  } catch(e) {}
}

function updateTopBar() {
  document.getElementById('cell-count').innerHTML = `${Object.keys(UI.metrics).length || 38} cells`;
  document.getElementById('z-value').innerHTML = `Z ${UI.Z.toFixed(2)}`;
  const stateEl = document.getElementById('state-badge');
  if (stateEl) stateEl.textContent = UI.systemState;
}
function updateTicker() {
  const g = UI.gold || {};
  const fmt = v => v ? Number(v).toLocaleString('vi-VN') + 'đ' : '—';
  const items = [`SJC: ${fmt(g.sjc_buy)} / ${fmt(g.sjc_sell)}`, `9999: ${fmt(g.gold9999)}`, `18K: ${fmt(g.gold18k)}`, `Z=${UI.Z.toFixed(2)}`];
  const tickerDiv = document.getElementById('ticker-scroll');
  if(tickerDiv) tickerDiv.innerHTML = [...items,...items].map(t => `<span class="ticker-item">${t}</span>`).join('');
}

// Mouse tracking for liquid glass
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth) * 100;
  const y = (e.clientY / window.innerHeight) * 100;
  document.documentElement.style.setProperty('--mouse-x', x + '%');
  document.documentElement.style.setProperty('--mouse-y', y + '%');
  const aura = document.getElementById('mouse-glow');
  if(aura) { aura.style.left = e.clientX + 'px'; aura.style.top = e.clientY + 'px'; }
});
window.updateMedalAngle = (el, event) => {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  let angle = Math.atan2(event.clientY - cy, event.clientX - cx) * 180 / Math.PI;
  el.style.setProperty('--medal-angle', angle + 'deg');
};

// Boot
function boot() {
  renderNav();
  renderContent();
  startMachHeyna();
  loadExternalData();
  setInterval(() => { if(activeView === 'dashboard' || activeView === 'monitoring') renderContent(); }, 2000);
}
boot();
</script>
