  <style>
    :root{

      --ink-2:#050713;
      --ink-3:#08101c;

      --line-hot:rgba(255,190,80,.50);

      --gold-2:#EDB88A;

      radial-gradient(ellipse 46% 70% at 92% 40%, rgba(184,232,255,.16), transparent 60%),
      linear-gradient(90deg, rgba(2,2,8,.70), transparent 38%, rgba(2,2,8,.34));mix-blend-mode:screen}
    .field-amber-drift{position:absolute;left:7%;right:-8%;top:31%;height:52%;opacity:.78;filter:blur(54px) saturate(1.34);background:

      radial-gradient(ellipse 36% 48% at 58% 58%, rgba(237,184,138,.38), transparent 64%),
      linear-gradient(92deg, transparent 0%, rgba(200,146,42,.14) 23%, rgba(255,190,80,.42) 58%, rgba(245,226,192,.16) 78%, transparent 100%);transform:skewY(-4deg)}
    .amber-horizon{position:absolute;left:7%;right:1%;top:41%;height:40%;filter:blur(38px) saturate(1.42);opacity:.96;background:
      radial-gradient(ellipse at 74% 47%, rgba(255,190,80,.64), transparent 38%),

    .refract-field{position:absolute;inset:-4%;opacity:.54;filter:blur(5px);background:
      linear-gradient(108deg, transparent 0 31%, rgba(245,226,192,.085) 32%, transparent 33% 55%, rgba(184,232,255,.055) 56%, transparent 57% 72%, rgba(255,190,80,.07) 73%, transparent 74%),
      linear-gradient(72deg, transparent 0 22%, rgba(255,255,255,.07) 23%, transparent 24% 86%, rgba(245,226,192,.045) 87%, transparent 88%);mix-blend-mode:screen}
    .micro-glints{position:absolute;inset:0;opacity:.42;background:

    .core-bloom:before{content:"";position:absolute;inset:13%;border-radius:50%;background:

    .screen{position:absolute;inset:0;z-index:2;padding:26px 22px 92px calc(var(--rail) + 34px)}

    .rail-logo{height:60px;margin:16px 18px 18px;border:1px solid rgba(255,255,255,.12);border-radius:18px;display:grid;place-items:center;color:#f8d98f;font-weight:900;letter-spacing:.2em;background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.02))}

    .scene-main{height:100%;position:relative;z-index:30;display:flex;flex-direction:column;gap:22px}
    .header-two-lane{min-height:104px;border:1px solid rgba(245,226,192,.22);border-radius:28px;background:linear-gradient(180deg,rgba(18,22,42,.82),rgba(4,7,18,.58));backdrop-filter:blur(32px) saturate(1.32);box-shadow:inset 0 1px 0 rgba(245,226,192,.16),0 34px 90px rgba(0,0,0,.38),0 0 34px rgba(255,190,80,.08);overflow:hidden}.h-lane{height:52px;display:flex;align-items:center;padding:0 28px;gap:14px}.h-lane:first-child{border-bottom:1px solid rgba(255,255,255,.06)}.identity{flex:1;color:var(--faint);letter-spacing:.32em;text-transform:uppercase;font-size:12px;font-weight:800}.screen-title{font-weight:900;letter-spacing:.16em;text-transform:uppercase}.chip{height:34px;padding:0 16px;border-radius:999px;border:1px solid rgba(245,226,192,.25);background:linear-gradient(180deg,rgba(245,226,192,.12),rgba(255,190,80,.035));box-shadow:inset 0 1px 0 rgba(245,226,192,.18),0 0 18px rgba(255,190,80,.08);display:flex;align-items:center;gap:8px;font-weight:900;font-size:12px;letter-spacing:.18em}.dot{width:9px;height:9px;border-radius:999px;background:var(--ok);box-shadow:0 0 14px currentColor}.chip.amber .dot{background:var(--amber)}.chip.violet .dot{background:var(--violet)}.node-pill{margin-left:auto;height:38px;padding:0 18px;border-radius:999px;border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;background:rgba(255,255,255,.05);font-weight:900;letter-spacing:.22em;font-size:12px}.badge{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#ffd56f,#c78a17);color:#211401;display:grid;place-items:center;font-weight:950;box-shadow:0 12px 26px rgba(242,189,69,.26)}.lane-link{padding:10px 14px;border-radius:14px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.14em;font-weight:800}.lane-link.active,.lane-link:hover{color:var(--text);background:rgba(242,189,69,.12)}

    .scene-workplace{position:relative;flex:1;min-height:0;border:1px solid rgba(245,226,192,.18);border-radius:34px;background:linear-gradient(135deg,rgba(0,0,0,.78),rgba(3,7,18,.66) 44%,rgba(9,14,30,.48));backdrop-filter:blur(28px) saturate(1.22);overflow:hidden;box-shadow:inset 0 1px 0 rgba(245,226,192,.12),0 48px 125px rgba(0,0,0,.58),0 0 58px rgba(200,146,42,.08)}
    .scene-workplace:before{content:"";position:absolute;inset:-1px;background:radial-gradient(720px 300px at 68% 43%,rgba(255,190,80,.17),transparent 61%),radial-gradient(540px 250px at 89% 28%,rgba(184,232,255,.08),transparent 62%),linear-gradient(90deg,transparent 0%,rgba(245,226,192,.075) 69%,transparent 70%);pointer-events:none}
    .scene-workplace:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,226,192,.055),transparent 18%,transparent 82%,rgba(255,190,80,.04));pointer-events:none;mix-blend-mode:screen}.work-grid{position:relative;z-index:2;display:grid;grid-template-columns:minmax(420px,1.08fr) minmax(390px,.92fr);height:100%;gap:30px;padding:44px 38px}.hero-block{display:flex;flex-direction:column;justify-content:center;min-width:0}.eyebrow{color:#ffd981;text-transform:uppercase;letter-spacing:.42em;font-weight:900;font-size:12px}.hero-title{font-size:clamp(54px,6.4vw,118px);line-height:.88;margin:22px 0 24px;font-weight:950;letter-spacing:.018em}.hero-copy{max-width:760px;color:rgba(246,243,234,.72);font-size:18px;line-height:1.72;font-weight:600}.actions{display:flex;gap:14px;margin-top:78px}.action-btn{height:54px;padding:0 24px;border-radius:18px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.06);font-weight:950;letter-spacing:.16em;font-size:12px;text-transform:uppercase;box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}.action-btn.primary{background:linear-gradient(135deg,#ffd66d,#d5961d);color:#211401;border-color:rgba(255,214,109,.5)}
    .insight-column{display:flex;flex-direction:column;justify-content:center;gap:18px;min-width:0}.glass-card{border:1px solid rgba(245,226,192,.22);border-radius:28px;background:linear-gradient(180deg,rgba(20,24,42,.84),rgba(7,10,22,.64));box-shadow:inset 0 1px 0 rgba(245,226,192,.14),0 28px 72px rgba(0,0,0,.42),0 0 34px rgba(255,190,80,.08);backdrop-filter:blur(30px) saturate(1.28);position:relative;overflow:hidden}.glass-card:before{content:"";position:absolute;inset:0;background:radial-gradient(460px 210px at 30% 0%,rgba(245,226,192,.12),transparent 62%),linear-gradient(90deg,rgba(255,190,80,.035),transparent 42%);pointer-events:none}.card-inner{position:relative;z-index:1;padding:24px}.card-head{display:flex;gap:14px;align-items:flex-start;justify-content:space-between;margin-bottom:16px}.card-title{font-size:24px;font-weight:950;letter-spacing:.14em;text-transform:uppercase}.card-sub{color:var(--muted);font-weight:700}.card-pill{padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.055);color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-weight:900;font-size:11px}.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.metric{min-height:126px;border:1px solid rgba(255,255,255,.085);border-radius:18px;background:rgba(255,255,255,.038);padding:18px}.metric-label{font-size:11px;color:var(--faint);letter-spacing:.24em;text-transform:uppercase;font-weight:900}.metric-value{font-size:36px;font-weight:950;margin:12px 0 4px}.metric-note{color:var(--muted);font-size:14px;font-weight:700}.flow-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.step{min-height:116px;border-radius:18px;border:1px solid rgba(255,255,255,.085);background:rgba(255,255,255,.036);padding:16px}.step b{display:block;color:#f7d281;font-size:20px;letter-spacing:.14em;text-transform:uppercase}.step span{display:block;color:var(--muted);font-size:13px;line-height:1.45;margin-top:10px}

    .drawer{position:absolute;right:22px;top:146px;width:300px;z-index:82;border:1px solid rgba(255,255,255,.12);border-radius:22px;background:rgba(9,12,24,.72);backdrop-filter:blur(22px);box-shadow:0 26px 70px rgba(0,0,0,.36);overflow:hidden;display:none}.drawer.open{display:block}.drawer h3{margin:0;padding:16px 16px 10px;font-size:13px;text-transform:uppercase;letter-spacing:.18em}.queue-row{display:flex;justify-content:space-between;padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);font-size:13px;color:var(--muted)}.queue-row b{color:var(--text)}
    .screen.collections .hero-title,.screen.vip .hero-title,.screen.custom .hero-title,.screen.appointments .hero-title,.screen.lookbook .hero-title{font-size:clamp(46px,5.2vw,88px)}

    @keyframes orbitSpin{to{transform:rotate(360deg)}}
    @keyframes fogBreath{0%{transform:scale(1) translate3d(-1%,0,0);opacity:.52}100%{transform:scale(1.06) translate3d(1.5%,-1%,0);opacity:.72}}

    /* ────────────────────────────────────────────────────────────────
       V2.6 STEP PALETTE OVERRIDE
       Source of truth pulled directly from:
       - nattos-ui-theme.css: --n-bg, --n-g1, --n-g2, --n-g3, --n-amber
       - nattos-tokens.css: glass blur/bg/text/border tokens
       - nattos-galaxy.css: nebula/scan/grid step positions
       Note: không pha màu tự do. Mọi lớp lấy bước gốc rồi tăng alpha/viền.
    ───────────────────────────────────────────────────────────────── */
    :root{

      --n-g2:#EDB88A;

      --v26-gold-24:rgba(245,226,192,.24);
      --v26-gold-32:rgba(245,226,192,.32);
      --v26-gold-46:rgba(245,226,192,.46);
      --v26-amber-06:rgba(200,146,42,.06);
      --v26-amber-09:rgba(200,146,42,.09);
      --v26-amber-13:rgba(200,120,30,.13);
      --v26-amber-22:rgba(200,146,42,.22);
      --v26-amber-36:rgba(255,190,80,.36);
      --v26-amber-54:rgba(255,190,80,.54);
      --v26-amber-72:rgba(255,190,80,.72);
      --v26-blue-06:rgba(50,140,200,.06);
      --v26-blue-18:rgba(184,232,255,.18);
      --v26-violet-07:rgba(80,50,160,.07);
      --v26-deep-violet:rgba(20,10,50,.55);
      --v26-deep-blue:rgba(5,20,45,.45);
      --v26-deep-indigo:rgba(10,5,30,.40);
      --v26-text:rgba(238,225,200,.92);
      --v26-text-2:rgba(238,225,200,.62);
      --v26-text-3:rgba(238,225,200,.34);

      --glass:rgba(2,2,8,.78);
      --glass-strong:rgba(2,2,8,.88);
      --glass-clear:rgba(6,6,18,.32);
      --line:var(--v26-b2);
      --line-2:var(--v26-b3);
      --line-hot:rgba(255,190,80,.64);
      --text:var(--v26-text);
      --muted:var(--v26-text-2);
      --faint:var(--v26-text-3);
      --gold-1:var(--n-g1);
      --gold-2:var(--n-g2);
      --gold-3:var(--n-g3);
      --amber:var(--n-amber);
      --amber-hot:var(--n-amber);
      --amber-soft:var(--v26-amber-36);
      --cyan:var(--n-mint);
      --ice:var(--n-ice);
      --violet:var(--n-lav);
    }

    /* original step positions restored: 50/45/55/40 from theme + galaxy */
    .depth-field{
      background:
        radial-gradient(ellipse 130% 70% at 5% 10%, var(--v26-deep-violet) 0%, transparent 50%),
        radial-gradient(ellipse 80% 100% at 95% 90%, var(--v26-deep-blue) 0%, transparent 45%),
        radial-gradient(ellipse 50% 50% at 50% -10%, var(--v26-deep-indigo) 0%, transparent 45%),
        radial-gradient(ellipse 85% 55% at 10% 20%, var(--v26-amber-13) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 90% 78%, var(--v26-amber-09) 0%, transparent 50%),
        radial-gradient(ellipse 55% 45% at 50% 50%, var(--v26-violet-07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 55% at 78% 15%, var(--v26-blue-06) 0%, transparent 50%),

    }

    .field-blue-well{
      opacity:.92 !important;
      filter:blur(30px) saturate(1.54) brightness(1.12) !important;
      background:
        radial-gradient(ellipse 80% 100% at 12% 52%, var(--v26-deep-blue) 0%, transparent 45%),
        radial-gradient(ellipse 50% 55% at 82% 15%, var(--v26-blue-18) 0%, transparent 50%),
        linear-gradient(90deg, rgba(2,2,8,.92) 0%, rgba(5,7,19,.46) 42%, rgba(2,2,8,.72) 100%) !important;
      mix-blend-mode:screen;
    }

    .field-amber-drift{
      opacity:1 !important;
      filter:blur(44px) saturate(1.72) brightness(1.18) !important;
      background:
        radial-gradient(ellipse 70% 60% at 90% 78%, var(--v26-amber-54) 0%, transparent 50%),
        radial-gradient(ellipse 75% 30% at 25% 90%, var(--v26-amber-36) 0%, transparent 50%),
        linear-gradient(90deg, transparent 5%, var(--v26-amber-22) 34%, var(--v26-amber-72) 55%, var(--v26-gold-32) 72%, transparent 95%) !important;
    }

    .amber-horizon{
      opacity:1 !important;
      filter:blur(28px) saturate(1.82) brightness(1.20) !important;
      background:
        linear-gradient(90deg, transparent 5%, var(--v26-gold-12) 22%, var(--n-g3) 44%, var(--n-amber) 55%, var(--n-g2) 68%, var(--v26-gold-18) 82%, transparent 95%),
        linear-gradient(to bottom, transparent 0%, var(--v26-amber-06) 40%, var(--v26-amber-36) 52%, var(--v26-amber-06) 64%, transparent 100%) !important;
      box-shadow:0 0 70px rgba(255,190,80,.34), 0 0 140px rgba(200,146,42,.18);
    }

    .scatter-fog{
      opacity:.95 !important;
      filter:blur(42px) saturate(1.56) brightness(1.08) !important;
      background:
        radial-gradient(circle at var(--mx) var(--my), var(--v26-gold-24) 0%, transparent 20%),
        radial-gradient(circle at 78% 70%, rgba(143,255,212,.22) 0%, transparent 18%),
        radial-gradient(circle at 36% 78%, rgba(200,192,255,.20) 0%, transparent 21%),
        radial-gradient(circle at 62% 30%, var(--v26-amber-22) 0%, transparent 18%) !important;
    }

    .refract-field{
      opacity:.78 !important;
      filter:blur(3px) saturate(1.35) !important;
      background:
        linear-gradient(108deg, transparent 0 31%, var(--v26-gold-12) 32%, transparent 33% 55%, rgba(184,232,255,.08) 56%, transparent 57% 72%, var(--v26-amber-09) 73%, transparent 74%),
        linear-gradient(72deg, transparent 0 22%, rgba(255,255,255,.10) 23%, transparent 24% 86%, var(--v26-gold-08) 87%, transparent 88%) !important;
    }

    .glass-sheets{
      opacity:.82 !important;
      background:
        linear-gradient(105deg, transparent 0 34%, var(--v26-gold-12) 35%, transparent 36% 61%, rgba(184,232,255,.08) 62%, transparent 63%),
        linear-gradient(180deg, var(--v26-gold-08), transparent 20% 70%, var(--v26-amber-06)) !important;
    }

    .distant-grid{
      opacity:.44 !important;
      background-image:
        linear-gradient(rgba(200,146,42,.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,146,42,.026) 1px, transparent 1px) !important;
      background-size:44px 44px !important;
    }

    .core-bloom{
      filter:drop-shadow(0 0 60px rgba(255,190,80,.62)) drop-shadow(0 0 118px rgba(200,146,42,.34)) drop-shadow(0 0 70px rgba(143,255,212,.16)) saturate(1.45) brightness(1.12) !important;
    }
    .core-bloom:before{
      background:
        radial-gradient(circle at 50% 47%, #fffdf2 0 5%, var(--n-g1) 10%, var(--n-amber) 20%, var(--n-g2) 31%, var(--n-g3) 44%, transparent 66%) !important;
      box-shadow:0 0 82px rgba(255,190,80,.82),0 0 148px rgba(237,184,138,.44),inset 0 0 76px rgba(255,255,255,.34) !important;
    }
    .core-bloom:after{
      background:
        repeating-conic-gradient(from 0deg, var(--v26-gold-46) 0 1.2deg, transparent 1.35deg 4.8deg),
        radial-gradient(circle, transparent 0 34%, var(--v26-gold-32) 35%, transparent 36% 51%, rgba(143,255,212,.18) 52%, transparent 53% 64%, rgba(200,192,255,.18) 65%, transparent 66%) !important;
    }

    .left-rail,.header-two-lane,.scene-workplace,.glass-card,.utility-runtime,.drawer,.task-pill{
      border-color:var(--v26-b2) !important;
      box-shadow:inset 0 1px 0 var(--v26-gold-18),0 30px 88px rgba(0,0,0,.64),0 0 42px rgba(200,146,42,.16) !important;
      backdrop-filter:blur(30px) saturate(1.72) brightness(1.08) !important;
      -webkit-backdrop-filter:blur(30px) saturate(1.72) brightness(1.08) !important;
    }

    .h-lane,.rail-btn,.lane-link,.chip,.node-pill,.badge,.action-btn,.util-btn,.drawer-row,.metric{
      border-color:var(--v26-b1) !important;
    }
    .rail-btn.active,.lane-link.active,.action-btn.primary,.util-btn:hover,.task-pill.active{
      border-color:var(--v26-b3) !important;
      box-shadow:0 0 26px rgba(255,190,80,.24), inset 0 1px 0 var(--v26-gold-24) !important;
    }
    .hero-title,.screen-title,.metric-value,.card-title,.identity{
      color:var(--n-g1) !important;
      text-shadow:0 0 18px rgba(245,226,192,.24),0 0 34px rgba(255,190,80,.16) !important;
    }
    .eyebrow,.chip.amber,.card-pill,.node-pill,.core-code{
      color:var(--n-g2) !important;
      text-shadow:0 0 16px rgba(237,184,138,.38) !important;
    }
    .hero-copy,.card-sub,.metric-note,.flow-text,.task-sub{color:var(--v26-text-2) !important}

  </style>

<body>

      showroom: {
        cls:"showroom", icon:"✦", label:"SHOWROOM", identity:"TÂM LUXURY · LIVE SHOWROOM COMMAND", node:"SHOWROOM NODE", title:"SHOWROOM",

        actions:["Xem bộ sưu tập","Đặt lịch tư vấn","Thiết kế riêng"],
        cardTitle:"Featured Collection", cardSub:"Astra Noctis · nucleus of light",
        metrics:[["Display Ready","98%","Không gian trưng bày sẵn sàng"],["VIP Appointments","12","Lịch riêng trong ngày"],["Featured Pieces","24","Mẫu đang highlight"],["Client Flow","36","Khách đang quan tâm"]],
        steps:[["Khám phá","Khách xem hồ sơ tập và render sản phẩm"],["Tư vấn","Lọc giải thích chất liệu, form và option"],["Chọn thiết kế","Khách chốt mẫu sẵn hoặc yêu cầu tuỳ biến"],["Giao nhận","Chuyển sang luồng nội bộ sau khi khóa đơn"]]
      },
      collections:{cls:"collections",icon:"◇",label:"COLLECTIONS",identity:"TÂM LUXURY · COLLECTION FIELD",node:"CURATION NODE",title:"COLLECTIONS",eyebrow:"AMBER ARCHIVE",subtitle:"Không gian nhóm sản phẩm. Mỗi bộ sưu tập là một trường riêng: nhẫn, bông tai, vòng tay, mặt dây và mẫu thiết kế riêng theo yêu cầu.",actions:["Mở archive","Ghim bộ mới","So sánh mẫu"],cardTitle:"Collection Matrix",cardSub:"Nhóm sản phẩm · phân tầng visual",metrics:[["Active Sets","08","Bộ đang mở"],["New Render","31","Ảnh/clip chờ duyệt"],["Diamond Focus","74%","Mẫu kim cương ưu tiên"],["Hold Items","09","Mẫu giữ cho khách VIP"]],steps:[["Chọn nhóm","NNA/NNU/BT/MD/VC"],["Lọc profile","Giá, chất liệu, style"],["So hình","Đặt cạnh để khách chọn"],["Khóa mẫu","Đưa sang tư vấn"]]},

      custom:{cls:"custom",icon:"◎",label:"CUSTOM",identity:"TÂM LUXURY · CUSTOM DESIGN FIELD",node:"DESIGN NODE",title:"CUSTOM DESIGN",eyebrow:"MADE TO ORDER",subtitle:"Luồng thiết kế riêng. Từ brief khách, phác thảo, render 3D, chọn kim cương, duyệt giá đến chuyển sản xuất.",actions:["Tạo brief","Mở render","Chuyển sản xuất"],cardTitle:"Design Queue",cardSub:"Custom order · 3D and stone lock",metrics:[["Briefs","17","Yêu cầu đang mở"],["3D Render","11","Mẫu đang dựng"],["Stone Lock","26","Viên đã giữ"],["Production","08","Đơn chờ xưởng"]],steps:[["Brief","Ghi gu và ngân sách"],["Render","Lên hình cho khách"],["Duyệt","Khóa đá và giá"],["Xưởng","Đẩy lệnh sản xuất"]]},

      lookbook:{cls:"lookbook",icon:"▣",label:"LOOKBOOK",identity:"TÂM LUXURY · LOOKBOOK DISPLAY",node:"VISUAL NODE",title:"LOOKBOOK",eyebrow:"VISUAL FRONT",subtitle:"Màn trình diễn hình ảnh sản phẩm cho khách. Ưu tiên ảnh lớn, trạng thái mẫu, câu chuyện bộ sưu tập và cảm giác thương hiệu.",actions:["Phát trình chiếu","Ghim mẫu","Xuất preview"],cardTitle:"Visual Deck",cardSub:"Product story · showroom display",metrics:[["Slides","46","Khung hình khả dụng"],["Hero Pieces","14","Mẫu chính"],["Client Saves","33","Khách đã lưu"],["Exported","09","Bộ đã gửi"]],steps:[["Ảnh lớn","Hiện hero visual"],["Câu chuyện","Mô tả chất liệu"],["Biến thể","Màu, size, đá"],["Gửi khách","Xuất preview"]]}

    function bootV26(){
      renderShowroomVisioScreen();
      mountUtilities();
      mountMultitaskRail();
      mountBatchDrawer();
      wireRuntimeSignals();
    }

    function renderAppFrame(scene){
      const root = document.getElementById("screen-root");
      root.innerHTML = `
        <section class="screen ${scene.cls}" data-scene="${APP_STATE.screen}">
          ${renderCoreBloom(scene)}
          ${renderLeftRail()}
          <main class="scene-main">
            ${renderHeaderTwoLane(scene)}
            ${renderWorkplace(scene)}
          </main>
        </section>`;
      bindSceneActions();
    }

    function renderShowroomVisioScreen(){APP_STATE.screen="showroom";renderAppFrame(SCENES.showroom);syncSceneState("showroom-visio")}
    function renderCollectionsScreen(){APP_STATE.screen="collections";renderAppFrame(SCENES.collections);syncSceneState("collections-field")}
    function renderVipScreen(){APP_STATE.screen="vip";renderAppFrame(SCENES.vip);syncSceneState("vip-flow")}
    function renderCustomDesignScreen(){APP_STATE.screen="custom";renderAppFrame(SCENES.custom);syncSceneState("custom-design")}
    function renderAppointmentsScreen(){APP_STATE.screen="appointments";renderAppFrame(SCENES.appointments);syncSceneState("appointments")}
    function renderLookbookScreen(){APP_STATE.screen="lookbook";renderAppFrame(SCENES.lookbook);syncSceneState("lookbook")}

    function renderLeftRail(){
      return `<aside class="left-rail">
        <div class="rail-logo">TL</div>
        ${Object.entries(SCENES).map(([key,s])=>`<button class="rail-btn ${APP_STATE.screen===key?'active':''}" data-screen="${key}"><i>${s.icon}</i><span>${s.label}</span></button>`).join("")}
      </aside>`;
    }

    function renderHeaderTwoLane(scene){
      return `<header class="header-two-lane">
        <div class="h-lane">
          <div class="identity">${scene.identity}</div>
          <div class="chip"><span class="dot"></span>WIRED</div>
          <div class="chip amber"><span class="dot"></span>TSC 0</div>
          <div class="chip violet"><span class="dot"></span>L4 LIVE</div>
          <div class="node-pill">${scene.node}</div>
          <div class="badge">TL</div>
        </div>
        <div class="h-lane">
          <div class="screen-title">${scene.title}</div>
          ${Object.entries(SCENES).map(([key,s])=>`<button class="lane-link ${APP_STATE.screen===key?'active':''}" data-screen="${key}">${s.label}</button>`).join("")}
          <button class="lane-link" data-drawer="batch">BATCH SYNC</button>
        </div>
      </header>`;
    }

    function renderWorkplace(scene){
      return `<section class="scene-workplace">
        <div class="work-grid">
          <div class="hero-block">
            <div class="eyebrow">${scene.eyebrow}</div>
            <h1 class="hero-title">${scene.title}</h1>
            <p class="hero-copy">${scene.subtitle}</p>
            <div class="actions">${scene.actions.map((a,i)=>`<button class="action-btn ${i===0?'primary':''}" data-action="${a}">${a}</button>`).join("")}</div>
          </div>
          <div class="insight-column">
            ${renderMetricsCard(scene)}
            ${renderFlowCard(scene)}
          </div>
        </div>
      </section>`;
    }

    function renderMetricsCard(scene){
      return `<article class="glass-card"><div class="card-inner">
        <div class="card-head"><div><div class="card-title">${scene.cardTitle}</div><div class="card-sub">${scene.cardSub}</div></div><div class="card-pill">CURATED</div></div>
        <div class="metric-grid">${scene.metrics.map(m=>`<div class="metric"><div class="metric-label">${m[0]}</div><div class="metric-value">${m[1]}</div><div class="metric-note">${m[2]}</div></div>`).join("")}</div>
      </div></article>`;
    }

    function renderFlowCard(scene){
      return `<article class="glass-card"><div class="card-inner">
        <div class="card-head"><div><div class="card-title">Operating Flow</div><div class="card-sub">Trường thu cảm · đồng pha · tán xạ</div></div><div class="card-pill">LIVE</div></div>

      </div></article>`;
    }

    function renderCoreBloom(scene){
      return `<div class="core-bloom" aria-hidden="true">
        <div class="orbital o1"></div><div class="orbital o2"></div><div class="orbital o3"></div>
        <div class="core-code"><span>FIELD · ${scene.label} · PHASE LOCK · SCATTER · RESONANCE</span></div>
      </div>`;
    }

    function mountUtilities(){
      const dock = document.getElementById("utility-root");
      dock.innerHTML = `<section class="utility-runtime">

      bindUtilityActions();

    function mountMultitaskRail(){
      const rail = document.getElementById("multitask-root");
      rail.innerHTML = `<div class="living-rail">
        ${Object.entries(SCENES).map(([key,s])=>`<button class="task-cap ${APP_STATE.screen===key?'active':''}" data-screen="${key}"><span class="task-light"></span>${s.label}</button>`).join("")}

      </div>`;
      bindSceneActions();
    }

    function mountBatchDrawer(){
      const drawer = document.getElementById("batch-drawer");
      drawer.innerHTML = `<h3>Reposide Batch Sync</h3>${APP_STATE.batch.map(b=>`<div class="queue-row"><span>${b[0]}<br><small>${b[1]}</small></span><b>${b[2]}</b></div>`).join("")}`;
    }

    function bindSceneActions(){
      document.querySelectorAll("[data-screen]").forEach(btn=>{
        btn.onclick = () => switchScreen(btn.dataset.screen);
      });
      document.querySelectorAll("[data-drawer='batch']").forEach(btn=>{
        btn.onclick = () => document.getElementById("batch-drawer").classList.toggle("open");
      });
      document.querySelectorAll("[data-action]").forEach(btn=>{
        btn.onclick = () => pushLog(`action: ${btn.dataset.action}`);
      });
    }

    function bindUtilityActions(){
      document.querySelectorAll("[data-util]").forEach(btn=>{
        btn.onclick = () => {
          const mode = btn.dataset.util.toUpperCase();
          pushLog(`${mode}: ${new Date().toLocaleTimeString('vi-VN')}`);
          if(mode === "AUDIT") document.getElementById("batch-drawer").classList.add("open");
        };
      });
    }

    function switchScreen(screen){
      const map = {
        showroom: renderShowroomVisioScreen,
        collections: renderCollectionsScreen,
        vip: renderVipScreen,
        custom: renderCustomDesignScreen,
        appointments: renderAppointmentsScreen,
        lookbook: renderLookbookScreen
      };
      (map[screen] || renderShowroomVisioScreen)();
      mountMultitaskRail();
      document.getElementById("batch-drawer").classList.remove("open");
    }

    function syncSceneState(name){
      document.documentElement.dataset.nattScreen = APP_STATE.screen;
      const status = document.getElementById("utility-status");
      const mini = document.getElementById("mini-state");
      if(status) status.textContent = `attached · ${name}`;
      if(mini) mini.textContent = `screen · ${name} · utility persistent`;
      pushLog(`screen: ${name}`);
    }

    function pushLog(line){
      APP_STATE.logs.unshift(line);
      APP_STATE.logs = APP_STATE.logs.slice(0,5);
      const log = document.getElementById("utility-log");
      if(log) log.innerHTML = APP_STATE.logs.map(x=>escapeHtml(x)).join("<br>");
    }

    function wireRuntimeSignals(){
      window.addEventListener("mousemove", e=>{
        document.documentElement.style.setProperty("--mx", `${Math.round(e.clientX / window.innerWidth * 100)}%`);
        document.documentElement.style.setProperty("--my", `${Math.round(e.clientY / window.innerHeight * 100)}%`);
      }, {passive:true});
      window.addEventListener("keydown", e=>{
        const order = Object.keys(SCENES);
        const i = order.indexOf(APP_STATE.screen);
        if(e.key === "ArrowRight") switchScreen(order[(i+1)%order.length]);
        if(e.key === "ArrowLeft") switchScreen(order[(i-1+order.length)%order.length]);
        if(e.key.toLowerCase() === "b") document.getElementById("batch-drawer").classList.toggle("open");
      });
      setInterval(()=>pushLog(`heartbeat: ${APP_STATE.screen} · ${new Date().toLocaleTimeString('vi-VN')}`), 9000);
    }

    function escapeHtml(s){return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

    bootV26();
  </script>
</body>
</html>
