<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tâm Luxury · Chat Nội Bộ</title>
<link rel="stylesheet" href="nattos-ui-theme.css">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#080a0d;--bg2:#0d1017;--bg3:#121820;--bg4:#181f2a;--gold:#c8922a;--gold2:#e8b84b;--border:rgba(200,146,42,.14);--border2:rgba(200,146,42,.3);--text:#ede0c8;--text2:#a89070;--text3:#60503a;--green:#3dd68c;--red:#f05050;--amber:#f0a030;--blue:#60b8f0;--mono:'JetBrains Mono',monospace;--sans:'Be Vietnam Pro',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(200,146,42,.2);border-radius:2px}
*{-webkit-user-select:none;user-select:none}input,textarea{-webkit-user-select:text!important;user-select:text!important}
#wm{position:fixed;inset:0;z-index:9990;pointer-events:none;overflow:hidden;display:flex;flex-wrap:wrap;gap:60px;padding:40px;transform:rotate(-22deg) scale(1.6)}
#wm span{font-size:9px;color:rgba(200,146,42,.04);font-family:var(--mono);white-space:nowrap}
.login{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 30% 40%,rgba(200,146,42,.07),transparent 60%)}
.lbox{width:360px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:36px}
.ln{text-align:center;font-family:var(--mono);font-size:18px;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.lsb{text-align:center;font-size:9px;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:22px}
.lf{margin-bottom:11px}.lf label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:3px}
.lf input,.lf select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 11px;font-size:12px;border-radius:3px;outline:none;font-family:var(--sans)}
.lf input:focus{border-color:var(--gold)}.lf select option{background:var(--bg2)}
.lbtn{width:100%;padding:11px;background:var(--gold);color:#000;border:none;border-radius:3px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;font-family:var(--sans)}
.app{display:none;height:100vh;grid-template-columns:280px 1fr;grid-template-rows:52px 1fr}
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:0}
.tl{font-family:var(--mono);font-size:13px;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.08em;padding-right:16px;border-right:1px solid var(--border)}
.tr2{margin-left:auto;display:flex;align-items:center;gap:10px}
.tu2{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(200,146,42,.08);border:1px solid var(--border);border-radius:2px}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(61,214,140,.5)}
.tuname{font-family:var(--mono);font-size:10px;color:var(--gold2)}
.ttime{font-family:var(--mono);font-size:11px;color:var(--text2);padding-left:12px;border-left:1px solid var(--border)}
.tout{background:rgba(240,80,80,.1);border:1px solid rgba(240,80,80,.2);color:var(--red);padding:4px 9px;border-radius:2px;font-size:10px;cursor:pointer;font-family:var(--mono)}
/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-search{padding:12px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;font-size:11px;border-radius:20px;outline:none;font-family:var(--sans)}
.sb-search input:focus{border-color:var(--border2)}
.sb-rooms{flex:1;overflow-y:auto}
.room-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:all .15s;border-bottom:1px solid rgba(200,146,42,.04)}
.room-item:hover{background:rgba(200,146,42,.05)}
.room-item.active{background:rgba(200,146,42,.1);border-right:2px solid var(--gold)}
.ri-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700;font-family:var(--mono)}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-last{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ri-badge{width:18px;height:18px;border-radius:50%;background:var(--gold);color:#000;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--mono)}
/* CHAT AREA */
.chat-area{display:flex;flex-direction:column;overflow:hidden}
.chat-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg2)}
.ch-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ch-name{font-size:13px;font-weight:600}
.ch-meta{font-size:10px;color:var(--text3)}
.ch-actions{margin-left:auto;display:flex;gap:6px}
.ch-btn{padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:2px;font-size:10px;cursor:pointer;font-family:var(--mono)}
.ch-btn:hover{border-color:var(--border2);color:var(--text)}
.messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:8px;max-width:75%;animation:mf .2s ease}
.msg.mine{align-self:flex-end;flex-direction:row-reverse}
@keyframes mf{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono);margin-top:2px}
.msg-body{flex:1}
.msg-meta{font-size:9px;color:var(--text3);margin-bottom:2px;font-family:var(--mono)}
.msg.mine .msg-meta{text-align:right}
.msg-text{padding:9px 12px;border-radius:12px;font-size:12px;line-height:1.5}
.msg.other .msg-text{background:var(--bg3);border:1px solid var(--border);border-top-left-radius:3px}
.msg.mine .msg-text{background:rgba(200,146,42,.15);border:1px solid rgba(200,146,42,.2);border-top-right-radius:3px;text-align:right}
.msg-type-system{align-self:center;max-width:100%}
.msg-type-system .msg-text{background:rgba(96,184,240,.06);border:1px solid rgba(96,184,240,.15);border-radius:6px;color:var(--blue);font-size:10px;text-align:center;font-family:var(--mono);padding:6px 16px}
.input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--bg2)}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;font-size:12px;border-radius:20px;outline:none;font-family:var(--sans);resize:none;max-height:100px;line-height:1.5}
.chat-input:focus{border-color:var(--border2)}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--gold);color:#000;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover{background:var(--gold2);transform:scale(1.05)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3)}
.tw{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:7px;z-index:200}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:10px 14px;font-size:12px;display:flex;align-items:center;gap:9px;animation:si .25s ease}
.toast.success{border-left:3px solid var(--green)}.toast.info{border-left:3px solid var(--gold)}.toast.error{border-left:3px solid var(--red)}
@keyframes si{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
</style></head><body>
<div id="wm"></div>
<div class="login" id="ls">
  <div class="lbox">
    <div class="ln">TÂM LUXURY</div><div class="lsb">Chat Nội Bộ</div>
    <div class="lf"><label>Mã NV</label><input id="lc" value="TLXR042"></div>
    <div class="lf"><label>Họ Tên</label><input id="ln2" value="Nguyễn Thị Linh"></div>
    <div class="lf"><label>Phòng Ban</label><select id="ld"><option>Khối Kinh Doanh</option><option>Khối Sản Xuất</option><option>Khối Vận Hành</option><option>Ban Giám Đốc</option></select></div>
    <button class="lbtn" onclick="doLogin()">VÀO CHAT</button>
  </div>
</div>
<div class="app" id="app">
  <header class="topbar" style="grid-column:1/-1">
    <div style="padding-right:14px;border-right:1px solid var(--border)"><div class="tl">CHAT · TÂM LUXURY</div></div>
    <div style="flex:1;padding-left:16px;font-size:11px;color:var(--text3)">Hệ thống chat nội bộ bảo mật · Mã hóa end-to-end</div>
    <div class="tr2">
      <div class="tu2"><div class="tdot"></div><div><div class="tuname" id="tu">—</div><div style="font-size:9px;color:var(--text3)" id="td2">—</div></div></div>
      <div class="ttime" id="clk">00:00:00</div>
      <button class="tout" onclick="doLogout()">THOÁT</button>
    </div>
  </header>
  <div class="sidebar">
    <div class="sb-search"><input placeholder="🔍 Tìm phòng, người..." oninput="filterRooms(this.value)"></div>
    <div class="sb-rooms" id="roomList"></div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div style="font-size:48px">💬</div>
      <div style="font-family:var(--mono);font-size:11px;letter-spacing:.2em">CHỌN PHÒNG ĐỂ BẮT ĐẦU</div>
    </div>
  </div>
</div>
<div class="tw" id="tw"></div>
<script>
const ROOMS=[
  {id:'strategic',name:'Ban Chiến Lược',icon:'⚔️',color:'rgba(200,146,42,.15)',desc:'BGĐ + Trưởng phòng',locked:true,members:['BGĐ','Trưởng KD','Trưởng SX','KTT'],messages:[{from:'Thiên AI',fromCode:'AI-001',text:'Chào Anh Natt, phòng Chiến Lược đã được kích hoạt mã hóa OMEGA.',time:'08:15',system:false},{from:'Anh Natt',fromCode:'TLXR000',text:'Review kết quả Sprint 23/03. TSC=0, 207 commits. 🎯',time:'08:22',system:false},{from:'SYSTEM',fromCode:'SYS',text:'KTT đã duyệt bảng lương T3/2026 — 16.37 tỷ',time:'09:00',system:true}]},
  {id:'sales',name:'Khối Kinh Doanh',icon:'💎',color:'rgba(61,214,140,.1)',desc:'38 Sales + CTV',locked:false,members:['KD'],messages:[{from:'Sales Lead',fromCode:'TLXR010',text:'Doanh số hôm nay: 3 đơn, tổng 87 triệu. Đang xử lý 2 khách VIP.',time:'10:30',system:false},{from:'Mai',fromCode:'TLXR025',text:'Khách hỏi về nhẫn cưới custom 18K, cần báo giá nhanh.',time:'10:45',system:false}]},
  {id:'factory',name:'Xưởng Sản Xuất',icon:'🏭',color:'rgba(240,160,48,.1)',desc:'54 thợ + Trưởng xưởng',locked:false,members:['SX'],messages:[{from:'Kris AI',fromCode:'AI-002',text:'Kris đang giám sát định mức hao hụt. Tổ Đúc: 2.86% — vượt ngưỡng!',time:'07:00',system:false},{from:'Trưởng Xưởng',fromCode:'TLXR080',text:'Đã kiểm tra lại lò đúc. Nguyên nhân: nhiệt độ lò chênh lệch 20°C. Đã điều chỉnh.',time:'07:45',system:false},{from:'SYSTEM',fromCode:'SYS',text:'48 đơn đang sản xuất · OEE 86.5% · Hao hụt 1.3%',time:'08:00',system:true}]},
  {id:'accounting',name:'Kế Toán + KTT',icon:'📊',color:'rgba(96,184,240,.1)',desc:'5 kế toán',locked:true,members:['KT','BGĐ'],messages:[{from:'KTT',fromCode:'TLXR005',text:'Đã duyệt bảng lương T3. Chờ CEO ký lệnh CK Vietinbank.',time:'09:15',system:false},{from:'KT Tổng Hợp',fromCode:'TLXR006',text:'BCTC T3 đang tổng hợp. Còn vấn đề buyback 31.71t chưa ghi TK156.',time:'09:30',system:false}]},
  {id:'warehouse',name:'Kho Hàng',icon:'📦',color:'rgba(167,139,250,.1)',desc:'8 NV kho',locked:false,members:['Kho'],messages:[{from:'Thủ Kho',fromCode:'TLXR060',text:'Kim cương 1ct GIA còn 2 viên. Cần đặt hàng ZEN International.',time:'08:00',system:false}]},
  {id:'all',name:'Toàn Công Ty',icon:'🏢',color:'rgba(200,146,42,.08)',desc:'122 NV',locked:false,members:['ALL'],messages:[{from:'BGĐ',fromCode:'TLXR000',text:'Tâm Luxury thông báo: Tháng 3/2026 đạt doanh thu 317.91 tỷ. Cảm ơn toàn thể CBNV! 🎉',time:'17:00',system:false},{from:'SYSTEM',fromCode:'SYS',text:'Lương tháng 3 sẽ được chuyển khoản vào 28/03/2026',time:'17:01',system:true}]},
];
let user=null,activeRoom=null;
function doLogin(){
  const code=document.getElementById('lc').value.trim()||'TLXR042';
  const name=document.getElementById('ln2').value.trim()||'NV';
  const dept=document.getElementById('ld').value;
  user={code,name,dept};
  window.addEventListener('keydown',e=>{if(e.key==='PrintScreen'||e.key==='F12'){e.preventDefault();}},true);
  window.addEventListener('contextmenu',e=>e.preventDefault(),true);
  const wm=document.getElementById('wm');const ts=new Date().toLocaleString('vi-VN');
  for(let i=0;i<40;i++){const s=document.createElement('span');s.textContent=`${name} · ${code} · ${ts}`;wm.appendChild(s);}
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='grid';
  document.getElementById('tu').textContent=name;
  document.getElementById('td2').textContent=`${code} · ${dept}`;
  renderRooms(ROOMS);
  toast(`Xin chào ${name} — Chat nội bộ`,'success');
}
function doLogout(){user=null;document.getElementById('app').style.display='none';document.getElementById('ls').style.display='flex';document.getElementById('wm').innerHTML='';}
function filterRooms(q){renderRooms(ROOMS.filter(r=>r.name.toLowerCase().includes(q.toLowerCase())));}
function renderRooms(rooms){
  document.getElementById('roomList').innerHTML=rooms.map(r=>{
    const last=r.messages[r.messages.length-1];
    const unread=r.messages.filter(m=>m.fromCode!==user?.code&&!m.system).length;
    return`<div class="room-item ${activeRoom?.id===r.id?'active':''}" onclick="openRoom('${r.id}')">
      <div class="ri-avatar" style="background:${r.color}">${r.icon}</div>
      <div class="ri-info"><div class="ri-name">${r.name}${r.locked?' 🔒':''}</div><div class="ri-last">${last?last.text.slice(0,40)+'...':'Chưa có tin'}</div></div>
      ${unread>0?`<div class="ri-badge">${unread}</div>`:''}
    </div>`;
  }).join('');
}
function openRoom(id){
  activeRoom=ROOMS.find(r=>r.id===id);
  if(!activeRoom)return;
  renderRooms(ROOMS);
  const initials=n=>n.split(' ').slice(-2).map(w=>w[0]).join('').toUpperCase();
  const avColors=['rgba(200,146,42,.2)','rgba(61,214,140,.15)','rgba(96,184,240,.15)','rgba(167,139,250,.15)','rgba(240,80,80,.15)'];
  const avColor=(code)=>avColors[code.charCodeAt(code.length-1)%avColors.length];
  document.getElementById('chatArea').innerHTML=`
    <div class="chat-hdr">
      <div class="ch-avatar" style="background:${activeRoom.color};font-size:18px">${activeRoom.icon}</div>
      <div><div class="ch-name">${activeRoom.name}</div><div class="ch-meta">${activeRoom.desc}</div></div>
      <div class="ch-actions"><button class="ch-btn" onclick="toast('Tính năng gọi voice sẽ available khi deploy LAN','info')">📞 Gọi</button><button class="ch-btn" onclick="toast('${activeRoom.members.join(', ')}','info')">👥 Thành Viên</button></div>
    </div>
    <div class="messages" id="msgArea">
      ${activeRoom.messages.map(m=>`
        <div class="msg ${m.system?'msg-type-system':m.fromCode===user.code?'mine':'other'}">
          ${!m.system&&m.fromCode!==user.code?`<div class="msg-av" style="background:${avColor(m.fromCode)}">${initials(m.from)}</div>`:''}
          <div class="msg-body">
            ${!m.system?`<div class="msg-meta">${m.fromCode===user.code?'':m.from+' · '}${m.time}</div>`:''}
            <div class="msg-text">${m.text}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="Nhập tin nhắn..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>`;
  scrollBottom();
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function sendMsg(){
  if(!activeRoom)return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text)return;
  const now=new Date();
  const time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  activeRoom.messages.push({from:user.name,fromCode:user.code,text,time,system:false});
  inp.value='';
  const avColors=['rgba(200,146,42,.2)','rgba(61,214,140,.15)','rgba(96,184,240,.15)'];
  const el=document.createElement('div');
  el.className='msg mine';
  el.innerHTML=`<div class="msg-body"><div class="msg-meta">${time}</div><div class="msg-text">${text}</div></div>`;
  document.getElementById('msgArea').appendChild(el);
  scrollBottom();
  renderRooms(ROOMS);
}
function scrollBottom(){const a=document.getElementById('msgArea');if(a)a.scrollTop=a.scrollHeight;}
function p2(n){return String(n).padStart(2,'0');}
function toast(msg,type='info'){const el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=`<span style="color:${type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--gold)'};font-weight:700">${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span><span>${msg}</span>`;document.getElementById('tw').appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300)},3500);}
setInterval(()=>{const n=new Date;document.getElementById('clk').textContent=`${p2(n.getHours())}:${p2(n.getMinutes())}:${p2(n.getSeconds())}`;},1000);
</script>
<script src="nattos-eod-engine.js"></script>
<script src="nattos-data.js"></script>
<script src="nattos-fx.js"></script>
</body></html>
